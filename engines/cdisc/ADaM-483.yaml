Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  In a pair of corresponding character and numeric variables, the secondary
                  (numeric) variable must be populated if its primary (character) variable
                  is populated. Uses AVISIT/AVISITN as representative pair in BDS.
                Document: ADaM IG v1.1
                Section: '3.3.2'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-483
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: AVISIT
      operator: empty
    - name: AVISITN
      operator: non_empty
Core:
  Id: ADaM-483
  Status: Published
  Version: '1'
Description: >-
  When a character primary variable is populated, its corresponding numeric secondary
  variable must also be populated. Uses AVISIT/AVISITN as representative pair in BDS.
Executability: Partially Executable
Outcome:
  Message: 'AVISIT is populated but corresponding numeric variable AVISITN is missing'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "AVISIT and AVISITN both populated"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVISIT, AVISITN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Week 2", 2]
    expected_findings: 0
  - name: "AVISIT populated but AVISITN is null"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVISIT, AVISITN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Week 2", ""]
    expected_findings: 1
