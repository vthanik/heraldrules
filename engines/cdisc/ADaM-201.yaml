Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If Actual Pooled Treatment y numeric variable (TRTAGyN) is present, its corresponding character variable (TRTAGy) must also be present.
                Document: ADaM IG v1.1
                Section: '3.3'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-201
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: TRTAG1N
      operator: non_empty
    - name: TRTAG1
      operator: empty
Core:
  Id: ADaM-201
  Status: Published
  Version: '1'
Description: >-
  When TRTAG1N (Actual Pooled Treatment 1 Numeric) is present, TRTAG1 (Actual Pooled Treatment 1) must also be present.
Executability: Partially Executable
Outcome:
  Message: 'TRTAGyN (numeric pooled actual treatment) is populated but TRTAGy (character) is missing'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "TRTAG1 and TRTAG1N both populated"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, TRTAG1, TRTAG1N]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Active", 1]
    expected_findings: 0
  - name: "TRTAG1N populated but TRTAG1 is null"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, TRTAG1, TRTAG1N]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "", 1]
    expected_findings: 1
