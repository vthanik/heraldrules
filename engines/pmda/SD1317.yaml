id: SD1317
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: DEATH records (DSDECOD='DEATH') in the Disposition (DS) domain should
  have Start Date of Event (DSSTDTC) equal to subject's Date/Time of Death (DTHDTC)
  populated in the Demographics (DM) domain. Subject's Date/Time of Death info should
  be consistent across all domains.
scope:
  Classes:
    Include: EVENTS
  Domains:
    Include: DS
  Use_Case: INDH
check:
  all:
    - name: DSDECOD
      operator: not_equal_to
      value: DEATH
    - name: DSSTDTC
      operator: equal_to
      value: DTHDTC
outcome:
  message: DSSTDTC for DEATH record is not the same as DM.DTHDTC
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1317
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000034

