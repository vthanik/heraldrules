# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.14
id: DD0056
version: 1
status: Published
standard: Define-XML
category: Method Definition
sensitivity: Record
executability: Fully Executable
description: >
  Method ID is required and must be unique.
scope:
  classes: []
  domains: []
check:
  all:
    - name: method_id
      operator: empty
outcome:
  message: "Method ID is missing. Each method must have a unique ID."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.14"
  cited_guidance: >
    OID -- Required. Unique ID for the MethodDef.
