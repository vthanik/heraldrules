Core:
  Id: FDAV-SD1119
  Status: Reference
  Version: '1'
Description: 'In the Comments (CO) domain, the following Identifier and Timing variables
  are Permissible and may be populated as appropriate when comments are not related
  to other domain records (i.e., RDOMAIN and IDVAR variable values are not populated):
  COGRPID, COREFID, COSPID, VISIT, VISITNUM, VISITDY, TAETORD, CODY, COTPT, COTPTNUM,
  COELTM, COTPTREF, CORFTDTC.'
Check: []
Outcome:
  Message: Inappropriate usage of variables in CO domain, when comment is a child
    record of another domain
Rule Type: Record Data
Sensitivity: Record
