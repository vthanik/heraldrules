id: AD0075
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: If the Planned Treatment (TRTxxPN) numeric variable is present, there
  must be a corresponding Planned Treatment (TRTxxP) character variable.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
check:
  all:
    - name: TRT01PN
      operator: empty
    - name: TRT01P
      operator: non_empty
outcome:
  message: TRTxxPN is present, but TRTxxP is not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0075
  pmda_category: Error
  ig_versions: []

