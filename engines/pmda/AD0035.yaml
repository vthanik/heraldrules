id: AD0035
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: A variable with a suffix of RFN must have a value that is 1 or null (R
  = record level flag variable).
scope:
  classes: []
  domains:
    - BDS
    - ADAMOTHER
check:
  all:
    - name: ABLFN
      operator: non_empty
    - name: ABLFN
      operator: not_equal_to
      value: 1
outcome:
  message: '*RFN value is not 1 or null'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0035
  pmda_category: Error
  ig_versions: []

