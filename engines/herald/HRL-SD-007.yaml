id: HRL-SD-007
version: 1
status: Published
standard: SDTM
category: Conformance
sensitivity: Record
executability: Fully Executable
description: Last Observation Before Exposure Flag (--LOBXFL) variable should be present
  in all custom Findings domains.
scope:
  classes: []
  domains: []
check:
  all:
    - name: __LOBXFL__
      operator: has_flag_record
      value: 'Y'
outcome:
  message: No --LOBXFL variable in custom Findings domain
  severity: Error
provenance:
  source_doc: Herald-original (gap analysis vs P21 Community catalog)
  authority: Herald
  p21_reference: SD1484

tests:
  - name: "LOBXFL variable is present in custom Findings domain"
    type: positive
    skip: true
    datasets:
      FA:
        variables: [STUDYID, USUBJID, FALOBXFL]
        records:
          - ["S1", "S1-001", "Y"]
    expected_findings: 0

  - name: "LOBXFL variable is absent from custom Findings domain"
    type: negative
    skip: true
    datasets:
      FA:
        variables: [STUDYID, USUBJID]
        records:
          - ["S1", "S1-001"]
    expected_findings: 1

