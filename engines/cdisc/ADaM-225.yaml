Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  When all three variables are populated and BASE does not equal 0, Percent Change from Baseline (PCHG) must equal 100 * (AVAL - BASE) / BASE.
                Document: ADaM IG v1.1
                Section: '3.3.5'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-225
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: PCHG
      operator: empty
    - name: BASE
      operator: empty
    - name: AVAL
      operator: empty
    - name: BASE
      operator: equal_to
      value: 0
    - name: PCHG
      operator: within_tolerance_of_formula
      value: 100 * (AVAL - BASE) / BASE
      tolerance: 0.01
Core:
  Id: ADaM-225
  Status: Published
  Version: '1'
Description: >-
  PCHG = 100 * (AVAL - BASE) / BASE when BASE != 0.
Executability: Fully Executable
Outcome:
  Message: 'PCHG does not equal 100 * (AVAL - BASE) / BASE (percent change from baseline error)'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "PCHG = 100*(AVAL-BASE)/BASE (correct)"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, BASE, PCHG]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 145.0, 140.0, 3.571]
    expected_findings: 0
  - name: "PCHG does not equal formula"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, BASE, PCHG]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 145.0, 140.0, 5.0]
    expected_findings: 1
