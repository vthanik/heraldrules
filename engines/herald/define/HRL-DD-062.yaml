# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.9.2
id: HRL-DD-062
version: 1
status: Published
standard: Define-XML
category: Variable Definition
sensitivity: Record
executability: Fully Executable
description: >
  Variable order must be a positive integer when provided.
scope:
  classes: []
  domains: []
check:
  all:
    - name: order
      operator: empty
    - name: order
      operator: greater_than
      value: 0
outcome:
  message: "Variable order must be a positive integer."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.9.2"
  cited_guidance: >
    OrderNumber -- Optional. Integer. Display order of the variable within the domain dataset.

tests:
  - name: "HRL-DD-062 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-062 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

