id: SD0092
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Description of Unplanned Element (SEUPDES) should be populated when subject's
  experience for a particular period of time is represented as an unplanned Element,
  where Element Code (ETCD) is equal to 'UNPLAN'.
scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: SE
  Use_Case: INDH
check:
  all:
    - name: SEUPDES
      operator: empty
    - name: ETCD
      operator: equal_to
      value: UNPLAN
outcome:
  message: Missing value for SEUPDES when ETCD='UNPLAN'
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0092
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000095

