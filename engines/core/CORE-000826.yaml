Authorities:
  - Organization: CDISC
    Standards:
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'When specified, the upper limit of a timing window must be a
                  non-negative duration in ISO 8601 format.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00062'
              Version: '1'
            Version: '1.0'
        Version: '3.0'
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'When specified, the upper limit of a timing window must be a
                  non-negative duration in ISO 8601 format.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00062'
              Version: '1'
            Version: '1.0'
        Version: '4.0'
Check:
  all:
    - name: instanceType
      operator: equal_to
      value: 'Timing'
    - name: rel_type
      operator: equal_to
      value: 'definition'
    - name: windowUpper
      operator: exists
    - name: windowUpper
      operator: non_empty
    - name: windowUpper
      negative: false
      operator: invalid_duration
Core:
  Id: 'CORE-000826'
  Status: Published
  Version: '1'
Description: 'When specified, the upper limit of a timing window must be a
  non-negative duration in ISO 8601 format.'
Executability: Fully Executable
Outcome:
  Message: 'The upper limit of the timing window (windowUpper) is not a
    non-negative duration in ISO 8601 format.'
  Output Variables:
    - parent_entity
    - parent_id
    - parent_rel
    - id
    - name
    - windowUpper
    - windowLabel
Rule Type: Record Data
Scope:
  Entities:
    Include:
      - 'Timing'
Sensitivity: Record
