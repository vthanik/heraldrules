# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 4.1.1
id: DD0013
version: 1
status: Published
standard: Define-XML
category: Standards Reference
sensitivity: Dataset
executability: Fully Executable
description: >
  Standard name component must be one of the CDISC allowable standard names.
scope:
  classes: []
  domains: []
check:
  all:
    - name: standard_name
      operator: not_empty
    - name: standard_name
      operator: not_in
      value:
        - SDTMIG
        - SDTMIG-MD
        - SDTMIG-AP
        - SDTMIG-PGx
        - SENDIG
        - SENDIG-DART
        - ADaMIG
outcome:
  message: "Standard name is not one of the allowable CDISC standard names."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "4.1.1"
  cited_guidance: >
    Type IG -- Allowable Names: SDTMIG, SDTMIG-MD, SDTMIG-AP, SDTMIG-PGx, SENDIG, SENDIG-DART, ADaMIG.
