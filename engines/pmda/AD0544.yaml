id: AD0544
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: If Baseline Category y (N) (BASECAyN) variable is used in a dataset,
  Baseline Category y (BASECATy) variable must also be present in that dataset.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: BASECA1N
      operator: empty
    - name: BASECA1
      operator: non_empty
outcome:
  message: BASECAyN is present and BASECATy is not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0544
  pmda_category: Error
  ig_versions: []

