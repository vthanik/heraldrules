id: SD1276
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Name of Treatment variables (--TRT) should not be populated with values
  of 'MULTIPLE'.
scope:
  Classes:
    Include: INTERVENTIONS
  Domains:
    Include: ALL
  Use_Case: INDH
check:
  all:
    - name: --TRT
      operator: not_equal_to
      value: MULTIPLE
outcome:
  message: --TRT equals 'MULTIPLE'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1276
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000163

