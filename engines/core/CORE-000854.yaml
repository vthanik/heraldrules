Authorities:
  - Organization: CDISC
    Standards:
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'An eligibility criterion''s category must be specified using
                  the Category of Inclusion/Exclusion (C66797) SDTM codelist.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00110'
              Version: '1'
            Version: '1.0'
        Version: '3.0'
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'An eligibility criterion''s category must be specified using
                  the Category of Inclusion/Exclusion (C66797) SDTM codelist.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00110'
              Version: '1'
            Version: '1.0'
        Version: '4.0'
Check:
  all:
    - name: rel_type
      operator: equal_to
      value: 'definition'
    - name: category
      operator: equal_to
      value: true
    - not:
        all:
          - name: category.codeSystem
            operator: equal_to
            value: 'http://www.cdisc.org'
          - name: category.codeSystemVersion
            operator: is_contained_by
            value: $valid_versions
          - any:
              - all:
                  - name: $pref_term_for_code
                    operator: non_empty
                  - name: $value_for_code
                    operator: non_empty
                  - any:
                      - name: $code_for_decode_pref_term
                        operator: non_empty
                      - name: $code_for_decode_value
                        operator: non_empty
                  - any:
                      - name: category.code
                        operator: equal_to
                        value: $code_for_decode_pref_term
                      - name: category.code
                        operator: equal_to
                        value: $code_for_decode_value
                  - any:
                      - name: category.decode
                        operator: equal_to
                        value: $pref_term_for_code
                      - name: category.decode
                        operator: equal_to
                        value: $value_for_code
              - all:
                  - name: $codelist_extensible
                    operator: equal_to
                    value: true
                  - name: $code_for_decode_pref_term
                    operator: empty
                  - name: $code_for_decode_value
                    operator: empty
                  - name: $pref_term_for_code
                    operator: empty
                  - name: $value_for_code
                    operator: empty
Core:
  Id: 'CORE-000854'
  Status: Published
  Version: '1'
Description: 'An eligibility criterion''s category must be specified using the
  Category of Inclusion/Exclusion (C66797) SDTM codelist.'
Executability: Fully Executable
Operations:
  - id: $codelist_code
    map:
      - output: C66797
    operator: map
  - ct_package_types:
      - SDTM
    id: $valid_versions
    operator: valid_codelist_dates
  - codelist_code: $codelist_code
    ct_package_type: SDTM
    id: $codelist_extensible
    operator: codelist_extensible
    version: category.codeSystemVersion
  - codelist_code: $codelist_code
    ct_package_type: SDTM
    id: $value_for_code
    operator: codelist_terms
    returntype: value
    term_code: category.code
    version: category.codeSystemVersion
  - codelist_code: $codelist_code
    ct_package_type: SDTM
    id: $pref_term_for_code
    operator: codelist_terms
    returntype: pref_term
    term_code: category.code
    version: category.codeSystemVersion
  - codelist_code: $codelist_code
    ct_package_type: SDTM
    id: $code_for_decode_pref_term
    operator: codelist_terms
    returntype: code
    term_pref_term: category.decode
    version: category.codeSystemVersion
  - codelist_code: $codelist_code
    ct_package_type: SDTM
    id: $code_for_decode_value
    operator: codelist_terms
    returntype: code
    term_value: category.decode
    version: category.codeSystemVersion
Outcome:
  Message: 'The eligibility criterion''s category is not specified using the
    Category of Inclusion/Exclusion (C66797) SDTM codelist - codeSystem is not
    "http://www.cdisc.org", codeSystemVersion is not a valid terminology package
    date, the code or decode (either as preferred term or as submission value)
    is found in the codelist (case insensitive) but the corresponding decode or
    code does not match the codelist value (case sensitive), and/or neither code
    nor decode is found in the codelist.'
  Output Variables:
    - parent_entity
    - parent_id
    - parent_rel
    - id
    - name
    - $codelist_code
    - $codelist_extensible
    - category.code
    - $code_for_decode_value
    - $code_for_decode_pref_term
    - category.codeSystem
    - category.codeSystemVersion
    - category.decode
    - $value_for_code
    - $pref_term_for_code
Rule Type: Record Data
Scope:
  Entities:
    Include:
      - 'EligibilityCriterion'
Sensitivity: Record
