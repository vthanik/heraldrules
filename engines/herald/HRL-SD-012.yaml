id: HRL-SD-012
version: 1
status: Published
standard: SDTM
category: Cross-Domain
sensitivity: Record
executability: Fully Executable
description: >
  When DM.DTHFL = 'Y' (subject died), there should be a corresponding
  DS record with DSDECOD containing 'DEATH'. Missing death disposition
  indicates incomplete regulatory documentation.
scope:
  classes: []
  domains:
    - DM
    - DS
check:
  all:
    - name: DTHFL
      operator: not_equal_to
      value: 'Y'
    - name: __cross_check__
      operator: no_matching_record
      value:
        dataset: DS
        by: USUBJID
        where:
          name: DSDECOD
          operator: contains
          value: DEATH
outcome:
  message: Subject has DTHFL=Y but no DS record with DSDECOD containing DEATH
  severity: Error
provenance:
  source_doc: StudySAS Blog — Cross-domain SDTM QC Checks (2026-04)
  authority: Herald
  reference_url: https://studysas.blogspot.com/2026/04/html-sdtm-programming-sas-submission-qc.html

tests:
  - name: "DTHFL=Y with matching DS death record"
    type: positive
    datasets:
      DM:
        variables: [STUDYID, USUBJID, DTHFL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "Y"]
      DS:
        variables: [STUDYID, USUBJID, DSDECOD]
        records:
          - ["CDISCPILOT01", "01-701-1015", "DEATH"]
    expected_findings: 0
  - name: "DTHFL=Y but no DS death record"
    type: negative
    datasets:
      DM:
        variables: [STUDYID, USUBJID, DTHFL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "Y"]
      DS:
        variables: [STUDYID, USUBJID, DSDECOD]
        records:
          - ["CDISCPILOT01", "01-701-1015", "COMPLETED"]
    expected_findings: 1
