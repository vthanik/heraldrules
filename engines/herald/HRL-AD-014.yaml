id: HRL-AD-014
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: A variable is present in ADaM with the same name as a variable present
  in ADaM IG, but the variables do not have identical data types.
scope:
  classes: []
  domains: []
check:
  all:
    - name: __shared_variables__
      operator: type_match
      value: __cross_dataset__
outcome:
  message: Variable name present in both ADaM and ADaM IG do not have identical data
    types
  severity: Warning
provenance:
  source_doc: Herald-original (gap analysis vs P21 Community catalog)
  authority: Herald
  p21_reference: AD0200-NI

tests:
  - name: "shared variable has matching data types in ADaM and ADaM IG"
    type: positive
    skip: true
    datasets:
      ADAE:
        variables: [STUDYID, USUBJID]
        records:
          - ["S1", "S1-001"]
    expected_findings: 0

  - name: "shared variable has mismatched data types between ADaM and ADaM IG"
    type: negative
    skip: true
    datasets:
      ADAE:
        variables: [STUDYID, USUBJID]
        records:
          - ["S1", "S1-001"]
    expected_findings: 1

