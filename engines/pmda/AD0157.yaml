id: AD0157
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: If Criterion y (CRITy) variable is present, there must also be a corresponding
  Criterion y Flag (CRITyFL) variable.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: CRIT1
      operator: empty
    - name: CRIT1FL
      operator: non_empty
outcome:
  message: CRITy is present, but CRITyFL is not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0157
  pmda_category: Error
  ig_versions: []

