Authorities:
  - Organization: 'CDISC'
    Standards:
      - Name: 'TIG'
        References:
          - Citations:
              - Cited Guidance: DSSCAT = "PRODUCT EXPOSURE" is used when a study has only a
                  single product|2.b.iii If a study has multiple products, then
                  DSSCAT should name the individual product.
                Document: TIG v1.0
                Item: 2.b.ii
                Section: 2.8.10.8
            Origin: TIG Conformance Rules
            Rule Identifier:
              Id: TIG0632
              Version: '1'
            Version: '1.0'
        Substandard: SDTM
        Version: '1.0'
Check:
  all:
    - name: $disposition_event_count
      operator: greater_than
      value: 1
    - name: DSSCAT
      operator: equal_to
      value: PRODUCT EXPOSURE
      value_is_literal: true
    - name: DSSCAT
      operator: is_not_unique_set
      value:
        - USUBJID
        - EPOCH
Core:
  Status: Published
  Version: '1'
  Id: CORE-000764
Description: Trigger error when subject has more than one record per Epoch with
  DSCAT = 'DISPOSITION EVENT' and more than one record where DSSCAT = PRODUCT
  EXPOSURE'
Executability: Fully Executable
Operations:
  - domain: DS
    filter:
      DSCAT: DISPOSITION EVENT
    group:
      - USUBJID
      - EPOCH
    id: $disposition_event_count
    name: DSCAT
    operator: record_count
Outcome:
  Message: More than 1 record exists per subject per EPOCH with DSCAT =
    'DISPOSITION EVENT' and DSSCAT = 'PRODUCT EXPOSURE'.
  Output Variables:
    - USUBJID
    - DSCAT
    - DSSCAT
    - EPOCH
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - EVENTS
  Domains:
    Include:
      - DS
  Use Case: INDH
Sensitivity: Record
