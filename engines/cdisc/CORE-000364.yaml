Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: When DSCAT='PROTOCOL MILESTONE', DSTERM and DSDECOD
                  will contain the same value drawn from the sponsor's controlled
                  terminology. Examples of controlled terms include 'INFORMED CONSENT
                  OBTAINED' and 'RANDOMIZED.' EPOCH should not be populated when DSCAT
                  = "PROTOCOL MILESTONE".
                Document: IG v3.2
                Item: Assumption 3d
                Section: '6.2'
            Origin: SDTM and SDTMIG Conformance Rules
            Rule_Identifier:
              Id: CG0073
              Version: '2'
            Version: '2.0'
        Version: '3.2'
Check:
  all:
    - name: DSCAT
      operator: not_equal_to
      value: PROTOCOL MILESTONE
    - name: EPOCH
      operator: empty
Core:
  Id: CORE-000364
  Status: Published
  Version: '1'
Description: Raise an error when DSCAT = "PROTOCOL MILESTONE" but EPOCH is not equal
  to null.
Executability: Fully Executable
Outcome:
  Message: EPOCH should be null if DSCAT is protocol milestone
  Output_Variables:
    - DSDECOD
    - DSCAT
    - EPOCH
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - EVENTS
  Domains:
    Include:
      - DS
Sensitivity: Record
herald:
  source: CDISC Library API
  catalogs:
    - SDTMIG 3.2
  fetched: '2026-04-03T12:15:16Z'

