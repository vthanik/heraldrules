Check:
  all:
    # 2025-03-13: REMARK that only the first violation is reported when Sensitivity is set to "Dataset"
    # See Github issue https://github.com/cdisc-org/cdisc-rules-engine/issues/831
    - name: '$txgroupsbysetcd'
      operator: 'does_not_contain'
      value: 'SPGRPCD'
    # TODO???: also check the TXVAL is populated for TXPARMCD=SPGRPCD, this however seems not to be part of the rule
Core:
  Id: CORE-000770
  Status: Published
  Version: '1'
Description: 'For each Trial Set (SETCD) in the TX dataset exactly one
  Sponsor-Defined Group Code (SPGRPCD) record should be included.'
Executability: Fully Executable
Operations:
  - domain: TX
    group:
      - SETCD
    id: $txgroupsbysetcd
    name: TXPARMCD
    operator: distinct

Outcome:
  Message: TX dataset should include exactly one TXPARMCD = 'SPGRPCD' record per SETCD.
  Output Variables:
    - SETCD
    - TXPARMCD
    - $txgroupsbysetcd
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - TRIAL DESIGN
  Domains:
    Include:
      - TX
  Use Case: NONCLIN
# CAVEAT: When Sensitivity set to "Dataset" only the an issue is reported for the FIRST "set" for which the rule is violate
# When Sensitivity is set to "Record", an issue is reported for EACH record in the set that violates the rule
Sensitivity: Record
