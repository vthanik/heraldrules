Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  In a pair of corresponding character and numeric variables, the
                  secondary variable must be populated if its primary variable is
                  populated. Uses TRT01P (Planned Treatment for Period 01) and
                  TRT01PN (numeric version) as representative pair in ADSL/ADDL.
                Document: ADaM IG v1.1
                Section: '3.2'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-376
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: TRT01P
      operator: empty
    - name: TRT01PN
      operator: non_empty
Core:
  Id: ADaM-376
  Status: Published
  Version: '1'
Description: >-
  When a character variable (primary) is populated, its corresponding numeric
  secondary variable must also be populated. Uses TRT01P/TRT01PN as representative
  pair. Full coverage requires checking all char/num variable pairs.
Executability: Partially Executable
Outcome:
  Message: 'TRT01P is populated but corresponding numeric variable TRT01PN is missing'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ADSL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "TRT01P and TRT01PN both populated"
    type: positive
    datasets:
      ADSL:
        variables: [STUDYID, USUBJID, TRT01P, TRT01PN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "Placebo", 0]
          - ["CDISCPILOT01", "01-701-1023", "Xanomeline High Dose", 54]
    expected_findings: 0
  - name: "TRT01P populated but TRT01PN is null"
    type: negative
    datasets:
      ADSL:
        variables: [STUDYID, USUBJID, TRT01P, TRT01PN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "Placebo", ""]
    expected_findings: 1
