Authorities:
  - Organization: CDISC
    Standards:
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: "An administrable dose form must be specified according to the
                  extensible Pharmaceutical Dosage Form (C66726) SDTM codelist
                  (e.g. an entry with a code or decode used from the codelist
                  should be consistent with the full entry in the codelist)."
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00179'
              Version: '1'
            Version: '1.0'
        Version: '4.0'
Check:
  all:
    - name: rel_type
      operator: equal_to
      value: 'definition'
    - name: administrableDoseForm.standardCode
      operator: exists
    - name: administrableDoseForm.standardCode
      operator: equal_to
      value: true
    - not:
        all:
          - name: administrableDoseForm.standardCode.codeSystem
            operator: equal_to
            value: 'http://www.cdisc.org'
          - name: administrableDoseForm.standardCode.codeSystemVersion
            operator: is_contained_by
            value: $valid_versions
          - name: $codelist_extensible
            operator: equal_to
            value: true
          - any:
              - all:
                  - name: $code_for_decode_pref_term
                    operator: empty
                  - name: $code_for_decode_value
                    operator: empty
                  - name: $pref_term_for_code
                    operator: empty
                  - name: $value_for_code
                    operator: empty
              - all:
                  - name: $pref_term_for_code
                    operator: non_empty
                  - name: $value_for_code
                    operator: non_empty
                  - any:
                      - name: $code_for_decode_pref_term
                        operator: non_empty
                      - name: $code_for_decode_value
                        operator: non_empty
                  - any:
                      - name: administrableDoseForm.standardCode.code
                        operator: equal_to
                        value: $code_for_decode_pref_term
                      - name: administrableDoseForm.standardCode.code
                        operator: equal_to
                        value: $code_for_decode_value
                  - any:
                      - name: administrableDoseForm.standardCode.decode
                        operator: equal_to
                        value: $pref_term_for_code
                      - name: administrableDoseForm.standardCode.decode
                        operator: equal_to
                        value: $value_for_code

Core:
  Id: 'CORE-000861'
  Status: Published
  Version: '1'
Description: "An administrable dose form must be specified according to the
  extensible Pharmaceutical Dosage Form (C66726) SDTM codelist (e.g. an entry
  with a code or decode used from the codelist should be consistent with the
  full entry in the codelist)."
Executability: Fully Executable
Operations:
  - id: $codelist_code
    map:
      - output: C66726
    operator: map
  - ct_package_types:
      - SDTM
    id: $valid_versions
    operator: valid_codelist_dates
  - codelist_code: $codelist_code
    ct_package_type: SDTM
    id: $codelist_extensible
    operator: codelist_extensible
    version: administrableDoseForm.standardCode.codeSystemVersion
  - codelist_code: $codelist_code
    ct_package_type: SDTM
    id: $value_for_code
    operator: codelist_terms
    returntype: value
    term_code: administrableDoseForm.standardCode.code
    version: administrableDoseForm.standardCode.codeSystemVersion
  - codelist_code: $codelist_code
    ct_package_type: SDTM
    id: $pref_term_for_code
    operator: codelist_terms
    returntype: pref_term
    term_code: administrableDoseForm.standardCode.code
    version: administrableDoseForm.standardCode.codeSystemVersion
  - codelist_code: $codelist_code
    ct_package_type: SDTM
    id: $code_for_decode_pref_term
    operator: codelist_terms
    returntype: code
    term_pref_term: administrableDoseForm.standardCode.decode
    version: administrableDoseForm.standardCode.codeSystemVersion
  - codelist_code: $codelist_code
    ct_package_type: SDTM
    id: $code_for_decode_value
    operator: codelist_terms
    returntype: code
    term_value: administrableDoseForm.standardCode.decode
    version: administrableDoseForm.standardCode.codeSystemVersion
Outcome:
  Message: 'The administrable dose form is not specified according to the
    extensible Pharmaceutical Dosage Form (C66726) SDTM codelist - codeSystem is
    not "http://www.cdisc.org", codeSystemVersion is not a valid terminology
    package date, and/or the code or decode (either as preferred term or as
    submission value) is found in the codelist (case insensitive) but the
    corresponding decode or code does not match the codelist value (case
    sensitive).'
  Output Variables:
    - parent_entity
    - parent_id
    - parent_rel
    - id
    - name
    - $codelist_code
    - $codelist_extensible
    - administrableDoseForm.standardCode.code
    - $code_for_decode_value
    - $code_for_decode_pref_term
    - administrableDoseForm.standardCode.codeSystem
    - administrableDoseForm.standardCode.codeSystemVersion
    - administrableDoseForm.standardCode.decode
    - $value_for_code
    - $pref_term_for_code
Rule Type: Record Data
Scope:
  Entities:
    Include:
      - 'AdministrableProduct'
Sensitivity: Record
