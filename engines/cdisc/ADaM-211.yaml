Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  ABLFN (Analysis Baseline Flag Numeric) must be 1 or null. For
                  record-level numeric flag variables: 1 = yes (this record is the
                  baseline record). Null values are allowed.
                Document: ADaM IG v1.1
                Section: '3.3.5'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-211
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: ABLFN
      operator: non_empty
    - name: ABLFN
      operator: not_equal_to
      value: 1
Core:
  Id: ADaM-211
  Status: Published
  Version: '1'
Description: >-
  ABLFN (Analysis Baseline Flag Numeric) must have a value of 1 or null. A value of
  0 is not valid; null indicates the record is not the analysis baseline.
Executability: Fully Executable
Outcome:
  Message: 'ABLFN has a value other than 1 or null'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "ABLFN has valid value 1"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ABLFN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 1]
          - ["CDISCPILOT01", "01-701-1023", "SODIUM", ""]
    expected_findings: 0
  - name: "ABLFN has invalid value 0"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ABLFN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 0]
    expected_findings: 1
  - name: "ABLFN has invalid value 2"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ABLFN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 2]
    expected_findings: 1
