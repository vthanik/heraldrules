id: AD0209
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: The same subject in ADSL and DM must have the same value for Site ID
  (SITEID). There must be traceability between ADaM and SDTM.
scope:
  classes: []
  domains: ADSL
check:
  all:
    - name: SITEID
      operator: non_empty
outcome:
  message: For the same USUBJID, the ADSL.SITEID != DM.SITEID
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0209
  pmda_category: Error
  ig_versions: []

