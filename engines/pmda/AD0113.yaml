id: AD0113
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: When ARELTM is present, the anchor time variable and ARELTMU must also
  be included in the dataset, and the anchor time variable must be identified in the
  metadata for ARELTM.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: ARELTMU
      operator: empty
    - name: ARELTM
      operator: non_empty
outcome:
  message: ARELTMU is present, but ARELTM is not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0113
  pmda_category: Error
  ig_versions: []

