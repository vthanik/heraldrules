id: SD1072
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Value of Identifying Variable (IDVAR) variable must be populated when
  Related Domain Abbreviation (RDOMAIN) variable value is provided, with the only
  exception of 'DM' value for RDOMAIN.
scope:
  Classes:
    Include: RELATIONSHIP
  Domains:
    Include: SUPP--
  Use_Case: INDH, PROD
check:
  all:
    - name: IDVAR
      operator: empty
    - name: IDVARVAL
      operator: non_empty
outcome:
  message: Missing IDVAR value when RDOMAIN value is provided
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1072
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000135

