Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If a Time variable is indicated to be imputed by population of an
                  Imputation Flag Variable (*TMF), the corresponding time variable
                  must be populated.
                Document: ADaM IG v1.1
                Section: "3.2"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-264
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: ATMF
      operator: empty
    - name: ATM
      operator: non_empty
Core:
  Id: ADaM-264
  Status: Published
  Version: "1"
Description: >-
  If a Time variable is indicated to be imputed by population of an
  Imputation Flag Variable (*TMF), the corresponding time variable (*TM)
  must be populated.
Executability: Partially Executable
Outcome:
  Message: "*TMF is populated but *TM is not populated"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
      - OCCURRENCE DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: ATMF and ATM both populated (valid)
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ATMF, ATM]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, H, "10:00"]
    expected_findings: 0
  - name: ATMF populated but ATM missing (violation)
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ATMF, ATM]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, H, ""]
    expected_findings: 1
