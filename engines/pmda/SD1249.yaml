id: SD1249
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: EXDOSE must be equal to 0 when EXTRT = 'PLACEBO'.
scope:
  Classes:
    Include: INTERVENTIONS
  Domains:
    Include: EX
check:
  all:
    - name: EXTRT
      operator: not_equal_to
      value: PLACEBO
    - name: EXDOSE
      operator: equal_to
      value: 0
outcome:
  message: EXDOSE does not equal 0 when EXTRT = 'PLACEBO'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1249
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000005

