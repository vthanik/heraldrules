id: AD0204
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: The same subject in ADSL and DM must have the same value for Age (AGE).
  There must be traceability between ADaM and SDTM.
scope:
  classes: []
  domains: ADSL
check:
  all:
    - name: AGE
      operator: empty
    - name: AGEU
      operator: non_empty
outcome:
  message: For the same USUBJID, the ADSL.AGE != DM.AGE
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0204
  pmda_category: Error
  ig_versions: []

