description: When Origin = Predecessor and the Predecessor column points at a
  specific source variable (pattern "<DS>.<VAR>"), the row's Codelist must equal
  the source variable's Codelist whenever the source has one. Enforces codelist
  inheritance so derived predecessor copies cannot silently drift onto a
  different (or stray) codelist ID.
