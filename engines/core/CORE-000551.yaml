Check:
  any:
    - all:
        - name: USUBJID
          operator: non_empty
        - name: QNAM
          operator: is_not_unique_set
          value:
            - USUBJID
            - RDOMAIN
            - IDVAR
            - IDVARVAL
    - all:
        - name: POOLID
          operator: non_empty
        - name: QNAM
          operator: is_not_unique_set
          value:
            - POOLID
            - RDOMAIN
            - IDVAR
            - IDVARVAL
Core:
  Id: CORE-000551
  Status: Published
  Version: '1'
Description: There may be only be one record in a SUPP-- dataset with the same
  QNAM value within USUBJID or POOLID, RDOMAIN, IDVAR, IDVARVAL.
Executability: Fully Executable
Outcome:
  Message: Duplicate value of the combination of USUBJID or POOLID, RDOMAIN,
    IDVAR, IDVARVAL with QNAM
  Output Variables:
    - RDOMAIN
    - IDVAR
    - IDVARVAL
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - RELATIONSHIP
  Domains:
    Include:
      - SUPP--
  Use Case: NONCLIN
Sensitivity: Record
