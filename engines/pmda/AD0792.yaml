id: AD0792
version: 1
status: Published
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Reference
description: >
  On a given record, a variable with a suffix of SDT has a value greater than
  a value of a variable with the same root and a suffix of EDT, and both
  variables are populated. (Paired *SDT / *EDT date variables must obey
  start <= end.)
scope:
  classes: []
  domains:
    - ADSL
    - BDS
    - OCCDS
    - ADAE
    - ADAMOTHER
outcome:
  message: "*SDT is greater than *EDT"
  severity: Error
provenance:
  source_doc: P21 Community ADaM Validation Rules
  authority: Herald
  p21_reference: AD0792
  ig_versions: []
notes: >
  Deferred to Reference pending a herald `paired_suffix_date_order` operator
  (not yet implemented). Activation plan in HANDOFF_TO_HERALD.md section 4.
