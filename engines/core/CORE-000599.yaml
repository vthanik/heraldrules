Check:
  all:
    # Remark: In SEND, "no test article (as described in EXTRT) is administered", is depicted as EXDOSE=0
    # and NOT by EXDOSE being empty. Information from Christy Kubin 2023-03-20
    - name: EXDOSE
      operator: equal_to
      value: 0
    - name: EXLOT
      operator: non_empty
Core:
  Id: CORE-000599
  Status: Published
  Version: '1'
Description: If no test article (as described in EXTRT) is administered (i.e.,
  EXDOSE is 0), EXLOT is null.
Executability: Fully Executable
Outcome:
  Message: EXDOSE is 0, EXLOT may not be populated
  Output Variables:
    - EXDOSE
    - EXLOT
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - INTERVENTIONS
  Domains:
    Include:
      - EX
Sensitivity: Record
