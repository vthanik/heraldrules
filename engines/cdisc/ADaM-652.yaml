Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If ONTRTwFL (On-Treatment Flag for Window w) is included, then ONTRTFL must also be included.
                Document: ADaM IG v1.1
                Section: '4.3'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-652
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: ONTRT1FL
      operator: empty
    - name: ONTRTFL
      operator: non_empty
Core:
  Id: ADaM-652
  Status: Published
  Version: '1'
Description: >-
  When ONTRT1FL (window-specific on-treatment flag) is present, ONTRTFL (overall on-treatment flag) must also be present.
Executability: Partially Executable
Outcome:
  Message: 'ONTRT1FL is present but ONTRTFL is missing'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "ONTRT1FL and ONTRTFL both present"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ONTRT1FL, ONTRTFL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Y", "Y"]
    expected_findings: 0
  - name: "ONTRT1FL present but ONTRTFL missing"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ONTRT1FL, ONTRTFL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Y", ""]
    expected_findings: 1
