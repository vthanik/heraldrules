Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  When all 3 variables are populated and BASE != 0, Percent Change
                  to Baseline (PBCHG) must equal 100 * (AVAL - BASE) / BASE.
                Document: ADaM IG v1.1
                Section: "4.4"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-586
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: PBCHG
      operator: empty
    - name: BASE
      operator: empty
    - name: AVAL
      operator: empty
    - name: BASE
      operator: equal_to
      value: 0
    - name: PBCHG
      operator: within_tolerance_of_formula
      value: 100 * (AVAL - BASE) / BASE
      tolerance: 0.01
Core:
  Id: ADaM-586
  Status: Published
  Version: "1"
Description: >-
  When all 3 variables are populated and BASE != 0, Percent Change to
  Baseline (PBCHG) must equal 100 * (AVAL - BASE) / BASE.
Executability: Fully Executable
Outcome:
  Message: "PBCHG != 100 * (AVAL - BASE) / BASE"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: PBCHG = 100*(AVAL-BASE)/BASE (valid)
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, BASE, PBCHG]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 154, 140, 10.0]
    expected_findings: 0
  - name: PBCHG incorrect (violation)
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, BASE, PBCHG]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 154, 140, 5.0]
    expected_findings: 1
