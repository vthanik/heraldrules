Core:
  Id: FDAV-SD1390
  Status: Reference
  Version: '1'
Description: Day of Obs Rel to Challenge Agent (--CHDY) variable value should not
  be imputed. It may only be populated, when both Date/Time of Collection (--DTC)
  and Date/Time of First Challenge Agent Admin (RFCSTDTC) variables values are provided
  and both of them include complete date parts.
Check: []
