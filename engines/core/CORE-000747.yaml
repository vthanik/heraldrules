# Variable: RACE, CRACE
# Condition: SUPPDM CRACE = HATIAN or NEGRO
# Rule: DM.RACE = BLACK OR AFRICAN AMERICAN
Authorities:
  - Organization: FDA
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: The term "Hatian or Negro" can be used collect race data. If the
                  term "Hatian or Negro" is collected, it should be mapped to
                  the controlled terminology "BLACK OR AFRICAN AMERICAN" for
                  submission.
                Document: FDA
                Section: FDAB060
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB6001
              Version: '1'
            Version: '1.5'
        Version: '3.2'
