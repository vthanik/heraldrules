Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  BCHG represents change to baseline in the direction where BASE-AVAL is the desired direction (opposite convention to CHG). Added in v1.2 Table 3.3.4.1.
                Document: ADaM IG v1.2
                Section: '3.3.4'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-1027
              Version: '1'
            Version: '1.0'
        Version: '1.2'
Check:
  all:
    - name: BCHG
      operator: not_numeric
Core:
  Id: ADaM-1027
  Status: Published
  Version: '1'
Description: >-
  BCHG (Change from Baseline where lower BASE-AVAL is desired) must be a numeric variable when present in a BDS dataset.
Executability: Partially Executable
Outcome:
  Message: 'BCHG must be numeric'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.2"]
  source: Herald-originated (ADaM-IG v1.2 gap-fill)
  catalogs:
    - ADaMIG 1.2
  fetched: '2026-04-12'

tests:
  - name: "BCHG has numeric value"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BCHG]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "1.5"]
          - ["CDISCPILOT01", "01-701-1023", "SODIUM", "-0.5"]
    expected_findings: 0
  - name: "BCHG has non-numeric value"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BCHG]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "HIGH"]
    expected_findings: 1
