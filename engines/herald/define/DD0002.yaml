# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.4.3
id: DD0002
version: 1
status: Published
standard: Define-XML
category: Study Metadata
sensitivity: Study
executability: Fully Executable
description: >
  StudyDescription is required and must be non-empty in the Define sheet.
scope:
  classes: []
  domains: []
check:
  all:
    - name: StudyDescription
      operator: empty
outcome:
  message: "StudyDescription is missing or empty in the Define sheet. This is required for all Define-XML documents."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.4.3"
  cited_guidance: >
    StudyDescription -- Required. Cardinality: Exactly one. A text description of the contents of the Study.
