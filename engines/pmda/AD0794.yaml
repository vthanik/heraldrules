  domains:
    - ADSL
    - BDS
    - OCCDS
    - ADAE
    - ADAMOTHER
outcome:
  message: "*SDTM is greater than *EDTM"
  severity: Error
provenance:
  source_doc: P21 Community ADaM Validation Rules
  authority: Herald
  p21_reference: AD0794
  ig_versions: []
notes: >
  Deferred to Reference pending a herald `paired_suffix_datetime_order`
  operator (not yet implemented). Activation plan in HANDOFF_TO_HERALD.md
  section 4.
