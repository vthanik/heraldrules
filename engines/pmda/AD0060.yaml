id: AD0060
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Reference
description: The SAS TYPE for *DTM variable must be equal Num. HERALD NOTE:
  demoted to Reference because the check requires SAS column metadata
  (TYPE attribute) rather than string-value validation. R's POSIXct
  representation does not round-trip through the ISO-8601-T regex the
  YAML encodes, so the previous check fired on every populated row of
  ADVS/ADLB/ADQS. Promote back once column-metadata-aware operators
  land in the executor.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: ADTM
      operator: empty
    - name: ADTM
      operator: matches_regex
      value: '^\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[01])T([0-1][0-9]|2[0-3]):[0-5][0-9]'
outcome:
  message: '*DTM is not a numeric variable'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0060
  pmda_category: Error
  ig_versions: []

