# Variable: --SOC, -SOCCD
# Condition:
# Rule: --SOCCD and --SOC have a one-to-one relationship 
Authorities:
  - Organization: FDA
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: All paired variables should have a one-to-one relationship.
                  Examples include short name and name of test; parameter name
                  and parameter code or number; variable name and variable
                  label, etc.
                Document: FDA
                Section: FDAB009
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB0911
              Version: '1'
            Version: '1.5'
        Version: '3.2'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: All paired variables should have a one-to-one relationship.
                  Examples include short name and name of test; parameter name
                  and parameter code or number; variable name and variable
                  label, etc.
                Document: FDA
                Section: FDAB009
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB0911
              Version: '1'
            Version: '1.5'
        Version: '3.3'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: All paired variables should have a one-to-one relationship.
                  Examples include short name and name of test; parameter name
                  and parameter code or number; variable name and variable
                  label, etc.
                Document: FDA
                Section: FDAB009
            Origin: FDA Business Rules
