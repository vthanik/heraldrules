Authorities:
  - Organization: CDISC
    Standards:
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: "The unit of a planned age is expected to be specified using
                  terms from the Age Unit (C66781) SDTM codelist."
                Document: "USDM_CORE_Rules.xlsx"
            Origin: "USDM Conformance Rules"
            Rule Identifier:
              Id: "DDF00111"
              Version: "1"
            Version: "1.0"
        Version: "3.0"
Check:
  all:
    - name: rel_type
      operator: equal_to
      value: "definition"
    - name: plannedAge.unit
      operator: equal_to
      value: true
    - not:
        all:
          - name: plannedAge.unit.codeSystem
            operator: equal_to
            value: "http://www.cdisc.org"
          - name: plannedAge.unit.codeSystemVersion
            operator: is_contained_by
            value: $valid_versions
          - any:
              - all:
                  - name: $pref_term_for_code
                    operator: non_empty
                  - name: $value_for_code
                    operator: non_empty
                  - any:
                      - name: $code_for_decode_pref_term
                        operator: non_empty
                      - name: $code_for_decode_value
                        operator: non_empty
                  - any:
                      - name: plannedAge.unit.code
                        operator: equal_to
                        value: $code_for_decode_pref_term
                      - name: plannedAge.unit.code
                        operator: equal_to
                        value: $code_for_decode_value
                  - any:
                      - name: plannedAge.unit.decode
                        operator: equal_to
                        value: $pref_term_for_code
                      - name: plannedAge.unit.decode
                        operator: equal_to
                        value: $value_for_code
              - all:
                  - name: $codelist_extensible
                    operator: equal_to
                    value: true
                  - name: $code_for_decode_pref_term
                    operator: empty
                  - name: $code_for_decode_value
                    operator: empty
                  - name: $pref_term_for_code
                    operator: empty
                  - name: $value_for_code
                    operator: empty
Core:
  Id: "CORE-000906"
  Status: Published
  Version: "1"
Description: "The unit of a planned age is expected to be specified using terms
  from the Age Unit (C66781) SDTM codelist."
Executability: Partially Executable - Possible Overreporting
Operations:
  - id: $codelist_code
    map:
      - output: C66781
    operator: map
  - ct_package_types:
      - SDTM
    id: $valid_versions
    operator: valid_codelist_dates
  - codelist_code: $codelist_code
    ct_package_type: SDTM
    id: $codelist_extensible
    operator: codelist_extensible
    version: plannedAge.unit.codeSystemVersion
  - codelist_code: $codelist_code
    ct_package_type: SDTM
    id: $value_for_code
    operator: codelist_terms
    returntype: value
    term_code: plannedAge.unit.code
    version: plannedAge.unit.codeSystemVersion
  - codelist_code: $codelist_code
    ct_package_type: SDTM
    id: $pref_term_for_code
    operator: codelist_terms
    returntype: pref_term
    term_code: plannedAge.unit.code
    version: plannedAge.unit.codeSystemVersion
  - codelist_code: $codelist_code
    ct_package_type: SDTM
    id: $code_for_decode_pref_term
    operator: codelist_terms
    returntype: code
    term_pref_term: plannedAge.unit.decode
    version: plannedAge.unit.codeSystemVersion
  - codelist_code: $codelist_code
    ct_package_type: SDTM
    id: $code_for_decode_value
    operator: codelist_terms
    returntype: code
    term_value: plannedAge.unit.decode
    version: plannedAge.unit.codeSystemVersion
Outcome:
  Message: 'The unit of the planned age is not specified using the Age Unit
    (C66781) SDTM codelist - codeSystem is not "http://www.cdisc.org",
    codeSystemVersion is not a valid terminology package date, the code or
    decode (either as preferred term or as submission value) is found in the
    codelist (case insensitive) but the corresponding decode or code does not
    match the codelist value (case sensitive), and/or neither code nor decode is
    found in the codelist.'
  Output Variables:
    - parent_entity
    - parent_id
    - parent_rel
    - id
    - name
    - $codelist_code
    - $codelist_extensible
    - plannedAge.unit.code
    - $code_for_decode_value
    - $code_for_decode_pref_term
    - plannedAge.unit.codeSystem
    - plannedAge.unit.codeSystemVersion
    - plannedAge.unit.decode
    - $value_for_code
    - $pref_term_for_code
Rule Type: Record Data
Scope:
  Entities:
    Include:
      - "StudyDesignPopulation"
      - "StudyCohort"
Sensitivity: Record
