id: AD0274
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: If Study Drug Dose at AE Onset Units (DOSAEONU) or Study Drug Dose at
  AE Onset (DOSEAEON) variable is populated, then both variables must be populated
  together.
scope:
  classes: []
  domains:
    - ADAE
    - ADAMOTHER
check:
  all:
    - name: DOSAEONU
      operator: empty
    - name: DOSAEONA
      operator: non_empty
outcome:
  message: Only one of DOSEAEON, DOSAEONU is populated
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0274
  pmda_category: Error
  ig_versions: []

