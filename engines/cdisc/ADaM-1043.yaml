Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  ATOXDSCL provides the low-direction toxicity description for bi-directional grading. Added in v1.2 Table 3.3.7.1.
                Document: ADaM IG v1.2
                Section: '3.3.7'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-1043
              Version: '1'
            Version: '1.0'
        Version: '1.2'
Check:
  all:
    - name: ATOXDSCL
      operator: not_character
Core:
  Id: ADaM-1043
  Status: Published
  Version: '1'
Description: >-
  ATOXDSCL (Analysis Toxicity Description Low) must be a character variable when present.
Executability: Partially Executable
Outcome:
  Message: 'ATOXDSCL must be a character variable'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.2"]
  source: Herald-originated (ADaM-IG v1.2 gap-fill)
  catalogs:
    - ADaMIG 1.2
  fetched: '2026-04-12'

tests:
  - name: "ATOXDSCL has character description value"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ATOXDSCL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Decreased"]
          - ["CDISCPILOT01", "01-701-1023", "SODIUM", "Normal"]
    expected_findings: 0
  - name: "ATOXDSCL has numeric-only value (not character)"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ATOXDSCL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "1"]
    expected_findings: 1
