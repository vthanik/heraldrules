id: AD0206
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: The same subject in ADSL and DM must have the same value for Sex (SEX).
  There must be traceability between ADaM and SDTM.
scope:
  classes: []
  domains: ADSL
check:
  all:
    - name: SEX
      operator: non_empty
outcome:
  message: For the same USUBJID, the ADSL.SEX != DM.SEX
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0206
  pmda_category: Error
  ig_versions: []

