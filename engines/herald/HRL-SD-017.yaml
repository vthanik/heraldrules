id: HRL-SD-017
version: 1
status: Published
standard: SDTM
category: Value
sensitivity: Record
executability: Fully Executable
description: >
  When LBORRES contains an inequality operator (< > <= >=), LBSTRESC must
  also preserve the operator. Stripping the operator loses clinically
  meaningful limit-of-detection information.
scope:
  classes: []
  domains:
    - LB
check:
  all:
    - name: LBORRES
      operator: does_not_match_regex
      value: '^[<>]'
    - name: LBSTRESC
      operator: matches_regex
      value: '^[<>]'
outcome:
  message: LBORRES contains inequality operator but LBSTRESC does not preserve it
  severity: Error
provenance:
  source_doc: StudySAS Blog — 7 Mistakes in LB Unit Conversion (2026-04)
  authority: Herald
  reference_url: https://studysas.blogspot.com/2026/04/7-mistakes-in-lb-unit-conversion-that.html

tests:
  - name: "Inequality operator preserved in LBSTRESC"
    type: positive
    datasets:
      LB:
        variables: [STUDYID, USUBJID, LBTESTCD, LBORRES, LBSTRESC]
        records:
          - ["CDISCPILOT01", "01-701-1015", "CRP", "<0.10", "<1.0"]
          - ["CDISCPILOT01", "01-701-1023", "CRP", "2.5", "25.0"]
    expected_findings: 0
  - name: "Inequality operator stripped from LBSTRESC"
    type: negative
    datasets:
      LB:
        variables: [STUDYID, USUBJID, LBTESTCD, LBORRES, LBSTRESC]
        records:
          - ["CDISCPILOT01", "01-701-1015", "CRP", "<0.10", "1.0"]
    expected_findings: 1
