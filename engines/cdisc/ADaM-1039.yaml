Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  BTOXGRL represents the baseline toxicity grade in the low direction. Added in v1.2 Table 3.3.7.1.
                Document: ADaM IG v1.2
                Section: '3.3.7'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-1039
              Version: '1'
            Version: '1.0'
        Version: '1.2'
Check:
  all:
    - name: BTOXGRL
      operator: not_character
Core:
  Id: ADaM-1039
  Status: Published
  Version: '1'
Description: >-
  BTOXGRL (Baseline Toxicity Grade Low) must be a character variable for baseline low-direction bi-directional toxicity.
Executability: Partially Executable
Outcome:
  Message: 'BTOXGRL must be a character toxicity grade variable'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.2"]
  source: Herald-originated (ADaM-IG v1.2 gap-fill)
  catalogs:
    - ADaMIG 1.2
  fetched: '2026-04-12'

tests:
  - name: "BTOXGRL has character toxicity grade value"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BTOXGRL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Grade 1"]
          - ["CDISCPILOT01", "01-701-1023", "SODIUM", "Grade 2"]
    expected_findings: 0
  - name: "BTOXGRL has numeric-only value (not character)"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BTOXGRL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "1"]
    expected_findings: 1
