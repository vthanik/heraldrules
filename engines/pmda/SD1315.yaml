id: SD1315
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Reported Term for the Disposition Event (DSTERM) and Standardized Disposition
  Term (DSDECOD) should contain the same value when Category for Disposition Event
  (DSCAT) is 'PROTOCOL MILESTONE'.
scope:
  Classes:
    Include: EVENTS
  Domains:
    Include: DS
check:
  all:
    - name: DSCAT
      operator: not_equal_to
      value: PROTOCOL MILESTONE
      value_is_literal: yes
    - name: DSTERM
      operator: equal_to
      value: DSDECOD
outcome:
  message: DSDECOD is not the same as DSTERM when DSCAT='PROTOCOL MILESTONE'
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1315
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000322

