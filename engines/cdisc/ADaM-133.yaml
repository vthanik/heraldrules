Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  When AVAL, A1LO, and R2A1LO are all populated and A1LO does not equal 0, Ratio to Analysis Range y Lower Limit (R2AyLO) must equal AVAL/AyLO.
                Document: ADaM IG v1.1
                Section: '3.3.6'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-133
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: R2A1LO
      operator: empty
    - name: A1LO
      operator: empty
    - name: AVAL
      operator: empty
    - name: A1LO
      operator: equal_to
      value: 0
    - name: R2A1LO
      operator: within_tolerance_of_formula
      value: AVAL / A1LO
      tolerance: 0.001
Core:
  Id: ADaM-133
  Status: Published
  Version: '1'
Description: >-
  R2A1LO must equal AVAL divided by A1LO when A1LO != 0.
Executability: Fully Executable
Outcome:
  Message: 'R2A1LO does not equal AVAL / A1LO (ratio to lower limit calculation error)'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "R2A1LO = AVAL/A1LO (correct)"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, A1LO, R2A1LO]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 145.0, 130.0, 1.1154]
    expected_findings: 0
  - name: "R2A1LO does not equal AVAL/A1LO"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, A1LO, R2A1LO]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 145.0, 130.0, 2.0]
    expected_findings: 1
