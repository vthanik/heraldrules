Core:
  Id: FDAV-SD1337
  Status: Reference
  Version: '1'
Description: A Link ID (RSLNKID) value for a response assessment that is referenced
  in the Disease Response (RS) domain for a subject must also be present in the Tumor
  Results (TR) domain for the appropriate measurement records for that subject.
Check: []
Outcome:
  Message: RSLNKID value does not exist in TR domain
Rule Type: Record Data
Sensitivity: Record
