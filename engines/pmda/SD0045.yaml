id: SD0045
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Character Result/Finding in Std Units (--STRESC) should be provided when
  Result Category (--RESCAT) is specified.
scope:
  Classes:
    Include: FINDINGS
  Domains:
    Include: ALL
  Use_Case: INDH, PROD
check:
  all:
    - name: --RESCAT
      operator: empty
    - name: --STRESC
      operator: non_empty
outcome:
  message: Missing value for --STRESC when --RESCAT is populated
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0045
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000101

