id: AD0586
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: When all 3 variables are populated and base &lt;&gt; 0, Percent Change
  to Baseline (PBCHG) must equal the difference of Baseline Value (BASE) minus Analysis
  Value (AVAL) divided by the analysis value (AVAL), expressed as a percentage.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: PBCHG
      operator: empty
    - name: BASE
      operator: empty
    - name: AVAL
      operator: empty
    - name: BASE
      operator: equal_to
      value: 0
    - name: PBCHG
      operator: within_tolerance_of_formula
      value: 100 * (AVAL - BASE) / BASE
      tolerance: 0.01
outcome:
  message: 'Calculation issue: PBCHG != (BASE - AVAL)/AVAL * 100'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0586
  pmda_category: Error
  ig_versions: []

