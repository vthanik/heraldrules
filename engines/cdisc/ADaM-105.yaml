Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  Within a study, all APERIODC values must be the same for each
                  unique value of APERIOD when the primary variable APERIOD is populated.
                Document: ADaM IG v1.1
                Section: "4.2"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-105
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: APERIOD
      operator: non_empty
    - name: APERIODC
      operator: non_empty
    - name: APERIODC
      operator: not_consistent_with_variable
      value: APERIOD
Core:
  Id: ADaM-105
  Status: Published
  Version: "1"
Description: >-
  Within a study, all APERIODC values must be the same for each unique value
  of APERIOD when the primary variable APERIOD is populated.
Executability: Fully Executable
Outcome:
  Message: "Inconsistent value for APERIODC across APERIOD values"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
      - OCCURRENCE DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: APERIODC consistent for APERIOD value
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, APERIOD, APERIODC]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 1, "Period 1"]
          - [CDISCPILOT01, 01-701-1028, SODIUM, 1, "Period 1"]
    expected_findings: 0
  - name: APERIODC inconsistent for same APERIOD value
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, APERIOD, APERIODC]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 1, "Period 1"]
          - [CDISCPILOT01, 01-701-1028, SODIUM, 1, "Phase 1"]
    expected_findings: 1
