id: AD0102
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: The Analysis Period (APERIOD) values will be a number like 01. There
  must be a corresponding Planned Treatment for Period xx variable (like TRT01P) in
  ADSL dataset.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: APERIOD
      operator: non_empty
    - name: TRT01P
      operator: empty
outcome:
  message: There is no TRTxxP variable in ADSL for every unique xx value of APERIOD
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0102
  pmda_category: Warning
  ig_versions: []

