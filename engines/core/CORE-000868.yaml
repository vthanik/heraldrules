Authorities:
  - Organization: CDISC
    Standards:
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'Each schedule timeline must contain at least one anchor (fixed
                  time) - i.e., at least one scheduled activity instance that is
                  referenced by a Fixed Reference timing.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00009'
              Version: '1'
            Version: '1.0'
        Version: '3.0'
  - Organization: CDISC
    Standards:
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'Each schedule timeline must contain at least one anchor (fixed
                  time) - i.e., at least one scheduled activity instance that is
                  referenced by a Fixed Reference timing.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00009'
              Version: '1'
            Version: '1.0'
        Version: '4.0'
Check:
  all:
    - name: instanceType
      operator: equal_to
      value: 'ScheduleTimeline'
    - name: rel_type
      operator: equal_to
      value: 'definition'
    - any:
        - name: $fixed_ref_sched_ins
          operator: empty
        - name: $instances
          operator: empty
        - name: $fixed_ref_sched_ins
          operator: shares_no_elements_with
          value: $instances
Core:
  Id: 'CORE-000868'
  Status: Published
  Version: '1'
Description: 'Each schedule timeline must contain at least one anchor (fixed
  time) - i.e., at least one scheduled activity instance that is referenced by a
  Fixed Reference timing.'
Executability: Fully Executable
Operations:
  - domain: Timing
    filter:
      rel_type: 'definition'
      type.code: 'C201358'
    group:
      - parent_id
    group_aliases:
      - id
    id: $fixed_ref_sched_ins
    name: relativeFromScheduledInstanceId
    operator: distinct
  - domain: ScheduledActivityInstance
    filter:
      rel_type: 'definition'
    group:
      - parent_id
    group_aliases:
      - id
    id: $instances
    name: id
    operator: distinct
Outcome:
  Message: 'The schedule timeline does not contain an anchor (i.e., a scheduled
    activity instance that is referenced by a Fixed Reference timing).'
  Output Variables:
    - parent_entity
    - parent_id
    - parent_rel
    - id
    - name
Rule Type: Record Data
Scope:
  Entities:
    Include:
      - 'ScheduleTimeline'
Sensitivity: Record
