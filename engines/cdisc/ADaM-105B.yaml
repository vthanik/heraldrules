Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  Within a study, all APERIODC values must be the same for each
                  unique value of APERIOD (PMDA variant B: APERIODC must be consistent
                  with APERIOD across all datasets).
                Document: ADaM IG v1.1
                Section: "4.2"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-105B
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: APERIOD
      operator: empty
    - name: APERIODC
      operator: non_empty
Core:
  Id: ADaM-105B
  Status: Published
  Version: "1"
Description: >-
  Within a study, all APERIODC values must be the same for each unique value
  of APERIOD. Variant B: when APERIOD is populated, APERIODC must also be
  populated.
Executability: Fully Executable
Outcome:
  Message: "APERIOD is present but APERIODC is not present"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
      - OCCURRENCE DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: APERIOD and APERIODC both present (valid)
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, APERIOD, APERIODC]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 1, "Period 1"]
    expected_findings: 0
  - name: APERIOD present but APERIODC missing (violation)
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, APERIOD, APERIODC]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 1, ""]
    expected_findings: 1
