id: AD0005B
version: 2
status: Reference
standard: ADaM
category: Conformance
sensitivity: Record
executability: Partially Executable
description: 'A variable with a suffix of FL must have value that is Y, N or null
  (Exception 1: ABLFL, ANLzzFL. Exception 2: Population flags COMPLFL, FASFL, ITTFL,
  PPROTFL, SAFFL, RANDFL, ENRLFL cannot be null and at least 1 must be included in
  ADSL).'
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: ONTRTFL
      operator: non_empty
    - name: ONTRTFL
      operator: not_in
      value:
        - 'Y'
        - 'N'
outcome:
  message: '*FL value is not Y, N or null'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0005B
  pmda_category: Error
  ig_versions: []

