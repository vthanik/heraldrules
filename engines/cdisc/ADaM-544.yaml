Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If Baseline Category y (N) (BASECAyN) variable is used, then the corresponding Baseline Category y (BASECAy) must also be used.
                Document: ADaM IG v1.1
                Section: '3.3.5'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-544
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: BASECA1N
      operator: empty
    - name: BASECA1
      operator: non_empty
Core:
  Id: ADaM-544
  Status: Published
  Version: '1'
Description: >-
  When BASECA1N is present, BASECA1 must also be present.
Executability: Partially Executable
Outcome:
  Message: 'BASECA1N is populated but BASECA1 is missing'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "BASECA1N and BASECA1 both present"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BASECA1, BASECA1N]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "NORMAL", 1]
    expected_findings: 0
  - name: "BASECA1N present but BASECA1 missing"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BASECA1, BASECA1N]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "", 1]
    expected_findings: 1
