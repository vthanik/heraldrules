id: SD0043
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Treatment Vehicle (--TRTV) should be provided when Treatment Vehicle
  Amount (--VAMT) is specified.
scope:
  Classes:
    Include: INTERVENTIONS
  Domains:
    Include: ALL
  Use_Case: INDH
check:
  all:
    - name: --VAMT
      operator: empty
    - name: --TRTV
      operator: non_empty
outcome:
  message: Missing value for --TRTV when --VAMT is not null
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0043
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000100

