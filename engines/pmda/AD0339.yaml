id: AD0339
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: When Multi-Response Criterion y Evaluation (MCRITyML) variable value
  is populated, then its corresponding Analysis Multi-Response Criterion y (MCRITy)
  variable must be also populated.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: MCRIT1ML
      operator: not_equal_to
      value: 'Y'
    - name: MCRIT1
      operator: non_empty
outcome:
  message: MCRITy is not populated when MCRITyML is populated
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0339
  pmda_category: Error
  ig_versions: []

