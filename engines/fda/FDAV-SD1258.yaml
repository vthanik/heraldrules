Core:
  Id: FDAV-SD1258
  Status: Reference
  Version: '1'
Description: RFSTDTC must be null when actual arm indicates that the subject is a
  screen failure ('Screen Failure'), was not assigned to an arm ('Not Assigned'),
  was not treated ('NOTTRT'), or actual arm is null. This rule applies to studies
  where RFSTDTC is associated with a treatment date.
Check: []
Outcome:
  Message: RFSTDTC is populated for subject who did not receive treatment
Rule Type: Record Data
Sensitivity: Record
