Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  When AVAL, BASE, and R2BASE are all populated and BASE != 0, R2BASE must equal AVAL/BASE (single-dataset variant).
                Document: ADaM IG v1.1
                Section: '3.3.5'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-132-SD
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: R2BASE
      operator: empty
    - name: BASE
      operator: empty
    - name: AVAL
      operator: empty
    - name: BASE
      operator: equal_to
      value: 0
    - name: R2BASE
      operator: within_tolerance_of_formula
      value: AVAL / BASE
      tolerance: 0.001
Core:
  Id: ADaM-132-SD
  Status: Published
  Version: '1'
Description: >-
  Single-dataset variant: R2BASE = AVAL/BASE when BASE != 0.
Executability: Fully Executable
Outcome:
  Message: 'R2BASE does not equal AVAL/BASE (single-dataset check)'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "R2BASE = AVAL/BASE (single dataset)"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, BASE, R2BASE]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 145.0, 140.0, 1.0357]
    expected_findings: 0
  - name: "R2BASE wrong (single dataset)"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, BASE, R2BASE]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 145.0, 140.0, 5.0]
    expected_findings: 1
