id: AD0143
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: PARAMCD value must be a max of 8 characters, start with a letter A-Z
  or underscore, and not contain anything other than letters, numbers, or underscore
  (_).
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: PARAMCD
      operator: empty
    - name: PARAMCD
      operator: matches_regex
      value: '^[A-Za-z_][A-Za-z0-9_]{0,7}$'
outcome:
  message: Illegal PARAMCD value
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0143
  pmda_category: Error
  ig_versions: []

