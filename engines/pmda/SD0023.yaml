id: SD0023
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Completion Status (--STAT) should be set to 'NOT DONE' when Reason Not
  Done (--REASND) is populated.
scope:
  Classes:
    Include: ALL
  Domains:
    Exclude:
      - EX
      - AE
      - DS
      - DV
      - IE
  Use_Case: INDH, PROD
check:
  all:
    - name: --REASND
      operator: empty
    - name: --STAT
      operator: equal_to
      value: NOT DONE
outcome:
  message: Missing value for --STAT when --REASND is provided
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0023
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000225

