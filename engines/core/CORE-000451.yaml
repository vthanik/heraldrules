Core:
  Id: CORE-000451
  Status: Published
  Version: '1'
Description: SET and SETCD should have a one-to-one relationship.
Executability: Fully Executable
Outcome:
  Message: SET and SETCD do not have a one-to-one relationship.
  Output Variables:
    - SET
    - SETCD
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - TRIAL DESIGN
  Domains:
    Include:
      - TX
  Use Case: NONCLIN
Sensitivity: Record
