id: HRL-CT-0156
version: 1
status: Published
standard: SDTM
category: Controlled Terminology
sensitivity: Record
executability: Fully Executable
description: CVPRCIND (Cardiac Procedure Indication) must contain valid extensible
  codelist terms (new terms allowed).
scope:
  classes: []
  domains: []
check:
  all:
    - name: CVPRCIND
      operator: in
      value:
        - CANDIDATE TO RECEIVE CARDIAC TRANSPLANT
        - CARDIAC ARREST/ARRHYTHMIA ETIOLOGY UNKNOWN
        - CARDIOMYOPATHY
        - CHRONIC TOTAL OCCLUSION
        - DONOR FOR CARDIAC TRANSPLANT
        - END OF EXPECTED BATTERY LIFE
        - FAULTY CONNECTOR/HEADER
        - GENERATOR IS BEING REPLACED AT THE TIME OF LEAD REVISION
        - GENERATOR MALFUNCTION
        - IMMEDIATE PERCUTANEOUS CORONARY INTERVENTION (PCI) FOR ST ELEVATION MYOCARDIAL
          INFARCTION (STEMI)
        - INFECTION
        - LEAD EROSION
        - LEFT VENTRICULAR SYSTOLIC DYSFUNCTION
        - MANUFACTURER RECALL
        - MANUFACTURER RECOGNIZED A RECURRING PERFORMANCE FAILURE
        - MEDICAL CONDITION OR PROCEDURE AFFECTS IMPLANTATION SITE
        - MEDICAL OR SURGICAL PROCEDURE REQUIRING RELOCATION OF LEAD
        - PERCUTANEOUS CORONARY INTERVENTION (PCI) FOR HIGH RISK NON-ST ELEVATION
          MYOCARDIAL INFARCTION OR UNSTABLE ANGINA
        - PERCUTANEOUS CORONARY INTERVENTION (PCI) FOR ST ELEVATION MYOCARDIAL INFARCTION
          (STEMI) (STABLE AFTER SUCCESSFUL FULL-DOSE THROMBOLYTICS)
        - PERCUTANEOUS CORONARY INTERVENTION (PCI) FOR ST ELEVATION MYOCARDIAL INFARCTION
          (STEMI) (STABLE, >12 HRS FROM SYMPTOM ONSET)
        - PERCUTANEOUS CORONARY INTERVENTION (PCI) FOR ST ELEVATION MYOCARDIAL INFARCTION
          (STEMI) (UNSTABLE, >12 HRS FROM SYMPTOM ONSET)
        - POST-CARDIAC TRANSPLANT
        - PRE-OPERATIVE EVALUATION FOR NON-CARDIOVASCULAR SURGERY
        - PRIMARY PREVENTION
        - RESCUE PERCUTANEOUS CORONARY INTERVENTION (PCI) FOR ST ELEVATION MYOCARDIAL
          INFARCTION (STEMI) (AFTER FAILED FULL-DOSE THROMBOLYTICS)
        - SECONDARY PREVENTION
        - SPONTANEOUS SUSTAINED VENTRICULAR TACHYCARDIA
        - STAGED PERCUTANEOUS CORONARY INTERVENTION (PCI)
        - SYNCOPE WITH HIGH RISK CHARACTERISTICS
        - SYNCOPE WITH INDUCIBLE VENTRICULAR TACHYCARDIA
        - UNKNOWN
        - UPGRADE TO A DEVICE WITH ADDITIONAL PACING CAPABILITIES
        - VENTRICULAR FIBRILLATION
