Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  A variable with a suffix of PFN may only have a value that is 1 or
                  null (P = parameter level flag variable, numeric form).
                Document: ADaM IG v1.1
                Section: '3.3.5'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-36
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: ANL01FN
      operator: non_empty
    - name: ANL01FN
      operator: not_equal_to
      value: 1
Core:
  Id: ADaM-036
  Status: Published
  Version: '1'
Description: >-
  A variable with a suffix of PFN (parameter-level flag numeric) may only have a
  value of 1 or null. Uses ANL01FN (Analysis 01 Flag Numeric) as a representative
  *PFN variable in BDS datasets.
Executability: Partially Executable
Outcome:
  Message: '*PFN variable has a value other than 1 or null'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "ANL01FN has valid value 1"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ANL01FN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 1]
          - ["CDISCPILOT01", "01-701-1023", "SODIUM", ""]
    expected_findings: 0
  - name: "ANL01FN has invalid value 0 (not allowed for PFN)"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ANL01FN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 0]
    expected_findings: 1
