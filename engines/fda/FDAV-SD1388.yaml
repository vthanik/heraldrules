Core:
  Id: FDAV-SD1388
  Status: Reference
  Version: '1'
Description: Start Day of Obs relative to Exposure (--XSTDY) variable value should
  not be imputed. It may only be populated, when both Start Date/Time of Observation
  (--STDTC) and Date/Time of First Study Treatment (RFXSTDTC) variables values are
  provided and both of them include complete date parts.
Check: []
Outcome:
  Message: --XSTDY variable value is imputed
