Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  ATOXGRLN is the numeric secondary of ATOXGRL (Analysis Toxicity Grade Low). Added in v1.2 Table 3.3.7.1.
                Document: ADaM IG v1.2
                Section: '3.3.7'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-1036
              Version: '1'
            Version: '1.0'
        Version: '1.2'
Check:
  all:
    - name: ATOXGRLN
      operator: empty
    - name: ATOXGRL
      operator: non_empty
Core:
  Id: ADaM-1036
  Status: Published
  Version: '1'
Description: >-
  ATOXGRLN (numeric version of ATOXGRL) requires ATOXGRL to also be present.
Executability: Partially Executable
Outcome:
  Message: 'ATOXGRLN is present but primary variable ATOXGRL is absent'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.2"]
  source: Herald-originated (ADaM-IG v1.2 gap-fill)
  catalogs:
    - ADaMIG 1.2
  fetched: '2026-04-12'

tests:
  - name: "ATOXGRLN present with ATOXGRL also present"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ATOXGRL, ATOXGRLN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Grade 1", "1"]
          - ["CDISCPILOT01", "01-701-1023", "SODIUM", "", ""]
    expected_findings: 0
  - name: "ATOXGRLN present but ATOXGRL absent"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ATOXGRL, ATOXGRLN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "", "1"]
    expected_findings: 1
