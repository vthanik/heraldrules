Check:
  # REMARK: --TPTNUM and --ELTM both are usually "permissible"
  all:
    - name: '--TPTREF'
      operator: exists
    - name: '--ELTM'
      operator: exists
    #- name: '--TPTREF'
    #  operator: 'non_empty'
    #- name: '--ELTM'
    #  operator: 'empty'
    # Correction 2025-09-05
    - name: '--ELTM'
      operator: 'non_empty'
    - name: '--TPTREF'
      operator: 'empty'
Core:
  Id: CORE-000865
  Status: Published
  Version: '1'
Description: 'When Planned Elapsed Time from Time Point Ref (--ELTM) is
  populated, Time Point Reference (--TPTREF) should also be populated.'
Executability: Fully Executable
Outcome:
  Message: --ELTM is populated, but --TPTREF is missing.
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
      - EVENTS
      - INTERVENTIONS
  Domains:
    Include:
      - ALL
Sensitivity: Record
