Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  At least one treatment variable is required in a BDS dataset. This is needed for treatment comparison analyses.
                Document: ADaM IG v1.1
                Section: '3.3'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-90
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: TRTP
      operator: empty
    - name: TRTA
      operator: empty
Core:
  Id: ADaM-090
  Status: Published
  Version: '1'
Description: >-
  BDS datasets must contain at least one treatment variable (TRTP or TRTA). If both are null, the dataset may be missing required treatment information.
Executability: Partially Executable
Outcome:
  Message: 'No treatment variable (TRTP or TRTA) is populated in BDS dataset'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "TRTP is populated (treatment variable present in BDS)"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, TRTP, TRTA]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Placebo", "Placebo"]
    expected_findings: 0
  - name: "Both TRTP and TRTA are null in BDS"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, TRTP, TRTA]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "", ""]
    expected_findings: 1
