# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.16
id: HRL-DD-086
version: 1
status: Published
standard: Define-XML
category: Cross-Reference
sensitivity: Record
executability: Fully Executable
description: >
  Document ID referenced by a method or comment must exist in the Documents sheet.
scope:
  classes: []
  domains: []
check:
  all:
    - name: document_id
      operator: empty
    - name: __document_exists
      operator: equal_to
      value: true
outcome:
  message: "Document ID referenced does not exist in the Documents sheet."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.16"
  cited_guidance: >
    leafID -- Required. Reference to the unique ID of the def:leaf element that contains the location of a file.

tests:
  - name: "HRL-DD-086 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-086 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

