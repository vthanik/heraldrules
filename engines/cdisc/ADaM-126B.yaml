Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  Within a study, all PARCATyN values must be the same for each
                  unique value of PARAMCD (variant B: PARCAT1N must be populated
                  when PARCAT1 is present).
                Document: ADaM IG v1.1
                Section: "4.1"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-126B
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: PARCAT1N
      operator: non_empty
    - name: PARCAT1
      operator: empty
Core:
  Id: ADaM-126B
  Status: Published
  Version: "1"
Description: >-
  Within a study, all PARCATyN values must be the same for each unique value
  of PARAMCD. Variant B: when PARCAT1N is populated, PARCAT1 must also be
  populated.
Executability: Fully Executable
Outcome:
  Message: "PARCAT1N is present but PARCAT1 is not present"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: PARCAT1N and PARCAT1 both present (valid)
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, PARCAT1N, PARCAT1]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 1, CHEMISTRY]
    expected_findings: 0
  - name: PARCAT1N present but PARCAT1 missing (violation)
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, PARCAT1N, PARCAT1]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 1, ""]
    expected_findings: 1
