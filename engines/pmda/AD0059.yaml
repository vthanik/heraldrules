id: AD0059
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: The SAS TYPE for *TM variable must be equal Num.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: AESTM
      operator: empty
    - name: AESTM
      operator: matches_regex
      value: '^([0-1][0-9]|2[0-3]):[0-5][0-9](:[0-5][0-9])?$'
outcome:
  message: '*TM is not a numeric variable'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0059
  pmda_category: Error
  ig_versions: []

