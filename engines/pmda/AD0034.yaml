id: AD0034
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: A variable with a suffix of PFL must have a value that is Y or null (P
  = parameter level flag variable).
scope:
  classes: []
  domains:
    - BDS
    - ADAMOTHER
check:
  all:
    - name: ANL01FL
      operator: non_empty
    - name: ANL01FL
      operator: not_equal_to
      value: 'Y'
outcome:
  message: '*PFL value is not Y or null'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0034
  pmda_category: Error
  ig_versions: []

