id: SD1314
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: When Reported Term for the Disposition Event (DSTERM) is 'COMPLETED',
  Standardized Disposition Term (DSDECOD) should have the same value 'COMPLETED'.
scope:
  Classes:
    Include: EVENTS
  Domains:
    Include: DS
  Use_Case: INDH
check:
  all:
    - name: DSTERM
      operator: not_equal_to
      value: COMPLETED
    - name: DSDECOD
      operator: equal_to
      value: COMPLETED
outcome:
  message: DSDECOD is not 'COMPLETED' when DSTERM='COMPLETED'
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1314
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000033

