# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.15
id: HRL-DD-085
version: 1
status: Published
standard: Define-XML
category: Cross-Reference
sensitivity: Record
executability: Fully Executable
description: >
  Comment ID referenced by a dataset or variable must exist in the Comments sheet.
scope:
  classes: []
  domains: []
check:
  all:
    - name: comment_id
      operator: empty
    - name: __comment_exists
      operator: equal_to
      value: true
outcome:
  message: "Comment ID referenced does not exist in the Comments sheet."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.15"
  cited_guidance: >
    def:CommentOID -- Must match the OID of a def:CommentDef element in the same MetaDataVersion.

tests:
  - name: "HRL-DD-085 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-085 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

