id: HRL-AD-011
version: 1
status: Published
standard: Define-XML
category: Conformance
sensitivity: Record
executability: Fully Executable
description: The variable name PARCATyN needs to be modified by replacing 'y' with
  an integer ranging from 1 to 9. Clinical Programmer to update program.
scope:
  classes: []
  domains: []
check:
  all:
    - name: __variable_names__
      operator: valid_naming_pattern
outcome:
  message: The variable name PARCATyN needs to be modified by replacing 'y' with an
    integer ranging from 1 to 9. Clinical Programmer to update program.
  severity: Error
provenance:
  source_doc: Herald-original (gap analysis vs P21 Community catalog)
  authority: Herald
  p21_reference: AD0185

tests:
  - name: "PARCATyN variable uses integer replacing y (e.g. PARCAT1N)"
    type: positive
    skip: true
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARCAT1N]
        records:
          - ["S1", "S1-001", 1]
    expected_findings: 0

  - name: "PARCATyN variable name uses literal y instead of integer"
    type: negative
    skip: true
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARCATyN]
        records:
          - ["S1", "S1-001", 1]
    expected_findings: 1

