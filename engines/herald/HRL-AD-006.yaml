id: HRL-AD-006
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: A variable is present in ADaM with the same name as a variable present
  in ADSL but the variables do not have identical labels.
scope:
  classes: []
  domains: []
check:
  all:
    - name: __shared_variables__
      operator: label_match
      value: __cross_dataset__
outcome:
  message: Variable name present in both %domain% and ADSL do not have identical labels
  severity: Warning
provenance:
  source_doc: Herald-original (gap analysis vs P21 Community catalog)
  authority: Herald
  p21_reference: AD0085-NI

tests:
  - name: "shared variable has matching labels in ADaM domain and ADSL"
    type: positive
    skip: true
    datasets:
      ADAE:
        variables: [STUDYID, USUBJID]
        records:
          - ["S1", "S1-001"]
    expected_findings: 0

  - name: "shared variable has mismatched label between ADaM domain and ADSL"
    type: negative
    skip: true
    datasets:
      ADAE:
        variables: [STUDYID, USUBJID]
        records:
          - ["S1", "S1-001"]
    expected_findings: 1

