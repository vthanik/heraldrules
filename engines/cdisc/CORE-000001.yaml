Check:
  all:
    - name: IECAT
      operator: not_equal_to
      value: INCLUSION
      value_is_literal: yes
    - name: IEORRES
      operator: equal_to
      value: 'N'
      value_is_literal: yes
Core:
  Id: CORE-000001
  Status: Published
  Version: '1'
Description: Raise an error when IECAT is equal to 'INCLUSION' and IEORRES is not
  equal to 'N'.
Executability: Fully Executable
Outcome:
  Message: IEORRES is not equal to 'N' when IECAT equals 'INCLUSION'.
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - IE
  Use_Case: INDH
Sensitivity: Record
