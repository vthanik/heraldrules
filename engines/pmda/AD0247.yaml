id: AD0247
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: When an event is censored, 3 other variables must be populated. Censor
  (CNSR) variable qualifies the Analysis Value (AVAL) variable. ADT and ADTM variables
  are the Analysis Date and Time of event or censoring associated with AVAL. Origin
  Date for Subject (STARTDT) variable is the original date of risk for the time-to-event
  analysis. This is generally the time at which a subject is first at risk for the
  event of interest evaluation.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: CNSR
      operator: not_equal_to
      value: 1
    - name: EVNTDESC
      operator: non_empty
outcome:
  message: CNSR is populated, but AVAL, STARTDT, and one of [ADT, ADTM] are not populated
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0247
  pmda_category: Error
  ig_versions: []

