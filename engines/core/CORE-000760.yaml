# Variable: DM.RFCSTDTC, DM.RFCENDTC
# Condition: DM.RFCSTDTC ^= Null and DM.RFCENDTC ^= Null
# Rule: DM.RFCSTDTC <= DM.RFCENDTC
Authorities:
  - Organization: FDA
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: Study start and end date/time should include month, day, and
                  year.
                Document: FDA
                Section: FDAB034
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB3413
              Version: '1'
            Version: '1.5'
        Version: '3.4'
      - Name: SENDIG-AR
        References:
          - Citations:
              - Cited Guidance: Study start and end date/time should include month, day, and
                  year.
                Document: FDA
                Section: FDAB034
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB3413
              Version: '1'
            Version: '1.5'
        Version: '1.0'
Check:
  all:
    - name: RFCSTDTC
      operator: non_empty
    - name: RFCENDTC
      operator: non_empty
    - name: RFCSTDTC
      operator: date_greater_than
      value: RFCENDTC
Core:
  Id: CORE-000760
  Status: Published
  Version: '1'
Description: Date/Time of First Challenge Agent Admin (RFCSTDTC) should be prior
  or equal to the Date/Time of Last Challenge Agent Admin (RFCENDTC).
Executability: Fully Executable
Outcome:
  Message: RFCSTDTC falls after RFCENDTC.
  Output Variables:
    - RFCSTDTC
    - RFCENDTC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
Sensitivity: Record
