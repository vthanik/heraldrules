Core:
  Id: FDAV-SD1358
  Status: Reference
  Version: '1'
Description: When Actual Arm Code (ACTARMCD)/Description of Actual Arm (ACTARM) are
  not populated, the Reason Arm and/or Actual Arm is Null (ARMNRS) variable must be
  populated with the reason ACTARMCD/ACTARM are null.
Check: []
Outcome:
  Message: ARMNRS is not populated, when ACTARMCD or ACTARM is NULL
Rule Type: Record Data
Sensitivity: Record
