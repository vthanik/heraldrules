id: AD0133C
version: 2
status: Reference
standard: ADaM
category: Conformance
sensitivity: Record
executability: Fully Executable
description: When Analysis Range Low (AyLO) equals 0, the Ratio to Analysis Range
  Low (R2AyLO) should not be populated since you cannot divide by 0. AD0133 checks
  the calculation is correct when AyLO does not equal 0.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: A1LO
      operator: not_equal_to
      value: 0
    - name: R2A1LO
      operator: empty
outcome:
  message: 'Calculation issue: AyLO = 0, but R2AyLO is populated'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0133C
  pmda_category: Error
  ig_versions: []

