Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  PARAMTYP was deprecated in v1.1 and all references were removed in v1.2. The IG states: 'it is not a violation of the ADaM standard to continue to use PARAMTYP'. This rule issues an informational finding when PARAMTYP is present in a v1.2 dataset.
                Document: ADaM IG v1.2
                Section: '3.3.4'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-1049
              Version: '1'
            Version: '1.0'
        Version: '1.2'
Check:
  all:
    - name: PARAMTYP
      operator: non_empty
Core:
  Id: ADaM-1049
  Status: Published
  Version: '1'
Description: >-
  PARAMTYP was fully removed from ADaM-IG v1.2. While using PARAMTYP is not a violation of the standard, it is no longer defined in v1.2 and should not be used in new datasets.
Executability: Fully Executable
Outcome:
  Message: 'PARAMTYP is present; this variable was removed in ADaM-IG v1.2 (informational -- not a conformance violation)'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.2"]
  source: Herald-originated (ADaM-IG v1.2 gap-fill)
  catalogs:
    - ADaMIG 1.2
  fetched: '2026-04-12'

tests:
  - name: "PARAMTYP absent (no informational finding)"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, PARAMTYP]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", ""]
          - ["CDISCPILOT01", "01-701-1023", "SODIUM", ""]
    expected_findings: 0
  - name: "PARAMTYP present in v1.2 dataset (informational)"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, PARAMTYP]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "DERIVED"]
    expected_findings: 1
