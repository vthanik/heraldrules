# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.11.2
id: HRL-DD-031
version: 1
status: Published
standard: Define-XML
category: Dataset Definition
sensitivity: Dataset
executability: Fully Executable
description: >
  Class is required for datasets following SDTM, SEND, or ADaM standards.
scope:
  classes: []
  domains: []
check:
  all:
    - name: standard
      operator: empty
    - name: class
      operator: non_empty
outcome:
  message: "Class is missing for a dataset that references a standard. def:Class is required when dataset follows SDTM, SEND, or ADaM."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.11.2"
  cited_guidance: >
    def:Class -- Conditional. Required when the ItemGroupDef describes a dataset that follows SDTM, SEND, or ADaM.

tests:
  - name: "HRL-DD-031 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-031 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

