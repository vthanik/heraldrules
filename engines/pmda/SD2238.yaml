id: SD2238
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Start Reference Time Point (--STTPT) value must be consistent for all
  records with same Subject (USUBJID) and Start Date/Time (--STDTC) values.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH, PROD
check:
  all:
    - name: --STTPT
      operator: empty
    - name: --STRTPT
      operator: non_empty
outcome:
  message: Inconsistent value for --STTPT
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD2238
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000085

