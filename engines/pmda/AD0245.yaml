id: AD0245
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: When Censor (CNSR) variable is present, the Time-to-Event Origin Date
  for Subject (STARTDT) and one of Analysis Date (ADT) or Analysis Datetime (ADTM)
  variables must be included in the dataset. In Time to Event studies, the basis of
  analysis is the time from a defined starting point to the time of occurrence of
  the event of interest.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: CNSR
      operator: empty
    - name: STARTDT
      operator: non_empty
outcome:
  message: CNSR is present, but STARTDT is not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0245
  pmda_category: Error
  ig_versions: []

