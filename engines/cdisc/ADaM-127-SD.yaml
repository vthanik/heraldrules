Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  Within a given Subject's PARAMCD, a baseline value is populated
                  (either BASE or BASEC) with no corresponding ABLFL=Y record.
                Document: ADaM IG v1.1
                Section: "4.4"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-127-SD
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: BASE
      operator: empty
    - name: ABLFL
      operator: non_empty
Core:
  Id: ADaM-127-SD
  Status: Published
  Version: "1"
Description: >-
  Within a given Subject's PARAMCD, a baseline value (BASE or BASEC) must
  have a corresponding ABLFL=Y record. This single-dataset variant checks
  that BASE is not populated without ABLFL being set.
Executability: Partially Executable
Outcome:
  Message: "Baseline value BASE populated without corresponding ABLFL=Y record"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: BASE populated with ABLFL=Y present (valid)
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BASE, ABLFL]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 140, Y]
          - [CDISCPILOT01, 01-701-1015, SODIUM, 140, ""]
    expected_findings: 0
  - name: BASE populated but ABLFL missing for all records
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BASE, ABLFL]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 140, ""]
    expected_findings: 1
