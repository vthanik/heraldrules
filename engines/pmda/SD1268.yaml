id: SD1268
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: The Name of the Reference Terminology (TSVCDREF) must be populated when
  the Version of the Reference Terminology (TSVCDVER) is populated.
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS
check:
  all:
    - name: TSVCDVER
      operator: empty
    - name: TSVCDREF
      operator: non_empty
outcome:
  message: TSVCDREF is null when TSVCDVER is populated
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1268
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000153

