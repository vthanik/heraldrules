Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  Standardized MedDRA Query Scope Numeric (SMQzzSCN) variable value
                  must be 1 (BROAD), 2 (NARROW), or null.
                Document: ADaM IG v1.1
                Section: "6.2"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-313
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: SMQ01SCN
      operator: empty
    - name: SMQ01SCN
      operator: in
      value:
        - 1
        - 2
Core:
  Id: ADaM-313
  Status: Published
  Version: "1"
Description: >-
  Standardized MedDRA Query Scope Numeric (SMQzzSCN) variable value must be
  1 (BROAD), 2 (NARROW), or null.
Executability: Partially Executable
Outcome:
  Message: "SMQzzSCN value is not 1, 2, or null"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - OCCURRENCE DATA STRUCTURE
  Domains:
    Include:
      - ADAE
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: SMQ01SCN is 1 (valid)
    type: positive
    datasets:
      ADAE:
        variables: [STUDYID, USUBJID, AETERM, SMQ01SCN]
        records:
          - [CDISCPILOT01, 01-701-1015, HEADACHE, 1]
    expected_findings: 0
  - name: SMQ01SCN has invalid value (violation)
    type: negative
    datasets:
      ADAE:
        variables: [STUDYID, USUBJID, AETERM, SMQ01SCN]
        records:
          - [CDISCPILOT01, 01-701-1015, HEADACHE, 3]
    expected_findings: 1
