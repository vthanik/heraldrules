id: AD0176
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: 'Analysis Baseline Flag character (ABLFL) must be Y or null. For parameter-level
  and record-level character population flag variables: Y = yes (included). Null values
  are allowed.'
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: ABLFL
      operator: non_empty
    - name: ABLFL
      operator: not_equal_to
      value: 'Y'
outcome:
  message: ABLFL value is not Y or null
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0176
  pmda_category: Error
  ig_versions: []

