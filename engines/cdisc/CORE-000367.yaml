Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: Description of actual Arm. When an Arm is not planned
                  (not in Trial Arms), ACTARM will be <U+201C>Unplanned Treatment<U+201D>. Randomized
                  subjects who were not treated will be given a value of <U+201C>Not Treated<U+201D>.
                  Values should be <U+201C>Screen Failure<U+201D> for screen failures and <U+201C>Not Assigned<U+201D>
                  for subjects not assigned to treatment. Restricted to values in
                  Trial Arms in all other cases.
                Document: IG v3.2
                Item: Specification
                Section: '5'
            Origin: SDTM and SDTMIG Conformance Rules
            Rule_Identifier:
              Id: CG0117
