Check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: SNDIGVER
    - name: TSPARMCD
      operator: is_not_unique_set
      value:
        - DOMAIN
Core:
  Id: CORE-000383
  Status: Published
  Version: '1'
Description: Raise an error when there is more than one record with TSPARMCD=SNDIGVER
Executability: Fully Executable
Outcome:
  Message: Only one record with TSPARMCD=SNDIGVER is allowed
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - TRIAL DESIGN
  Domains:
    Include:
      - TS
Sensitivity: Record
