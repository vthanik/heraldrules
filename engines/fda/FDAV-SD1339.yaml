Core:
  Id: FDAV-SD1339
  Status: Reference
  Version: '1'
Description: The EPOCH variable is not populated, however either a start date or a
  collection date is provided. The presence of a start date or collection date for
  a record should allow for the EPOCH variable to be populated. Variables requested
  by the relevant regulatory agency in policy documents (e.g., EPOCH) should be included
  in the dataset and populated.
Check: []
Outcome:
  Message: Missing EPOCH value, when a start or observation date is provided
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: FDA
Source: FDA Validator Rules v1.6
