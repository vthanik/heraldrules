id: AD0543
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: If Analysis Value Category y (N) (AVALCAyN) variable is used in a dataset,
  Analysis Value Category y (AVALCATy) variable must also be present in that dataset.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: AVALCA1N
      operator: empty
    - name: AVALCA1
      operator: non_empty
outcome:
  message: AVALCAyN is present and AVALCATy is not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0543
  pmda_category: Error
  ig_versions: []

