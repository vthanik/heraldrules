Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If Change from Baseline Category y (N) (CHGCATyN) variable is used
                  in a dataset, CHGCATy must also be present.
                Document: ADaM IG v1.1
                Section: "4.4"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-545
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: CHGCAT1N
      operator: empty
    - name: CHGCAT1
      operator: non_empty
Core:
  Id: ADaM-545
  Status: Published
  Version: "1"
Description: >-
  If Change from Baseline Category y (N) (CHGCATyN) variable is used in a
  dataset, CHGCATy must also be present.
Executability: Partially Executable
Outcome:
  Message: "CHGCATyN is present but CHGCATy is not present"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: CHGCAT1N and CHGCAT1 both present (valid)
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, CHGCAT1N, CHGCAT1]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 1, "INCREASED"]
    expected_findings: 0
  - name: CHGCAT1N present but CHGCAT1 missing (violation)
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, CHGCAT1N, CHGCAT1]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 1, ""]
    expected_findings: 1
