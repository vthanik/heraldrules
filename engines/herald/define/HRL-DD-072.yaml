# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.13
id: HRL-DD-072
version: 1
status: Published
standard: Define-XML
category: Codelist Definition
sensitivity: Dataset
executability: Fully Executable
description: >
  Codelist Name must be unique within the specification.
scope:
  classes: []
  domains: []
check:
  all:
    - name: name
      operator: is_unique_set
outcome:
  message: "Codelist Name is not unique. The Name must be unique within the set of CodeList elements."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.13"
  cited_guidance: >
    Business Rule: The Name must be unique within the set of Codelist elements.

tests:
  - name: "HRL-DD-072 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-072 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

