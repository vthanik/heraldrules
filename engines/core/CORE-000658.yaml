Check:
  all:
    - name: RFICDTC
      operator: non_empty
    - name: RFXSTDTC
      operator: non_empty
    - name: RFICDTC
      operator: date_greater_than
      value: RFXSTDTC
Core:
  Id: CORE-000658
  Status: Published
  Version: '1'
Description: Date/Time of Informed Consent (RFICDTC) should be prior or equal to
  the Date/Time of First Study Treatment (RFXSTDTC).
Executability: Fully Executable
Outcome:
  Message: RFICDTC falls after RFXSTDTC.
  Output Variables:
    - RFICDTC
    - RFXSTDTC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
Sensitivity: Record
