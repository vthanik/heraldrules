# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.13.2; 5.3.13.3
id: HRL-DD-077
version: 1
status: Published
standard: Define-XML
category: Codelist Definition
sensitivity: Record
executability: Fully Executable
description: >
  Decoded Value is required when codelist uses CodeListItem format (has both coded and decoded values).
scope:
  classes: []
  domains: []
check:
  all:
    - name: decoded_value
      operator: non_empty
    - name: __codelist_has_any_decodes
      operator: equal_to
      value: false
outcome:
  message: "Decoded Value is missing for a codelist term. When a codelist uses CodeListItem format, all terms must have Decode values."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.13.2; 5.3.13.3"
  cited_guidance: >
    CodeListItem -- For Controlled Terminologies where there are Coded and Decoded values, a CodeListItem must be provided for each Item.

tests:
  - name: "HRL-DD-077 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-077 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

