# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 1.5.2
id: HRL-DD-039
version: 1
status: Published
standard: Define-XML
category: Standards Reference
sensitivity: Dataset
executability: Fully Executable
description: >
  SENDIG version must be one of the allowable versions: 3.0, 3.1, 3.1.1.
scope:
  classes: []
  domains: []
check:
  all:
    - name: standard_name
      operator: not_equal_to
      value: SENDIG
    - name: standard_version
      operator: in
      value:
        - "3.0"
        - "3.1"
        - "3.1.1"
outcome:
  message: "SENDIG version is not allowable. Must be one of: 3.0, 3.1, 3.1.1."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "1.5.2"
  cited_guidance: >
    Define-XML v2.1 can be used to transmit metadata for SENDIG v3.0 and higher.

tests:
  - name: "HRL-DD-039 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-039 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

