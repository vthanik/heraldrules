# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 4.9; 5.3.11.1
id: HRL-DD-075
version: 1
status: Published
standard: Define-XML
category: Codelist Definition
sensitivity: Record
executability: Fully Executable
description: >
  NCI Codelist Code is required for codelists representing CDISC Controlled Terminology.
scope:
  classes: []
  domains: []
check:
  all:
    - name: terminology
      operator: empty
    - name: nci_code
      operator: non_empty
outcome:
  message: "NCI Codelist Code is missing for a CDISC CT codelist. Alias with C-Code is required for CodeList elements representing CDISC CT."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "4.9; 5.3.11.1"
  cited_guidance: >
    When used for regulatory submission, the Alias element is required for each CodeList that represents CDISC Controlled Terminology.

tests:
  - name: "HRL-DD-075 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-075 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

