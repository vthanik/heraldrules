Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  When Multi-Response Criterion y Evaluation (MCRITyML) = Y,
                  MCRITy must be present.
                Document: ADaM IG v1.1
                Section: "4.4"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-339
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: MCRIT1ML
      operator: not_equal_to
      value: 'Y'
    - name: MCRIT1
      operator: non_empty
Core:
  Id: ADaM-339
  Status: Published
  Version: "1"
Description: >-
  When Multi-Response Criterion y Evaluation (MCRITyML) = Y, MCRITy must
  be present.
Executability: Partially Executable
Outcome:
  Message: "MCRITyML=Y but MCRITy is not present"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: MCRIT1ML=Y and MCRIT1 present (valid)
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, MCRIT1ML, MCRIT1]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, Y, ">135 mmol/L"]
    expected_findings: 0
  - name: MCRIT1ML=Y but MCRIT1 missing (violation)
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, MCRIT1ML, MCRIT1]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, Y, ""]
    expected_findings: 1
