id: AD0485
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: In a pair of corresponding character and numeric variables, the secondary
  variable must be populated if its primary variable is populated. Corresponding character
  and numeric values must also have a one-to-one mapping consistency when the primary
  variable is populated, which are addressed in other rules.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: PARAM
      operator: empty
    - name: PARAMN
      operator: non_empty
outcome:
  message: Secondary variable PBCHGCyN is populated, but its primary variable PBCHGCAy
    is not populated
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0485
  pmda_category: Error
  ig_versions: []

