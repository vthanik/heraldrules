Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If Baseline Reference Range Indicator (BNRIND) variable is present, then Analysis Reference Range Indicator (ANRIND) must also be present.
                Document: ADaM IG v1.1
                Section: '3.3.6'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-166
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: BNRIND
      operator: empty
    - name: ANRIND
      operator: non_empty
Core:
  Id: ADaM-166
  Status: Published
  Version: '1'
Description: >-
  When BNRIND is present, ANRIND must also be present.
Executability: Fully Executable
Outcome:
  Message: 'BNRIND is populated but ANRIND is missing'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "BNRIND and ANRIND both present"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BNRIND, ANRIND]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "NORMAL", "HIGH"]
    expected_findings: 0
  - name: "BNRIND present but ANRIND missing"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BNRIND, ANRIND]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "NORMAL", ""]
    expected_findings: 1
