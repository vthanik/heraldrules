Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If Analysis Multi-Response Criterion y (MCRITy) variable is present,
                  MCRITyML must also be present.
                Document: ADaM IG v1.1
                Section: "4.4"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-338
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: MCRIT1
      operator: empty
    - name: MCRIT1ML
      operator: non_empty
Core:
  Id: ADaM-338
  Status: Published
  Version: "1"
Description: >-
  If Analysis Multi-Response Criterion y (MCRITy) variable is present,
  MCRITyML must also be present.
Executability: Partially Executable
Outcome:
  Message: "MCRITy is present but MCRITyML is not present"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: MCRIT1 and MCRIT1ML both present (valid)
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, MCRIT1, MCRIT1ML]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, ">135 mmol/L", Y]
    expected_findings: 0
  - name: MCRIT1 present but MCRIT1ML missing (violation)
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, MCRIT1, MCRIT1ML]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, ">135 mmol/L", ""]
    expected_findings: 1
