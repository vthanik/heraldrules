id: HRL-CT-0315
version: 1
status: Published
standard: SDTM
category: Controlled Terminology
sensitivity: Record
executability: Fully Executable
description: DICTNAM (Dictionary Name) must contain valid extensible codelist terms
  (new terms allowed).
scope:
  classes: []
  domains: []
check:
  all:
    - name: DICTNAM
      operator: in
      value:
        - CDISC CT
        - ClinicalTrials.gov
        - COSTART
        - CTCAE
        - CTIS
        - D-U-N-S NUMBER
        - EudraCT
        - EUDRAVIGILANCE
        - GENC
        - ICD
        - ICD-O
        - ISO 21090
        - ISO 3166
        - jRCT
        - LOINC
        - MED-RT
        - MedDRA
        - MeSH
        - PubMed
        - SNOMED
        - UNII
        - WHO ATC CLASSIFICATION SYSTEM
        - WHOART
        - WHODD
outcome:
  message: Value not found in extensible codelist Dictionary Name (C66788)
  severity: Warning
provenance:
  source_doc: NCI EVS CDISC Controlled Terminology (2025-09-26)
  authority: CDISC
  codelist_code: C66788
  codelist_name: Dictionary Name
  codelist_submission_value: DICTNAM
  extensible: yes
  parent_rule: CT2002
  term_count: 24

