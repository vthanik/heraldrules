id: HRL-AD-020
version: 1
status: Published
standard: Define-XML
category: Conformance
sensitivity: Record
executability: Fully Executable
description: Variables with an "C" suffix are considered secondary variables linked
  to a primary variable with the same name, minus the suffix. The primary variable
  must be present in the dataset to include its corresponding secondary variable.
  Clinical Programmer to ensure primary and secondary variables are aligned accordingly.
scope:
  classes: []
  domains: []
check:
  all:
    - name: __variable_names__
      operator: valid_naming_pattern
outcome:
  message: Variables with an "C" suffix are considered secondary variables linked
    to a primary variable with the same name, minus the suffix. The primary variable
    must be present in the dataset to include its corresponding secondary variable.
    Clinical Programmer to ensure primary and secondary variables are aligned accordingly.
  severity: Error
provenance:
  source_doc: Herald-original (gap analysis vs P21 Community catalog)
  authority: Herald
  p21_reference: AD1012

tests:
  - name: "secondary C-suffix variable present only when primary variable exists"
    type: positive
    skip: true
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, AVAL, AVALC]
        records:
          - ["S1", "S1-001", 5.0, "NORMAL"]
    expected_findings: 0

  - name: "secondary C-suffix variable present without corresponding primary variable"
    type: negative
    skip: true
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, AVALC]
        records:
          - ["S1", "S1-001", "NORMAL"]
    expected_findings: 1

