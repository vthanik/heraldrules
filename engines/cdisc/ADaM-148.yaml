Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  The Numeric Value of Parameter Name (PARAMN) must be an integer.
                  PARAMN provides a numeric representation of PARAM for sorting and
                  programming convenience.
                Document: ADaM IG v1.1
                Section: '3.3.1'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-148
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: PARAMN
      operator: empty
    - name: PARAMN
      operator: matches_regex
      value: '^-?\d+$'
Core:
  Id: ADaM-148
  Status: Published
  Version: '1'
Description: >-
  PARAMN (Numeric Value of Parameter Name) must be a non-missing integer value.
  Decimal values or non-numeric values are not permitted.
Executability: Fully Executable
Outcome:
  Message: 'PARAMN is not an integer value'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "PARAMN has valid integer value"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, PARAMN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 1]
          - ["CDISCPILOT01", "01-701-1023", "ALT", 2]
    expected_findings: 0
  - name: "PARAMN has decimal value (not integer)"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, PARAMN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "1.5"]
    expected_findings: 1
