Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If R2AyLO is populated, the values necessary for its calculation must be present. AVAL must be populated when R2AyLO is present.
                Document: ADaM IG v1.1
                Section: '3.3.6'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-133B
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: R2A1LO
      operator: empty
    - name: AVAL
      operator: non_empty
Core:
  Id: ADaM-133B
  Status: Published
  Version: '1'
Description: >-
  When R2A1LO is present, AVAL must also be present.
Executability: Fully Executable
Outcome:
  Message: 'R2A1LO is populated but AVAL is missing'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "R2A1LO and AVAL both present"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, R2A1LO]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 145.0, 1.115]
    expected_findings: 0
  - name: "R2A1LO present but AVAL missing"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, R2A1LO]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "", 1.115]
    expected_findings: 1
