# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.9; 5.3.12
id: HRL-DD-069
version: 1
status: Published
standard: Define-XML
category: Cross-Reference
sensitivity: Record
executability: Fully Executable
description: >
  Dataset.Variable reference in ValueLevel must exist in the Variables sheet.
scope:
  classes: []
  domains: []
check:
  all:
    - name: dataset
      operator: empty
    - name: variable
      operator: empty
    - name: __variable_exists_in_var_spec
      operator: equal_to
      value: true
outcome:
  message: "Dataset.Variable in ValueLevel does not exist in the Variables sheet."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.9; 5.3.12"
  cited_guidance: >
    Value-level metadata is specified using def:ValueListDef elements linked to variable definitions.

tests:
  - name: "HRL-DD-069 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-069 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

