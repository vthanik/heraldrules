id: HRL-AD-012
version: 1
status: Published
standard: Define-XML
category: Conformance
sensitivity: Record
executability: Fully Executable
description: When using the variable R2AyHI, replace the field 'y' with an integer
  ranging from 1 to 9. Clinical programmer to update program.
scope:
  classes: []
  domains: []
check:
  all:
    - name: __variable_names__
      operator: valid_naming_pattern
outcome:
  message: When using the variable R2AyHI, replace the field 'y' with an integer ranging
    from 1 to 9. Clinical programmer to update program.
  severity: Error
provenance:
  source_doc: Herald-original (gap analysis vs P21 Community catalog)
  authority: Herald
  p21_reference: AD0191

tests:
  - name: "R2AyHI variable uses integer replacing y (e.g. R2A1HI)"
    type: positive
    skip: true
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, R2A1HI]
        records:
          - ["S1", "S1-001", "10.0"]
    expected_findings: 0

  - name: "R2AyHI variable name uses literal y instead of integer"
    type: negative
    skip: true
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, R2AyHI]
        records:
          - ["S1", "S1-001", "10.0"]
    expected_findings: 1

