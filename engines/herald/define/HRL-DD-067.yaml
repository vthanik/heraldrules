# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.12
id: HRL-DD-067
version: 1
status: Published
standard: Define-XML
category: Value-Level Metadata
sensitivity: Record
executability: Fully Executable
description: >
  Value-level Length must not exceed the parent variable length.
scope:
  classes: []
  domains: []
check:
  all:
    - name: length
      operator: empty
    - name: __length_exceeds_parent
      operator: equal_to
      value: false
outcome:
  message: "Value-level Length exceeds the parent variable Length. For ItemDef referenced from a ValueListDef, Length must be <= parent variable length."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.12"
  cited_guidance: >
    For ItemDef elements referenced from a ValueListDef, the Length must be less than or equal to the length of the parent variable.

tests:
  - name: "HRL-DD-067 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-067 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

