# P21 Sheet validation against Define-XML v2.1 Specification
# Section: ARM 1.0
id: HRL-DD-104
version: 1
status: Published
standard: Define-XML
category: ARM Metadata
sensitivity: Record
executability: Fully Executable
description: >
  AnalysisPurpose must use valid ADaM Controlled Terminology values when provided.
scope:
  classes: []
  domains: []
check:
  all:
    - name: purpose
      operator: empty
    - name: __purpose_in_adam_ct
      operator: equal_to
      value: true
outcome:
  message: "AnalysisPurpose value is not in ADaM Controlled Terminology. Values are controlled by the AnalysisPurpose extensible codelist."
  severity: Warning
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "ARM 1.0"
  cited_guidance: >
    P21 DD0100: Values for the AnalysisPurpose attribute are controlled by the AnalysisPurpose extensible codelist in ADaM CT.

tests:
  - name: "HRL-DD-104 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-104 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

