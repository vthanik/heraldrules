id: CT2006
version: 1
status: Published
standard: SDTM
category: Controlled Terminology
sensitivity: Record
executability: Fully Executable

description: >
  Paired variables such as TEST/TESTCD must be populated using terms with the
  same Codelist Code value in CDISC controlled terminology within the same
  value-level condition. This is the conditional variant of CT2003.

scope:
  classes:
    - FINDINGS
  domains: []

check:
  all:
    - name: __ct_paired_variables__
      operator: codelist_code_match
      condition: __value_level__

outcome:
  message: "Coded and Decoded values do not have the same Code in CDISC CT when value-level condition occurs for {VAR1}/{VAR2}"
  severity: Error

authorities:
  - organization: FDA
    rule_ids: [CT2006]
  - organization: PMDA
    rule_ids: [CT2006]

provenance:
  source_doc: "FDA Validator Rules v1.6; PMDA Validation Rules v6.0"
  ct_source: "NCI EVS CDISC SDTM CT (paired TEST/TESTCD codelists, conditional)"
