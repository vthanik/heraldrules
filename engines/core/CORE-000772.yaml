Check:
  all:
    - name: TXPARMCD
      operator: equal_to
      value: ARMCD
      value_is_literal: true
    - name: TXVAL
      operator: is_not_contained_by
      value: $ta_armcd
Core:
  Status: Published
  Version: '1'
  Id: CORE-000772
Description: ''
Executability: Fully Executable
Operations:
  - domain: TA
    id: $ta_armcd
    name: ARMCD
    operator: distinct
Outcome:
  Message: 'The value of TXVAL for TXPARMCD=ARMCD cannot be found in the TA dataset'
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - TRIAL DESIGN
  Domains:
    Include:
      - TX
Sensitivity: Record
