id: HRL-CT-0322
version: 1
status: Published
standard: SDTM
category: Controlled Terminology
sensitivity: Record
executability: Fully Executable
description: DSSOUT (Disease Outcome) must contain valid extensible codelist terms
  (new terms allowed).
scope:
  classes: []
  domains: []
check:
  all:
    - name: DSSOUT
      operator: in
      value:
        - BACTERIOLOGICAL CURE
        - BACTERIOLOGICAL FAILURE
        - CLINICAL CURE
        - CLINICAL FAILURE
        - RECURRENT DISEASE
outcome:
  message: Value not found in extensible codelist Disease Outcome (C102578)
  severity: Warning
provenance:
  source_doc: NCI EVS CDISC Controlled Terminology (2025-09-26)
  authority: CDISC
  codelist_code: C102578
  codelist_name: Disease Outcome
  codelist_submission_value: DSSOUT
  extensible: yes
  parent_rule: CT2002
  term_count: 5

