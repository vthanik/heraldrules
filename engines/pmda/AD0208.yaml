id: AD0208
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: The same subject in ADSL and DM must have the same value for Subject
  ID (SUBJID). There must be traceability between ADaM and SDTM.
scope:
  classes: []
  domains: ADSL
check:
  all:
    - name: SUBJID
      operator: empty
outcome:
  message: For the same USUBJID, the ADSL.SUBJID != DM.SUBJID
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0208
  pmda_category: Error
  ig_versions: []

