id: AD0225A
version: 2
status: Reference
standard: ADaM
category: Conformance
sensitivity: Record
executability: Fully Executable
description: When Baseline (BASE) equals 0, the Percent Change from Baseline (PCHG)
  should not be populated since you cannot divide by 0. AD0225 checks the PCHG calculation
  is correct when BASE does not equal 0. AD0132B also complements this rule.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: BASE
      operator: not_equal_to
      value: 0
    - name: PCHG
      operator: empty
outcome:
  message: 'Calculation issue: BASE = 0, but PCHG is populated'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0225A
  pmda_category: Error
  ig_versions: []

