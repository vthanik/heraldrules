Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  When Baseline (BASE) equals 0, the Ratio to Baseline (R2BASE) should not be calculable. R2BASE should be null when BASE = 0.
                Document: ADaM IG v1.1
                Section: '3.3.5'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-132A
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: BASE
      operator: not_equal_to
      value: 0
    - name: R2BASE
      operator: empty
Core:
  Id: ADaM-132A
  Status: Published
  Version: '1'
Description: >-
  When BASE equals 0, R2BASE cannot be computed (division by zero). R2BASE should be null when BASE = 0.
Executability: Fully Executable
Outcome:
  Message: 'R2BASE is populated when BASE = 0 (division by zero is not valid)'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "BASE = 0 and R2BASE is null (correct)"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BASE, R2BASE]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 0, ""]
    expected_findings: 0
  - name: "BASE = 0 but R2BASE is populated (invalid)"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BASE, R2BASE]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 0, 1.0]
    expected_findings: 1
