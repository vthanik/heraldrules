Core:
  Id: FDAV-SD1363
  Status: Reference
  Version: '1'
Description: Planned Arm Code (ARMCD) and Description of Planned Arm (ARM) must not
  be null for subjects who are not assigned to treatment. This includes Screen Failure
  subjects and Not Assigned subjects.
