Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  When Baseline (BASE) equals 0, the Percent Change from Baseline (PCHG) should be null as division by zero is not valid.
                Document: ADaM IG v1.1
                Section: '3.3.5'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-225A
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: BASE
      operator: not_equal_to
      value: 0
    - name: PCHG
      operator: empty
Core:
  Id: ADaM-225A
  Status: Published
  Version: '1'
Description: >-
  When BASE = 0, PCHG cannot be calculated (division by zero). PCHG must be null.
Executability: Fully Executable
Outcome:
  Message: 'PCHG is populated when BASE = 0 (percent change undefined when baseline is zero)'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "BASE = 0 and PCHG is null (correct)"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BASE, PCHG]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 0, ""]
    expected_findings: 0
  - name: "BASE = 0 but PCHG is populated (invalid)"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BASE, PCHG]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 0, 100.0]
    expected_findings: 1
