id: AD0006
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: 'A variable with a suffix of FN has a value that is not 0, 1 or null
  (Exception: RFN, PFN, ABLFN, ANLzzFN and population flags Numeric COMPLFN, FASFN,
  ITTFN, PPROTFN, SAFFN, RANDFN, ENRLFN cannot be null and at least 1 must be included
  in ADSL).'
scope:
  classes: []
  domains:
    - ADSL
    - BDS
    - OCCDS
    - ADAE
    - ADAMOTHER
check:
  all:
    - name: ONTRTFN
      operator: empty
    - name: ONTRTFN
      operator: in
      value:
        - 0
        - 1
outcome:
  message: '*FN value is not 0, 1 or null'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0006
  pmda_category: Error
  ig_versions: []

