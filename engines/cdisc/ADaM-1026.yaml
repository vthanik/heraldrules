Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  v1.2 changed the secondary variable rule from numeric-specific to any secondary variable type. When a secondary variable is included in the dataset, then the primary variable must also be included.
                Document: ADaM IG v1.2
                Section: '3.1.1'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-1026
              Version: '1'
            Version: '1.0'
        Version: '1.2'
Check:
  all:
    - name: TRTP
      operator: empty
    - name: TRTPN
      operator: non_empty
Core:
  Id: ADaM-1026
  Status: Published
  Version: '1'
Description: >-
  In ADaM-IG v1.2, when any secondary variable (character or numeric) is included in a dataset, the corresponding primary variable must also be included. This generalizes the v1.1 rule for numeric-only pairs.
Executability: Partially Executable
Outcome:
  Message: 'Secondary variable present without its primary variable (e.g. TRTPN present but TRTP absent)'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.2"]
  source: Herald-originated (ADaM-IG v1.2 gap-fill)
  catalogs:
    - ADaMIG 1.2
  fetched: '2026-04-12'

tests:
  - name: "TRTP present when TRTPN present (primary with secondary)"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, TRTP, TRTPN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Drug A", "1"]
          - ["CDISCPILOT01", "01-701-1023", "SODIUM", "", ""]
    expected_findings: 0
  - name: "TRTPN present but TRTP absent"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, TRTP, TRTPN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "", "1"]
    expected_findings: 1
