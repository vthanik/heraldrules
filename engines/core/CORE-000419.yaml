Authorities:
  - Organization: CDISC
    Standards:
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'To ensure consistent ordering, the same instance must not be
                  referenced more than once as previous or next.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00027'
              Version: '1'
            Version: '1.0'
        Version: '3.0'
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'To ensure consistent ordering, the same instance must not be
                  referenced more than once as previous or next.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00027'
              Version: '1'
            Version: '1.0'
        Version: '4.0'
Check:
  all:
    - name: rel_type
      operator: equal_to
      value: 'definition'
    - any:
        - all:
            - name: nextId
              operator: non_empty
            - name: nextId
              operator: is_not_unique_set
              value:
                - parent_entity
                - parent_id
                - parent_rel
        - all:
            - name: previousId
              operator: non_empty
            - name: previousId
              operator: is_not_unique_set
              value:
                - parent_entity
                - parent_id
                - parent_rel
Core:
  Id: 'CORE-000419'
  Status: Published
  Version: '1'
Description: 'To ensure consistent ordering, the same instance must not be
  referenced more than once as previous or next.'
Executability: Fully Executable
Outcome:
  Message: 'The same instance is referenced more than once as previous or next -
    nextId or previousId values are not unique.'
  Output Variables:
    - parent_entity
    - parent_id
    - parent_rel
    - id
    - name
    - nextId
    - previousId
Rule Type: Record Data
Scope:
  Entities:
    Include:
      - ALL
Sensitivity: Record
