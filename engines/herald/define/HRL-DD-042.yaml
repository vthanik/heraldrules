# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.11
id: HRL-DD-042
version: 1
status: Published
standard: Define-XML
category: Dataset Definition
sensitivity: Dataset
executability: Fully Executable
description: >
  When Reference Data is 'Yes', Repeating must be 'No'.
scope:
  classes: []
  domains: []
check:
  all:
    - name: reference_data
      operator: not_equal_to
      value: "Yes"
    - name: repeating
      operator: equal_to
      value: "No"
outcome:
  message: "Repeating is not 'No' but Reference Data is 'Yes'. When IsReferenceData='Yes', Repeating must be 'No'."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.11"
  cited_guidance: >
    Business Rule: When IsReferenceData='Yes', set Repeating='No'.

tests:
  - name: "HRL-DD-042 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-042 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

