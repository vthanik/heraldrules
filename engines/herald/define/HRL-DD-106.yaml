# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.12; 5.3.13
id: HRL-DD-106
version: 1
status: Published
standard: Define-XML
category: Codelist Definition
sensitivity: Record
executability: Fully Executable
description: >
  Variable Data Type must match the referenced Codelist Data Type.
scope:
  classes: []
  domains: []
check:
  all:
    - name: codelist_id
      operator: empty
    - name: __datatype_matches_codelist
      operator: equal_to
      value: true
outcome:
  message: "Variable Data Type does not match the referenced Codelist Data Type. These must be consistent."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.12; 5.3.13"
  cited_guidance: >
    P21 OD0075/OD0080: Datatype of variable should match with Codelist datatype.

tests:
  - name: "HRL-DD-106 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-106 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

