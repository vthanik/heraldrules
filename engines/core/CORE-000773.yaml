Check:
  all:
    - name: --DTC
      operator: non_empty
    - name: --DTC
      operator: date_greater_than
      value: $dsstdtc
Core:
  Id: CORE-000773
  Status: Published
  Version: '1'
Description: --DTC may not be later than DS.DSSTDTC
Executability: Fully Executable
Operations:
  # Though there should be only one record per subject in DS
  - domain: DS
    group:
      - USUBJID
    id: $dsstdtc
    name: DSSTDTC
    operator: max_date
Outcome:
  Message: --DTC may not be later than DS.DSSTDTC (date/time of death)
  Output Variables:
    - --DTC
    - $dsstdtc
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - MI
      - MA
      - TF
Sensitivity: Record
