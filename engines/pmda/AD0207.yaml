id: AD0207
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: The same subject in ADSL and DM must have the same value for Race (RACE).
  There must be traceability between ADaM and SDTM.
