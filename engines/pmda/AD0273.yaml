id: AD0273
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: For additional Flag (AOCCzzFL) variables representing the 1st Occurrence
  of an analysis event or datapoint, zz must be nth flag variable (01 to 99). The
  main purpose of these flags is to facilitate data point traceability between records
  in the dataset and unique counts in the summary displays. In addition, if a Time
  to Event (TTE) Analysis dataset is built off of Adverse Events, the flags provide
  a crucial link between the summary records in the TTE BDS and the source of the
  records in ADAE. If the producer of the ADAE dataset has standard programs in place
  to summarize unique counts of events, then they may choose not to create these flags.
scope:
  classes: []
  domains:
    - OCCDS
    - ADAE
    - MDOCCDS
check:
  all:
    - name: AOCC01FL
      operator: empty
    - name: AOCC01FL
      operator: in
      value:
        - 'Y'
outcome:
  message: 'Illegal variable name: zz is not in [01-99] for AOCCzzFL'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0273
  pmda_category: Error
  ig_versions: []

