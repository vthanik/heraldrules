Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If Ratio to Analysis Range y Lower Limit (R2AyLO) variable is present, Analysis Value Lower Limit (AyLO) must also be present.
                Document: ADaM IG v1.1
                Section: '3.3.6'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-346
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: R2A1LO
      operator: empty
    - name: A1LO
      operator: non_empty
Core:
  Id: ADaM-346
  Status: Published
  Version: '1'
Description: >-
  When R2A1LO is present, A1LO must also be present.
Executability: Fully Executable
Outcome:
  Message: 'R2A1LO is present but A1LO is missing'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "R2A1LO and A1LO both present"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, A1LO, R2A1LO]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 130.0, 1.115]
    expected_findings: 0
  - name: "R2A1LO present but A1LO missing"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, A1LO, R2A1LO]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "", 1.115]
    expected_findings: 1
