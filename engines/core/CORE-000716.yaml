Check:
  all:
    - name: --SOC
      operator: exists
    - name: --SOCCD
      operator: exists
    - name: --SOC
      operator: is_not_unique_relationship
      value: --SOCCD
Core:
  Id: CORE-000716
  Status: Published
  Version: '1'
Description: --SOCCD and --SOC should have a one-to-one relationship.
Executability: Fully Executable
Outcome:
  Message: --SOCCD and --SOC do not have a one-to-one relationship.
  Output Variables:
    - --SOC
    - --SOCCD
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - EVENTS
  Domains:
    Include:
      - ALL
Sensitivity: Record
