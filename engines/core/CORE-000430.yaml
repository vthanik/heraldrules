Check:
  all:
    - name: --ORRES
      operator: empty
    - name: --STRESC
      operator: non_empty
Core:
  Id: CORE-000430
  Status: Published
  Version: "1"
Description: When --ORRES is null, --STRESC must also be null
Executability: Fully Executable
Outcome:
  Message: --STRESC must be be null as --ORRES is null.
  Output Variables:
    - --ORRES
    - --STRESC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - ALL
  Use Case: NONCLIN
Sensitivity: Record
