Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  BCHGCAyN is the numeric secondary variable of BCHGCATy. When BCHGCATy is present in a dataset, BCHGCAyN must also be present per secondary variable conventions. Added in v1.2.
                Document: ADaM IG v1.2
                Section: '3.3.4'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-1029
              Version: '1'
            Version: '1.0'
        Version: '1.2'
Check:
  all:
    - name: BCHGCAT1
      operator: non_empty
    - name: BCHGCA1N
      operator: empty
Core:
  Id: ADaM-1029
  Status: Published
  Version: '1'
Description: >-
  BCHGCAyN (numeric secondary of BCHGCATy) must be present when BCHGCATy is present.
Executability: Partially Executable
Outcome:
  Message: 'BCHGCATy is present but its numeric secondary BCHGCAyN is absent'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.2"]
  source: Herald-originated (ADaM-IG v1.2 gap-fill)
  catalogs:
    - ADaMIG 1.2
  fetched: '2026-04-12'

tests:
  - name: "BCHGCA1N present when BCHGCAT1 present"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BCHGCAT1, BCHGCA1N]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "HIGH", "3"]
          - ["CDISCPILOT01", "01-701-1023", "SODIUM", "", ""]
    expected_findings: 0
  - name: "BCHGCAT1 present but BCHGCA1N absent"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BCHGCAT1, BCHGCA1N]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "HIGH", ""]
    expected_findings: 1
