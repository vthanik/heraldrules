id: AD0346
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: If Ratio to Analysis Range y Lower Limit (R2AyLO) flag variable is present,
  there must also be a corresponding Analysis Range y Lower Limit (AyLO) variable.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: R2A1LO
      operator: empty
    - name: A1LO
      operator: non_empty
outcome:
  message: AyLO variable is not present when R2AyLO is present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0346
  pmda_category: Error
  ig_versions: []

