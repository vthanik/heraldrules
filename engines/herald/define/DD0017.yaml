# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.9.2
id: DD0017
version: 1
status: Published
standard: Define-XML
category: Dataset Definition
sensitivity: Dataset
executability: Fully Executable
description: >
  Key Variables must be populated for all datasets in regulatory submissions.
scope:
  classes: []
  domains: []
check:
  all:
    - name: keys
      operator: empty
outcome:
  message: "Key Variables is missing. In regulatory submissions, a key must be provided for each dataset."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.9.2"
  cited_guidance: >
    KeySequence -- Conditional. Each variable that is part of the dataset key must have a KeySequence attribute. In the context of a regulatory submission, a key must be provided for each dataset.
