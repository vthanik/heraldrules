# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 4.3.1
id: DD0028
version: 1
status: Published
standard: Define-XML
category: Variable Definition
sensitivity: Record
executability: Fully Executable
description: >
  Length must not exceed 200 for text variables (SAS v5 Transport limit).
scope:
  classes: []
  domains: []
check:
  all:
    - name: data_type
      operator: equal_to
      value: text
    - name: length
      operator: greater_than
      value: 200
outcome:
  message: "Text variable length exceeds 200 characters. SAS v5 Transport files restrict variable lengths to 200 characters."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "4.3.1"
  cited_guidance: >
    text -- Char -- Maximum allowable length. SAS v.5 Transport files restrict variable lengths to 200 characters.
