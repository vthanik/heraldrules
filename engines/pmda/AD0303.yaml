id: AD0303
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: For Customized MedDRA Query Name (SMQzzNAM) variables , zz must be the
  ordered CQ of interest (01 to 99). This ordering can be based on importance or some
  other sponsor-defined criteria. It is recommended that the ordering be consistent
  across studies within a development program.
scope:
  classes: []
  domains:
    - OCCDS
    - ADAE
    - MDOCCDS
check:
  all:
    - name: CQ01NAM
      operator: empty
    - name: CQ01NAM
      operator: matches_regex
      value: '^[A-Za-z0-9 /()-]+$'
outcome:
  message: 'Illegal variable name: zz is not in [01-99] for CQzzNAM'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0303
  pmda_category: Error
  ig_versions: []

