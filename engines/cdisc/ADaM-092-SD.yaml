Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  Within a study, all TRTPN values must be the same for each
                  unique value of TRTP when the primary variable TRTP is populated.
                Document: ADaM IG v1.1
                Section: "4.1"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-092-SD
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: TRTP
      operator: non_empty
    - name: TRTPN
      operator: non_empty
    - name: TRTPN
      operator: not_consistent_with_variable
      value: TRTP
Core:
  Id: ADaM-092-SD
  Status: Published
  Version: "1"
Description: >-
  Within a study, all TRTPN values must be the same for each unique value of
  TRTP when the primary variable TRTP is populated.
Executability: Partially Executable
Outcome:
  Message: "Inconsistent value for TRTPN across TRTP values"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
      - OCCURRENCE DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: TRTPN consistent for TRTP value
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, TRTP, TRTPN]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, Placebo, 0]
          - [CDISCPILOT01, 01-701-1028, SODIUM, Placebo, 0]
    expected_findings: 0
  - name: TRTPN inconsistent for same TRTP value
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, TRTP, TRTPN]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, Placebo, 0]
          - [CDISCPILOT01, 01-701-1028, SODIUM, Placebo, 1]
    expected_findings: 1
