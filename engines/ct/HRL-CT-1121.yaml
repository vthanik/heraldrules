id: HRL-CT-1121
version: 1
status: Published
standard: SDTM
category: Controlled Terminology
sensitivity: Record
executability: Fully Executable
description: TRTSET (Treatment Setting) must contain valid extensible codelist terms
  (new terms allowed).
scope:
  classes: []
  domains: []
check:
  all:
    - name: TRTSET
      operator: in
      value:
        - ADJUVANT
        - CONDITIONING
        - CONSOLIDATION
        - DEFINITIVE
        - INDUCTION
        - LOCALLY ADVANCED
        - MAINTENANCE
        - METASTATIC
        - MOBILIZATION
        - NEO-ADJUVANT
        - PREVENTATIVE
        - RADIOSENSITIZATION
        - RECURRENT
        - SALVAGE
        - TRANSPLANT
        - UNKNOWN
outcome:
  message: Value not found in extensible codelist Treatment Setting (C124308)
  severity: Warning
provenance:
  source_doc: NCI EVS CDISC Controlled Terminology (2025-09-26)
  authority: CDISC
  codelist_code: C124308
  codelist_name: Treatment Setting
  codelist_submission_value: TRTSET
  extensible: yes
  parent_rule: CT2002
  term_count: 16

