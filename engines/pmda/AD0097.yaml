id: AD0097
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: If Planned Pooled Treatment y (TRTPGyN) numeric variable is present,
  there must be a corresponding Planned Pooled Treatment y (TRTPGy) character variable.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: TRTPG1N
      operator: empty
    - name: TRTPG1
      operator: non_empty
outcome:
  message: TRTPGyN is present, but TRTPGy is not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0097
  pmda_category: Error
  ig_versions: []

