Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If Baseline Toxicity Grade (BTOXGR) variable is present, then Analysis Toxicity Grade (ATOXGR) must also be present.
                Document: ADaM IG v1.1
                Section: '3.3.7'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-163
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: BTOXGR
      operator: empty
    - name: ATOXGR
      operator: non_empty
Core:
  Id: ADaM-163
  Status: Published
  Version: '1'
Description: >-
  When BTOXGR is present, ATOXGR must also be present for toxicity shift analysis.
Executability: Fully Executable
Outcome:
  Message: 'BTOXGR is populated but ATOXGR is missing'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "BTOXGR and ATOXGR both present"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BTOXGR, ATOXGR]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "1", "2"]
    expected_findings: 0
  - name: "BTOXGR present but ATOXGR missing"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BTOXGR, ATOXGR]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "1", ""]
    expected_findings: 1
