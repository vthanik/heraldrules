id: AD0133
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: When all 3 variables are populated and AyLO does not equal 0, Ratio to
  AyLO (R2AyLO) must equal Analysis Value (AVAL) / Analysis Range y LO Value (AyLO).
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: R2A1LO
      operator: empty
    - name: A1LO
      operator: empty
    - name: AVAL
      operator: empty
    - name: A1LO
      operator: equal_to
      value: 0
    - name: R2A1LO
      operator: within_tolerance_of_formula
      value: AVAL / A1LO
      tolerance: 0.001
outcome:
  message: 'Calculation issue: R2AyLO != AVAL / AyLO'
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0133
  pmda_category: Warning
  ig_versions: []

