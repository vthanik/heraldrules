Check:
  all:
    - name: DSDECOD
      operator: not_equal_to
      value: DEATH
      value_is_literal: yes
    - name: DTHFL
      operator: equal_to
      value: 'Y'
      value_is_literal: yes
Core:
  Id: CORE-000252
  Status: Published
  Version: '1'
Description: When a record is present in the DS dataset where DSDECOD = 'DEATH' then
  death flag (DTHFL) should be populated as 'Y' in the DM dataset for the corresponding
  subject.
Executability: Fully Executable
Match_Datasets:
  - Keys:
      - USUBJID
    Name: DS
Outcome:
  Message: DSDECOD is 'DEATH' in DS dataset, but DTHFL in DM dataset is not "Y".
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
  Use_Case: INDH
Sensitivity: Record
