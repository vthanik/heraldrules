Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  Analysis Baseline Flag (ABLFL) must be Y or null. For record-level
                  character flag variables: Y = yes (this record is the baseline record).
                  Null values are allowed (indicates record is not the baseline).
                Document: ADaM IG v1.1
                Section: '3.3.5'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-176
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: ABLFL
      operator: non_empty
    - name: ABLFL
      operator: not_equal_to
      value: 'Y'
Core:
  Id: ADaM-176
  Status: Published
  Version: '1'
Description: >-
  ABLFL (Analysis Baseline Flag) must have a value of Y or null. A value of N is not
  valid; null indicates the record is not the analysis baseline.
Executability: Fully Executable
Outcome:
  Message: 'ABLFL has a value other than Y or null'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "ABLFL has valid value Y"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ABLFL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Y"]
          - ["CDISCPILOT01", "01-701-1023", "SODIUM", ""]
    expected_findings: 0
  - name: "ABLFL has invalid value N"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ABLFL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "N"]
    expected_findings: 1
  - name: "ABLFL has invalid value YES"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ABLFL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "YES"]
    expected_findings: 1
