# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.11; 5.3.12
id: HRL-DD-063
version: 1
status: Published
standard: Define-XML
category: Cross-Reference
sensitivity: Record
executability: Fully Executable
description: >
  Dataset referenced in Variables sheet must exist in the Datasets sheet.
scope:
  classes: []
  domains: []
check:
  all:
    - name: dataset
      operator: empty
    - name: __dataset_exists_in_ds_spec
      operator: equal_to
      value: true
outcome:
  message: "Dataset referenced in Variables sheet does not exist in the Datasets sheet."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.11; 5.3.12"
  cited_guidance: >
    Each ItemOID used in an ItemRef must match an OID for an ItemDef. Variables are associated with datasets through ItemRefs contained in ItemGroupDef elements.

tests:
  - name: "HRL-DD-063 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-063 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

