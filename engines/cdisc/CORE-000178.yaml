Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: Subject Status does not contain details about the
                  circumstances of a subject's status. The response to the status
                  assessment may trigger collection of additional details, but those
                  details are to be stored in appropriate separate domains. For example,
                  if a  subject's survival status is "DEAD", the date of death must
                  be stored in DM and within a final disposition record in DS. Only
                  the status collection date, the status question, and the status
                  response are stored in SS.
                Document: IG v3.4
                Item: Assumption 1
                Section: 6.3.11
            Origin: SDTM and SDTMIG Conformance Rules
            Rule_Identifier:
              Id: CG0172
              Version: '2'
            Version: '2.0'
        Version: '3.4'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: Subject Status does not contain details about the
                  circumstances of a subject's status. The response to the status
                  assessment may trigger collection of additional details but those
                  details are to be stored in appropriate separate domains. For example,
                  if a subject's Survival Status is <U+201C>DEAD<U+201D>, the date of death must
                  be stored in DM and within a final disposition record in DS. Only
                  the status collection date, the status question and the status response
                  are stored in SS.
                Document: IG v3.3
                Item: Assumption 1
                Section: 6.3.15
            Origin: SDTM and SDTMIG Conformance Rules
            Rule_Identifier:
              Id: CG0172
              Version: '2'
            Version: '2.0'
        Version: '3.3'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: Subject Status does not contain details about the
                  circumstances of a subject's status. The response to the status
                  assessment may trigger collection of additional details but those
                  details are to be stored in appropriate separate domains. For example,
                  if a subject's Survival Status is "DEAD", the date of death must
                  be stored in DM and within a final disposition record in DS. Only
                  the status collection date, the status question and the status response
                  are stored in SS.
                Document: IG v3.2
                Item: Assumption 1
                Section: 6.3.
            Origin: SDTM and SDTMIG Conformance Rules
            Rule_Identifier:
              Id: CG0172
              Version: '2'
            Version: '2.0'
        Version: '3.2'
Check:
  all:
    - name: SSSTRESC
      operator: equal_to
      value: DEAD
      value_is_literal: yes
    - name: SSDTC
      operator: date_less_than
      value: $max_ds_dsstdtc
Core:
  Id: CORE-000178
  Status: Published
  Version: '1'
Description: Raise an error when SSSTRESC = 'DEAD' and SSDTC < max DS.DSSTDTC.
Executability: Fully Executable
Operations:
  - domain: DS
    group:
      - USUBJID
    id: $max_ds_dsstdtc
    name: DSSTDTC
    operator: max_date
Outcome:
  Message: SSSTRESC = 'DEAD', but SSDTC < max DS.DSSTDTC.
  Output_Variables:
    - SSSTRESC
    - SSDTC
    - $max_ds_dsstdtc
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - SS
Sensitivity: Record
herald:
  source: CDISC Library API
  catalogs:
    - SDTMIG 3.2
    - SDTMIG 3.3
  fetched: '2026-04-03T12:57:40Z'

