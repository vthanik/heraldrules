# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.14
id: DD0057
version: 1
status: Published
standard: Define-XML
category: Method Definition
sensitivity: Record
executability: Fully Executable
description: >
  Method Type must be 'Computation' or 'Imputation'.
scope:
  classes: []
  domains: []
check:
  all:
    - name: type
      operator: not_empty
    - name: type
      operator: not_in
      value:
        - Computation
        - Imputation
outcome:
  message: "Method Type is not valid. Must be 'Computation' or 'Imputation'."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.14"
  cited_guidance: >
    Type -- Required. Computation, Imputation.
