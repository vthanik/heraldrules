id: SD1010
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Description of Element (ELEMENT) should be null when subject's experience
  for a particular period of time is represented as an unplanned Element, where Element
  Code (ETCD) is equal to 'UNPLAN'.
scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: SE
  Use_Case: INDH, NONCLIN
check:
  all:
    - name: ETCD
      operator: not_equal_to
      value: UNPLAN
    - name: ELEMENT
      operator: empty
outcome:
  message: ELEMENT value is populated when ETCD= 'UNPLAN'
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1010
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000009

