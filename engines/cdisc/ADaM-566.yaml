Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If Percent Change to Baseline Category y (N) (PBCHGCyN) variable
                  is used in a dataset, PBCHGCy must also be present.
                Document: ADaM IG v1.1
                Section: "4.4"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-566
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: PBCHGC1N
      operator: empty
    - name: PBCHGC1
      operator: non_empty
Core:
  Id: ADaM-566
  Status: Published
  Version: "1"
Description: >-
  If Percent Change to Baseline Category y (N) (PBCHGCyN) variable is used
  in a dataset, PBCHGCy must also be present.
Executability: Partially Executable
Outcome:
  Message: "PBCHGCyN is present but PBCHGCy is not present"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: PBCHGC1N and PBCHGC1 both present (valid)
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, PBCHGC1N, PBCHGC1]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 1, "LOW"]
    expected_findings: 0
  - name: PBCHGC1N present but PBCHGC1 missing (violation)
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, PBCHGC1N, PBCHGC1]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 1, ""]
    expected_findings: 1
