id: AD0648
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: If TRTEMwFL is included, TRTEMFL is defined as the overall treatment
  emergent flag. If any Treatment Emergent Analysis w Flag (TRTEMwFL) variables are
  flagged Y, then the overall Treatment Emergent Analysis Flag (TRTEMFL) variable
  should also be Y.
scope:
  classes: []
  domains: ADAE
check:
  all:
    - name: TRTEM1FL
      operator: not_equal_to
      value: 'Y'
    - name: TRTEMFL
      operator: equal_to
      value: 'Y'
outcome:
  message: TRTEMwFL = Y and TRTEMFL != Y
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0648
  pmda_category: Error
  ig_versions: []

