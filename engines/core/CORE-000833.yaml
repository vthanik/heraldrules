Authorities:
  - Organization: CDISC
    Standards:
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: >-
                  References must be a fixed value or a reference to items
                  stored elsewhere in the data model which must be specified in
                  the correct format. They must start with '<usdm:ref', end with
                  either '/>' or '></usdm:ref>', and must contain
                  'klass="klassName"', 'id="idValue"', and
                  'attribute="attributeName"/>' in any order (where "klassName"
                  and "attributeName" contain only letters in upper or lower
                  case).
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00137'
              Version: '1'
            Version: '1.0'
        Version: '3.0'
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: >-
                  References must be a fixed value or a reference to items
                  stored elsewhere in the data model which must be specified in
                  the correct format. They must start with '<usdm:ref', end with
                  either '/>' or '></usdm:ref>', and must contain
                  'klass="klassName"', 'id="idValue"', and
                  'attribute="attributeName"/>' in any order (where "klassName"
                  and "attributeName" contain only letters in upper or lower
                  case).
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00137'
              Version: '1'
            Version: '1.0'
        Version: '4.0'
Check:
  all:
    - name: instanceType
      operator: equal_to
      value: 'ParameterMap'
    - name: rel_type
      operator: equal_to
      value: definition
    - name: reference
      operator: contains
      value: 'usdm:ref'
    - name: reference
      operator: not_matches_regex
      value: '^<usdm:ref((?=[^>]* klass=\"[a-zA-Z]+\")(?=[^>]*
        id=\"([^\"]+)\")(?=[^>]*
        attribute=\"[a-zA-Z]+\")[^>]*)(\/>|><\/usdm:ref>)$'
Core:
  Id: 'CORE-000833'
  Status: Published
  Version: '1'
Description: >-
  References must be a fixed value or a reference to items stored elsewhere in
  the data model which must be specified in the correct format. They must start
  with '<usdm:ref', end with either '/>' or '></usdm:ref>', and must contain
  'klass="klassName"', 'id="idValue"', and 'attribute="attributeName"/>' in any
  order (where "klassName" and "attributeName" contain only letters in upper or
  lower case).
Executability: Fully Executable
Outcome:
  Message: 'The reference is not a fixed value (it contains "usdm:ref") but it is
    not specified in the correct format.'
  Output Variables:
    - parent_entity
    - parent_id
    - parent_rel
    - id
    - tag
    - reference
Rule Type: Record Data
Scope:
  Entities:
    Include:
      - 'ParameterMap'
Sensitivity: Record
