id: AD1011
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: 'In a pair of corresponding character and numeric variables (* and *N
  or *C) the primary or most commonly used variable must be populated if its secondary
  variable describing it is populated. Exceptions: *DTC, *FN, TRTPN, TRT01PN, PARAMN,
  AVALC, BASEC, *LOC, and *HIC. Corresponding character and numeric values must also
  have a one-to-one mapping consistency when the primary variable is populated, which
  are addressed in other rules.'
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: TRT01PN
      operator: empty
    - name: TRT01P
      operator: non_empty
outcome:
  message: Secondary variable is populated, but its primary variable * is not populated
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD1011
  pmda_category: Warning
  ig_versions: []

