id: HRL-TS-003
version: 1
status: Published
standard: Define-XML
category: Presence
sensitivity: Record
executability: Fully Executable
description: Pharmacokinetic Parameters (PP) dataset should be included in every submission
  with pharmacokinetics observations.
scope:
  classes: []
  domains: []
check:
  all:
    - name: PP
      operator: dataset_exists
outcome:
  message: Missing PP dataset
  severity: Error
provenance:
  source_doc: Herald-original (gap analysis vs P21 Community catalog)
  authority: Herald
  p21_reference: TS0051

tests:
  - name: "PP dataset is present in submission"
    type: positive
    skip: true
    datasets:
      PP:
        variables: [STUDYID, USUBJID, PPSEQ]
        records:
          - ["S1", "S1-001", 1]
    expected_findings: 0

  - name: "PP dataset is absent from submission"
    type: negative
    skip: true
    datasets:
      PC:
        variables: [STUDYID, USUBJID]
        records:
          - ["S1", "S1-001"]
    expected_findings: 1

