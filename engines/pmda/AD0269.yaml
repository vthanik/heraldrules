id: AD0269
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: A Treatment Flag variable must have a value that is Y or null. Examples
  of such Flags variables in ADaM-IG 1.2 are Treatment Emergent Analysis Flag (TRTEMFL),
  Pre-treatment Flag (PREFL), On Treatment Record Flag (ONTRTFL), Follow-up Flag (FUPFL),
  and Last Value On Treatment Record Flag (LVOTFL).
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: TRTEMFL
      operator: empty
    - name: TRTEMFL
      operator: equal_to
      value: 'Y'
outcome:
  message: Variable flag value is not Y or null
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0269
  pmda_category: Error
  ig_versions: []

