id: AD0570
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: If any of the subject-level subperiod timing variables (PxxSw, PxxSwSDT,
  PxxSwSTM, PxxSwSDM, PxxSwSDF, PxxSwSTF, PxxSwEDT, PxxSwETM, PxxSwEDM, PxxSwEDF,
  PxxSwETF) are present, there must be a corresponding Planned Treatment for Period
  xx (TRTxxP) character variable present for the same xx value.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
check:
  all:
    - name: P01STDT
      operator: empty
    - name: TRT01P
      operator: non_empty
outcome:
  message: Variable is present, but TRTxxP is not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0570
  pmda_category: Error
  ig_versions: []

