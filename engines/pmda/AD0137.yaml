id: AD0137
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: When CRITyFL (Analysis Criterion Flag) is populated, it's corresponding
  parent Analysis Criterion y must be populated.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: CRIT1FL
      operator: empty
    - name: CRIT1
      operator: non_empty
outcome:
  message: CRITyFL is populated, but CRITy is not populated
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0137
  pmda_category: Error
  ig_versions: []

