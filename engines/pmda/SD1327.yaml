id: SD1327
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: The Related Subject or Pool Identifier (RSUBJID) value should not be
  equal to Pool Identifier (POOLID).
scope:
  Classes:
    Include: RELATIONSHIP
  Domains:
    Include: RELSUB
check:
  all:
    - name: RSUBJID
      operator: empty
    - name: RSUBJID
      operator: not_equal_to
      value: POOLID
outcome:
  message: RSUBJID is equal to POOLID
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1327
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000232

