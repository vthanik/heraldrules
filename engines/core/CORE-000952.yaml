# Variable: --ENDTC, DM.RFPENDTC
# Condition: --ENDTC ^= Null and DM.RFPENDTC ^= Null
# Rule: --ENDTC > DM.RFPENDTC
Authorities:
  - Organization: FDA
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: Study start and end date/time should include month, day, and
                  year.
                Document: FDA
                Section: FDAB034
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB3407
              Version: '1'
            Version: '1.5'
        Version: '3.2'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: Study start and end date/time should include month, day, and
                  year.
                Document: FDA
                Section: FDAB034
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB3407
              Version: '1'
            Version: '1.5'
        Version: '3.3'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: Study start and end date/time should include month, day, and
                  year.
                Document: FDA
                Section: FDAB034
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB3407
              Version: '1'
            Version: '1.5'
        Version: '3.4'
Check:
  all:
    - name: --ENDTC
      operator: non_empty
    - name: DM.RFPENDTC
      operator: non_empty
    - name: --ENDTC
      operator: date_greater_than
      value: DM.RFPENDTC
Core:
  Id: CORE-000952
  Status: Published
  Version: '1'
Description: End Date/Time (--ENDTC) variable value should be prior or equal to
  the Date/Time of End of Participation (RFPENDTC).
Executability: Fully Executable
Match Datasets:
  - Keys:
      - USUBJID
    Name: DM
Outcome:
  Message: --ENDTC falls after RFPENDTC.
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - INTERVENTIONS
      - EVENTS
      - FINDINGS
      - FINDINGS ABOUT
      - SPECIAL PURPOSE
  Domains:
    Exclude:
      - DM
      - DS
    Include:
      - ALL
Sensitivity: Record
