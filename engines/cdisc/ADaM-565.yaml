Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If Change to Baseline Category y (N) (BCHGCAyN) variable is used
                  in a dataset, BCHGCAy must also be present.
                Document: ADaM IG v1.1
                Section: "4.4"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-565
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: BCHGCA1N
      operator: empty
    - name: BCHGCA1
      operator: non_empty
Core:
  Id: ADaM-565
  Status: Published
  Version: "1"
Description: >-
  If Change to Baseline Category y (N) (BCHGCAyN) variable is used in a
  dataset, BCHGCAy must also be present.
Executability: Partially Executable
Outcome:
  Message: "BCHGCAyN is present but BCHGCAy is not present"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: BCHGCA1N and BCHGCA1 both present (valid)
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BCHGCA1N, BCHGCA1]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 1, "DECREASED"]
    expected_findings: 0
  - name: BCHGCA1N present but BCHGCA1 missing (violation)
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BCHGCA1N, BCHGCA1]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 1, ""]
    expected_findings: 1
