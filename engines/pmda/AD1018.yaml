id: AD1018
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: For Analysis Flag zz (ANLzzFL) and Analysis Flag zz (N) (ANLzzFN) variables,
  'zz' is an index for the zzth record selection algorithm where 'zz' is must be in
  [01-99]. Similar to CDISC ADaM Validation Checks No. 299-303.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: ANL01FL
      operator: empty
    - name: ANL01FN
      operator: non_empty
outcome:
  message: 'Illegal variable name: zz is not in [01-99] for ANLzzFL/FN'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD1018
  pmda_category: Error
  ig_versions: []

