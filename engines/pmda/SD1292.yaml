id: SD1292
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Start Relative to Reference Time Point (--STRTPT) must be populated when
  Start Reference Time Point (--STTPT) is populated.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH, PROD
check:
  all:
    - name: --STTPT
      operator: empty
    - name: --STRTPT
      operator: non_empty
outcome:
  message: Missing value for --STRTPT when --STTPT is populated
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1292
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000085

