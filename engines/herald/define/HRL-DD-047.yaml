# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.12
id: HRL-DD-047
version: 1
status: Published
standard: Define-XML
category: Variable Definition
sensitivity: Record
executability: Fully Executable
description: >
  Length is required when Data Type is text, integer, or float.
scope:
  classes: []
  domains: []
check:
  all:
    - name: data_type
      operator: not_in
      value:
        - text
        - integer
        - float
    - name: length
      operator: non_empty
outcome:
  message: "Length is missing but required when Data Type is text, integer, or float."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.12"
  cited_guidance: >
    Length -- Conditional. Required if DataType is 'Text', 'Integer', or 'Float'.

tests:
  - name: "HRL-DD-047 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-047 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

