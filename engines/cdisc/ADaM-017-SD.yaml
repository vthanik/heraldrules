Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  The length of a variable value may not be greater than 200 characters
                  (single-dataset variant).
                Document: ADaM IG v1.1
                Section: '3.1'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-17-SD
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: PARAM
      operator: longer_than
      value: 200
Core:
  Id: ADaM-017-SD
  Status: Published
  Version: '1'
Description: >-
  All ADaM character variable values must be no more than 200 characters in length
  (single-dataset variant). Uses PARAM as a representative character variable.
Executability: Partially Executable
Outcome:
  Message: 'Character variable value exceeds maximum length of 200 characters (single-dataset check)'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "PARAM value within 200 character limit (single dataset)"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAM]
        records:
          - ["CDISCPILOT01", "01-701-1015", "Hemoglobin (g/dL)"]
    expected_findings: 0
  - name: "PARAM value exceeds 200 characters (single dataset)"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAM]
        records:
          - ["CDISCPILOT01", "01-701-1015", "LONGVALUEXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"]
    expected_findings: 1
