Check:
  all:
    - name: SSSTRESC
      operator: not_equal_to
      value: DEAD
      value_is_literal: yes
    - name: DTHFL
      operator: equal_to
      value: 'Y'
      value_is_literal: yes
Core:
  Id: CORE-000008
  Status: Published
  Version: '1'
Description: When survival status is completed as 'DEAD' in the SS dataset then death
  flag (DTHFL) should be populated as 'Y' in the DM dataset for the corresponding
  subject.
Executability: Fully Executable
Match_Datasets:
  - Keys:
      - USUBJID
    Name: SS
Outcome:
  Message: SSTRESC in SS dataset is "DEAD", but DTHFL in DM dataset is not "Y".
  Output_Variables:
    - DTHFL
    - SSSTRESC
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
Sensitivity: Record
herald:
  source: CDISC Library API
  catalogs:
    - SDTMIG 3.2
    - SDTMIG 3.3
