id: SD1372
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Character Result/Finding in Std Format (--STRESC) should be populated
  when Last Observation Before Exposure Flag (--LOBXFL) is set to 'Y'.
scope:
  Classes:
    Include: FINDINGS
  Domains:
    Include: ALL
  Use_Case: INDH
check:
  all:
    - name: --LOBXFL
      operator: not_equal_to
      value: 'Y'
      value_is_literal: yes
    - name: --STRESC
      operator: non_empty
outcome:
  message: --STRESC is null when --LOBXFL = 'Y'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1372
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000105

