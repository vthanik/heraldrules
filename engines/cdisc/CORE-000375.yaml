                  For subjective data (when QORIG=<U+201D>ASSIGNED<U+201D>), the value in QEVAL
                  should reflect the role of the person or institution assigning the
                  value (e.g., SPONSOR or ADJUDICATION COMMITTEE).
                Document: IG v3.3
