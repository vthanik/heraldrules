# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.12
id: HRL-DD-050
version: 1
status: Published
standard: Define-XML
category: Variable Definition
sensitivity: Record
executability: Fully Executable
description: >
  Length must be a positive integer when provided.
scope:
  classes: []
  domains: []
check:
  all:
    - name: length
      operator: empty
    - name: length
      operator: greater_than
      value: 0
outcome:
  message: "Length must be a positive integer."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.12"
  cited_guidance: >
    Length -- Integer. The variable length in characters.

tests:
  - name: "HRL-DD-050 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-050 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

