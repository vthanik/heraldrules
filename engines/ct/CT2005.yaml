id: CT2005
version: 1
status: Published
standard: SDTM
category: Controlled Terminology
sensitivity: Record
executability: Fully Executable

description: >
  Variable should be populated with terms from its CDISC controlled terminology
  codelist when its value-level condition is met. New terms can be added as
  long as they are not duplicates, synonyms, or subsets of existing standard
  terms. This is the conditional variant of CT2002.

scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
  domains: []

check:
  all:
    - name: __ct_variable__
      operator: in_codelist
      value: __extensible__
      condition: __value_level__

outcome:
  message: "Variable value not found in extensible codelist {CODELIST} when value-level condition occurs"
  severity: Warning

authorities:
  - organization: FDA
    rule_ids: [CT2005]
  - organization: PMDA
    rule_ids: [CT2005]
  - organization: CDISC
    rule_ids: [CG0021, CG0040, CG0049]

provenance:
  source_doc: "FDA Validator Rules v1.6; PMDA Validation Rules v6.0"
  ct_source: "NCI EVS CDISC SDTM CT (sdtm-ct.json, extensible=true, conditional)"
