Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If R2AyHI is populated, AVAL must also be populated.
                Document: ADaM IG v1.1
                Section: '3.3.6'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-134B
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: R2A1HI
      operator: empty
    - name: AVAL
      operator: non_empty
Core:
  Id: ADaM-134B
  Status: Published
  Version: '1'
Description: >-
  When R2A1HI is present, AVAL must be present.
Executability: Fully Executable
Outcome:
  Message: 'R2A1HI is populated but AVAL is missing'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "R2A1HI and AVAL both present"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, R2A1HI]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 145.0, 0.967]
    expected_findings: 0
  - name: "R2A1HI present but AVAL missing"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, R2A1HI]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "", 0.967]
    expected_findings: 1
