Check:
  # case that POOLID ("permissible") is populated
  all:
    - name: POOLID
      operator: non_empty
    - name: COSEQ
      operator: is_not_unique_set
      value: POOLID
Core:
  Id: CORE-000389
  Status: Published
  Version: '1'
Description: Raise an error when COSEQ is not unique within POOLID
Executability: Fully Executable
Outcome:
  Message: The value of COSEQ is not unique within POOLID
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - CO
Sensitivity: Record
