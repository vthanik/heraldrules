Authorities:
  - Organization: CDISC
    Standards:
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'A window must not be defined for an anchor timing (i.e., type
                  is "Fixed Reference").'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00025'
              Version: '1'
            Version: '1.0'
        Version: '3.0'
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'A window must not be defined for an anchor timing (i.e., type
                  is "Fixed Reference").'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00025'
              Version: '1'
            Version: '1.0'
        Version: '4.0'
Check:
  all:
    - name: rel_type
      operator: equal_to
      value: 'definition'
    - name: type.code
      operator: equal_to
      value: 'C201358'
    - any:
        - name: windowLabel
          operator: non_empty
        - name: windowLower
          operator: non_empty
        - name: windowUpper
          operator: non_empty
Core:
  Id: CORE-000417
  Status: Published
  Version: '1'
Description: 'A window must not be defined for an anchor timing (i.e., type is
  "Fixed Reference").'
Executability: Fully Executable
Outcome:
  Message: 'One or more of the window attributes (windowLabel, windowLower,
    windowUpper) contains a value for a Fixed Reference timing
    (type.code=C201358).'
  Output Variables:
    - parent_entity
    - parent_id
    - parent_rel
    - id
    - name
    - type.code
    - type.decode
    - windowLabel
    - windowLower
    - windowUpper
Rule Type: Record Data
Scope:
  Entities:
    Include:
      - 'Timing'
Sensitivity: Record
