# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.12.1
id: HRL-DD-087
version: 1
status: Published
standard: Define-XML
category: Cross-Reference
sensitivity: Record
executability: Fully Executable
description: >
  Variable Codelist ID must exist in the Codelists sheet when provided.
scope:
  classes: []
  domains: []
check:
  all:
    - name: codelist_id
      operator: empty
    - name: __codelist_exists_in_cl_spec
      operator: equal_to
      value: true
outcome:
  message: "Variable references a Codelist ID that does not exist in the Codelists sheet."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.12.1"
  cited_guidance: >
    CodeListOID -- Must match the OID of a CodeList element in the same MetaDataVersion.

tests:
  - name: "HRL-DD-087 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-087 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

