  Status: Reference
  Version: '1'
Description: One End Time-Point variable is expected to be populated when an event
  or an intervention occurred. (E.g., End Date/Time of Event or Intervention (--ENDTC),
  or End Relative to Reference Period (--ENRF), or End Relative to Reference Period
  (--ENRTPT) should not be missing, or Occurrence (--OCCUR) = 'N' or Completion Status
  (--STAT) != '') or Duration (--DUR) != '').
