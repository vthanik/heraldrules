Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  v1.2 modified Table 3.3.4.1 BASETYPE notes from 'non-null for all records of that dataset' to 'non-null for all records for that PARAM within that dataset'. This narrows the scope from dataset-level to PARAM-level.
                Document: ADaM IG v1.2
                Section: '3.3.4'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-1048
              Version: '1'
            Version: '1.0'
        Version: '1.2'
Check:
  all:
    - name: BASETYPE
      operator: not_consistent_with_variable
      value: PARAMCD
Core:
  Id: ADaM-1048
  Status: Published
  Version: '1'
Description: >-
  In ADaM-IG v1.2, if BASETYPE is used for any PARAM within a dataset, it should be non-null for all records for that PARAM within that dataset (not for all records in the entire dataset as stated in v1.1).
Executability: Partially Executable
Outcome:
  Message: 'BASETYPE is null for some records of a PARAMCD where it is non-null for other records'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.2"]
  source: Herald-originated (ADaM-IG v1.2 gap-fill)
  catalogs:
    - ADaMIG 1.2
  fetched: '2026-04-12'

tests:
  - name: "BASETYPE consistent within PARAMCD (all non-null)"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BASETYPE]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "LAST"]
          - ["CDISCPILOT01", "01-701-1023", "SODIUM", "LAST"]
          - ["CDISCPILOT01", "01-701-1015", "ALT", ""]
          - ["CDISCPILOT01", "01-701-1023", "ALT", ""]
    expected_findings: 0
  - name: "BASETYPE inconsistent within PARAMCD (some null, some non-null)"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BASETYPE]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "LAST"]
          - ["CDISCPILOT01", "01-701-1023", "SODIUM", ""]
    expected_findings: 1
