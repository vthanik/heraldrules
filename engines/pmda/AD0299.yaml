id: AD0299
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: For Standardized MedDRA Query Variables of Name, Code and Scope(N), zz
  must be the ordered SMQ of interest (01 to 99). This ordering can be based on importance
  or some other sponsor-defined criteria. It is recommended that the ordering be consistent
  across studies within a development program.
scope:
  classes: []
  domains:
    - OCCDS
    - ADAE
    - MDOCCDS
check:
  all:
    - name: SMQ01NAM
      operator: empty
    - name: SMQ01CD
      operator: non_empty
outcome:
  message: 'Illegal variable name: zz is not in [01-99] for SMQzz(NAM, CD, SC, SCN)'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0299
  pmda_category: Error
  ig_versions: []

