Check:
  all:
    - name: --STAT
      operator: equal_to
      value: NOT DONE
      value_is_literal: true
    - any:
        - name: --REASND
          operator: empty
        - name: --REASND
          operator: not_exists
Core:
  Id: CORE-000774
  Status: Published
  Version: '1'
Description: When a test is not done (--STAT = NOT DONE), the Reason Not Done
  (--REASND) should be populated.
Executability: Partially Executable - Possible Overreporting
Outcome:
  Message: --STAT = NOT DONE, but --REASND is missing.
  Output Variables:
    - --TESTCD
    - --STAT
    - --REASND
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
      - FINDINGS ABOUT
  Domains:
    Include:
      - ALL
Sensitivity: Record
