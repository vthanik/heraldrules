id: SD0030
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Character Result/Finding in Std Units (--STRESC) should not be null when
  Standard Units (--STRESU) is provided.
scope:
  Classes:
    Include: FINDINGS
  Domains:
    Include: ALL
  Use_Case: INDH, PROD
check:
  all:
    - name: --STRESU
      operator: empty
    - name: --STRESC
      operator: non_empty
outcome:
  message: Missing value for --STRESC when --STRESU is provided
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0030
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000133

