id: SD1484
version: 1
status: Published
standard: SDTM
category: Conformance
sensitivity: Record
executability: Fully Executable
description: Last Observation Before Exposure Flag (--LOBXFL) variable should be present
  in all custom Findings domains.
scope:
  classes: []
  domains: []
check:
  all:
    - name: __LOBXFL__
      operator: has_flag_record
      value: 'Y'
outcome:
  message: No --LOBXFL variable in custom Findings domain
  severity: Error
provenance:
