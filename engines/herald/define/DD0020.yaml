# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.11
id: DD0020
version: 1
status: Published
standard: Define-XML
category: Dataset Definition
sensitivity: Dataset
executability: Fully Executable
description: >
  Purpose must be 'Tabulation' for SDTM/SEND or 'Analysis' for ADaM.
scope:
  classes: []
  domains: []
check:
  all:
    - name: purpose
      operator: not_empty
    - name: purpose
      operator: not_in
      value:
        - Tabulation
        - Analysis
outcome:
  message: "Purpose has an invalid value. Must be 'Tabulation' (SDTM/SEND) or 'Analysis' (ADaM)."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.11"
  cited_guidance: >
    Purpose -- Required. 'Tabulation', 'Analysis'. For SDTM and SEND, use Tabulation. For ADaM, use Analysis.
