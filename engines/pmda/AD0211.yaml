id: AD0211
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: 'ABLFN (Analysis Baseline Flag Numeric) must be 1 or null. For Parameter-Level
  and Record-Level Numeric Population Flag variables: 1 = yes (included). Null values
  are allowed.'
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: ABLFN
      operator: empty
    - name: ABLFN
      operator: equal_to
      value: 1
outcome:
  message: ABLFN value is not 1 or null
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0211
  pmda_category: Error
  ig_versions: []

