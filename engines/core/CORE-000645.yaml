Check:
  all:
    # throw an error when both AGE and AGETXT are not present in DM
    - name: AGE
      operator: not_exists
    - name: AGETXT
      operator: not_exists

Core:
  Id: CORE-000645
  Status: Published
  Version: '1'
Description: At least one of variables AGE or AGETXT is present in the DM dataset.
Executability: Fully Executable
Outcome:
  Message: Missing AGE or AGETXT variable.
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
Sensitivity: Dataset
