id: AD0279
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: Severity/Intensity (N) (AESEVN) and Analysis Severity/Intensity (N) (ASEVN)
  variables must have values in [1, 2, 3] when populated. AESEVN can be null. ASEVN
  cannot be null.
scope:
  classes: []
  domains:
    - OCCDS
    - ADAE
    - MDOCCDS
check:
  all:
    - name: AESEVN
      operator: empty
    - name: ASEVN
      operator: non_empty
outcome:
  message: Variable value != 1, 2, 3, or null
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0279
  pmda_category: Error
  ig_versions: []

