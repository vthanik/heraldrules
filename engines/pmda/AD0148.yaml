id: AD0148
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Numeric Value of Parameter name (PARAMN) must be an integer.
scope:
  classes: []
  domains: BDS
check:
  all:
    - name: PARAMN
      operator: empty
    - name: PARAMN
      operator: matches_regex
      value: '^-?\d+$'
outcome:
  message: PARAMN is not an integer
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0148
  pmda_category: Error
  ig_versions: []

