Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  When all 3 variables are populated, Change from Baseline (CHG)
                  must equal Analysis Value (AVAL) minus Baseline Value (BASE).
                Document: ADaM IG v1.1
                Section: "4.4"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-223
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: CHG
      operator: empty
    - name: AVAL
      operator: empty
    - name: BASE
      operator: empty
    - name: CHG
      operator: within_tolerance_of_formula
      value: AVAL - BASE
      tolerance: 0.001
Core:
  Id: ADaM-223
  Status: Published
  Version: "1"
Description: >-
  When all 3 variables are populated, Change from Baseline (CHG) must equal
  Analysis Value (AVAL) minus Baseline Value (BASE): CHG = AVAL - BASE.
Executability: Fully Executable
Outcome:
  Message: "CHG != AVAL - BASE"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: CHG = AVAL - BASE (valid)
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, BASE, CHG]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 145, 140, 5]
    expected_findings: 0
  - name: CHG != AVAL - BASE (violation)
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, BASE, CHG]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 145, 140, 10]
    expected_findings: 1
