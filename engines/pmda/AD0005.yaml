id: AD0005
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: 'A variable with a suffix of FL must have a value that is Y, N or null
  (Exception 1: RFL, PFL, ABLFL, ANLzzFL. Exception 2: Population flags COMPLFL, FASFL,
  ITTFL, PPROTFL, SAFFL, RANDFL, ENRLFL cannot be null and at least 1 must be included
  in ADSL).'
scope:
  classes: []
  domains:
    - ADSL
    - BDS
    - OCCDS
    - ADAE
    - ADAMOTHER
check:
  all:
    - name: ONTRTFL
      operator: non_empty
    - name: ONTRTFL
      operator: not_in
      value:
        - 'Y'
        - 'N'
outcome:
  message: '*FL value is not Y, N or null'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0005
  pmda_category: Error
  ig_versions: []

