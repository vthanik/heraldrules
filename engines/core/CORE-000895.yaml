Check:
  all:
    - name: '$txparmcd'
      operator: 'does_not_contain'
      value: 'TRTDOSU'
Core:
  Id: CORE-000895
  Status: Published
  Version: '1'
Description: For each Trial Set (SETCD) in the TX dataset a Dose Units (TRTDOSU)
  record should be included.
Executability: Fully Executable
# We make a list of the distinct values of TXPARMCD within each group with same value for SETCD
Operations:
  - domain: TX
    group:
      - SETCD
    id: $txparmcd
    name: TXPARMCD
    operator: distinct
Outcome:
  Message: TX dataset should include a TXPARMCD = TRTDOSU record per SETCD.
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - TRIAL DESIGN
  Domains:
    Include:
      - TX
# When "Dataset" is taken for "Sensitivity", only the first violation is reported
# When "Record" is taken for "Sensitivity", a violation is reported for each row in the group that violates the rule
Sensitivity: Record
