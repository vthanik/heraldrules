Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  A variable with a suffix of FN must have a value that is 0, 1, or
                  null. Exception: population flag numeric variables (SAFFN, ITTFN, etc.)
                  cannot be null (covered by ADaM-026 through ADaM-032).
                Document: ADaM IG v1.1
                Section: '3.2'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-6
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: ONTRTFN
      operator: non_empty
    - name: ONTRTFN
      operator: not_in
      value:
        - 0
        - 1
Core:
  Id: ADaM-006
  Status: Published
  Version: '1'
Description: >-
  A variable with a suffix of FN must have a value of 0, 1, or null. This rule
  uses ONTRTFN as a representative *FN variable. Full coverage requires checking
  all *FN columns across all ADaM datasets.
Executability: Partially Executable
Outcome:
  Message: '*FN variable has a value other than 0, 1, or null'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "ONTRTFN has valid value 1"
    type: positive
    datasets:
      ADAE:
        variables: [STUDYID, USUBJID, ONTRTFN]
        records:
          - ["CDISCPILOT01", "01-701-1015", 1]
          - ["CDISCPILOT01", "01-701-1023", 0]
          - ["CDISCPILOT01", "01-701-1028", ""]
    expected_findings: 0
  - name: "ONTRTFN has invalid value 2"
    type: negative
    datasets:
      ADAE:
        variables: [STUDYID, USUBJID, ONTRTFN]
        records:
          - ["CDISCPILOT01", "01-701-1015", 2]
    expected_findings: 1
