description: Every non-empty Codelist reference on the Variables sheet must exist
  as an ID on the Codelists sheet. Catches stray or leaked identifiers (e.g.
  Analysis Display or Document IDs accidentally placed in the Codelist column)
  that would otherwise surface as mysterious HRL-CL-001 "empty codelist"
  failures.
