      value: 'Y'
Core:
  Id: CORE-000007
  Status: Published
  Version: '1'
Description: When Date/Time of Death (DTHDTC) in the DM dataset is populated then
  death flag (DTHFL) should be populated as 'Y' in the DM dataset for the corresponding
  subject.
Executability: Fully Executable
Outcome:
  Message: DTHDTC is populated but DTHFL in DM dataset is not "Y".
  Output_Variables:
    - DTHDTC
    - DTHFL
Rule_Type: Record Data
Scope:
  Classes:
