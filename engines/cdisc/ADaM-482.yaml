Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  In a pair of corresponding character and numeric variables, the primary
                  (character) variable must be populated if its secondary (numeric)
                  variable is populated. Uses AVISIT/AVISITN as representative pair
                  in BDS datasets.
                Document: ADaM IG v1.1
                Section: '3.3.2'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-482
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: AVISITN
      operator: empty
    - name: AVISIT
      operator: non_empty
Core:
  Id: ADaM-482
  Status: Published
  Version: '1'
Description: >-
  When a numeric secondary variable is populated, its corresponding character primary
  variable must also be populated. Uses AVISITN/AVISIT as representative pair in BDS.
Executability: Partially Executable
Outcome:
  Message: 'AVISITN is populated but corresponding character variable AVISIT is missing'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "AVISITN and AVISIT both populated"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVISIT, AVISITN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Week 2", 2]
    expected_findings: 0
  - name: "AVISITN populated but AVISIT is null"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVISIT, AVISITN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "", 2]
    expected_findings: 1
