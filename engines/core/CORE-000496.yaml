Check:
  any:
    - all:
        # we must first test on USUBJID being populated
        - name: USUBJID
          operator: non_empty
        - name: FWTESTCD
          operator: 'is_not_unique_set'
          value:
            - USUBJID
            - FWDTC
            - FWENDTC
    - all:
        # we must first test on POOLID being populated
        - name: POOLID
          operator: non_empty
        - name: FWTESTCD
          operator: 'is_not_unique_set'
          value:
            - POOLID
            - FWDTC
            - FWENDTC
Core:
  Id: CORE-000496
  Status: Published
  Version: '1'
Description: ''
Executability: Fully Executable
Outcome:
  Message: 'Structure must be one record per test per interval (as defined by
    FWDTC and FWENDTC) per subject or pool'
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - FW
  Use Case: NONCLIN
Sensitivity: Record
