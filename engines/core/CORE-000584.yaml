Check:
  any:
    - all:
        - name: LBDTC
          operator: non_empty
        - name: USUBJID
          operator: non_empty
        - name: LBTESTCD
          operator: is_not_unique_set
          value:
            - USUBJID
            - LBSPEC
            - LBDTC
    - all:
        - name: LBDTC
          operator: non_empty
        - name: POOLID
          operator: non_empty
        - name: LBTESTCD
          operator: is_not_unique_set
          value:
            - POOLID
            - LBSPEC
            - LBDTC
Core:
  Id: CORE-000584
  Status: Published
  Version: '1'
Description: Raise an error when there is more than one record present per test
  per specimen, in the LB Domain, for a subject or pool on a particular date.
Executability: Fully Executable
Outcome:
  Message: The LB test result is not unique per specimen per subject or pool and
    date/time.
  Output Variables:
    - POOLID
    - LBTESTCD
    - LBSPEC
    - LBDTC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - LB
  Use Case: NONCLIN
Sensitivity: Record
