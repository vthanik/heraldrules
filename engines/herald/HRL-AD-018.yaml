id: HRL-AD-018
version: 1
status: Published
standard: ADaM
category: Limit
sensitivity: Record
executability: Fully Executable
description: On a given record, a variable with a suffix of SDTM has a value greater
  than a value of a variable with the same root and a suffix of EDTM, and both variables
  are populated.
scope:
  classes: []
  domains: []
check:
  all:
    - name: __SDT__
      operator: less_than_or_equal_to
      value: __EDT__
outcome:
  message: '*SDTM is greater than *EDTM'
  severity: Error
provenance:
  source_doc: Herald-original (gap analysis vs P21 Community catalog)
  authority: Herald
  p21_reference: AD0794

tests:
  - name: "ASTDTM is less than or equal to AENDTM"
    type: positive
    skip: true
    datasets:
      ADAE:
        variables: [STUDYID, USUBJID, ASTDTM, AENDTM]
        records:
          - ["S1", "S1-001", "2024-01-01T08:00", "2024-01-10T18:00"]
    expected_findings: 0

  - name: "ASTDTM is greater than AENDTM"
    type: negative
    skip: true
    datasets:
      ADAE:
        variables: [STUDYID, USUBJID, ASTDTM, AENDTM]
        records:
          - ["S1", "S1-001", "2024-01-10T18:00", "2024-01-01T08:00"]
    expected_findings: 1

