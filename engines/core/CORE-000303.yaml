Check:
  all:
    - name: --TEST
      operator: is_not_unique_relationship
      value: --TESTCD
Core:
  Id: CORE-000303
  Status: Published
  Version: '1'
Description: --TESTCD and --TEST should have a one-to-one relationship.
Executability: Fully Executable
Outcome:
  Message: --TESTCD and --TEST do not have a one-to-one relationship.
  Output Variables:
    - --TESTCD
    - --TEST
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
      - FINDINGS ABOUT
  Domains:
    Include:
      - ALL
Sensitivity: Record
