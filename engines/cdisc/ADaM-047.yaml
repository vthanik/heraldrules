Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  Variables described in ADaM as Required must be included in the
                  dataset. This includes STUDYID, USUBJID, and other required variables
                  specified in the ADaM Implementation Guide for each dataset class.
                Document: ADaM IG v1.1
                Section: '3.1'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-47
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Core:
  Id: ADaM-047
  Status: Published
  Version: '1'
Description: >-
  All variables described as Required in the ADaM IG must be included in the
  dataset (ADSL, BDS, OCCDS, ADAE). This rule covers every core structural
  variable per the ADaM IG required-variable table.
Executability: Reference
Outcome:
  Message: 'Required variable is not present'
Rule_Type: Dataset Data
Scope:
  Classes:
    Include:
      - ADSL
      - BDS
      - OCCDS
  Domains:
    Include:
      - ALL
Sensitivity: Dataset
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'
  notes: >
    Deferred to Reference pending the `required_variables` operator in the
    herald R package (today a no-op stub at ../herald/R/rule-operator.R:862).
    Mirrors engines/pmda/AD0047. Activation plan is documented in
    HANDOFF_TO_HERALD_2026-04-18.md section 3.
