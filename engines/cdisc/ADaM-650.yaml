Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If ONTRTwFL (On-Treatment Flag for Window w) is included, ONTRTFL is the overall on-treatment flag. If ONTRTwFL=Y then ONTRTFL must be Y.
                Document: ADaM IG v1.1
                Section: '4.3'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-650
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: ONTRT1FL
      operator: equal_to
      value: 'Y'
    - name: ONTRTFL
      operator: not_equal_to
      value: 'Y'
Core:
  Id: ADaM-650
  Status: Published
  Version: '1'
Description: >-
  When ONTRT1FL (On-Treatment Flag Window 1) is Y, ONTRTFL must also be Y.
Executability: Partially Executable
Outcome:
  Message: 'ONTRT1FL is Y but ONTRTFL is not Y'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "ONTRT1FL=Y and ONTRTFL=Y (consistent)"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ONTRT1FL, ONTRTFL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Y", "Y"]
    expected_findings: 0
  - name: "ONTRT1FL=Y but ONTRTFL null"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ONTRT1FL, ONTRTFL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Y", ""]
    expected_findings: 1
