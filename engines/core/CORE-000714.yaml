Check:
  all:
    - name: RFXSTDTC
      operator: non_empty
    - name: RFXENDTC
      operator: non_empty
    - name: RFXSTDTC
      operator: date_greater_than
      value: RFXENDTC
Core:
  Id: CORE-000714
  Status: Published
  Version: '1'
Description: Date/Time of First Study Treatment (RFXSTDTC) variable value should
  be prior or equal to the Date/Time of Last Study Treatment (RFXENDTC).
Executability: Fully Executable
Outcome:
  Message: RFXSTDTC falls after RFXENDTC.
  Output Variables:
    - RFXSTDTC
    - RFXENDTC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
Sensitivity: Record
