Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If AWTDIFF (Analysis Window Difference from Target) is populated, AWTARGET (Analysis Window Target) must also be populated.
                Document: ADaM IG v1.1
                Section: '3.3.2'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-159
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: AWTDIFF
      operator: empty
    - name: AWTARGET
      operator: non_empty
Core:
  Id: ADaM-159
  Status: Published
  Version: '1'
Description: >-
  When AWTDIFF is present, AWTARGET must also be present since the difference is calculated relative to the target.
Executability: Fully Executable
Outcome:
  Message: 'AWTDIFF is populated but AWTARGET is missing'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "AWTDIFF and AWTARGET both populated"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AWTARGET, AWTDIFF]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 14, 2]
    expected_findings: 0
  - name: "AWTDIFF populated but AWTARGET missing"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AWTARGET, AWTDIFF]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "", 2]
    expected_findings: 1
