Authorities:
  - Organization: CDISC
    Standards:
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'Date values associated to a study definition document version
                  must be unique regarding the combination of type and
                  geographic scopes of the date.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00181'
              Version: '1'
            Version: '1.0'
        Version: '4.0'
Check:
  all:
    - name: instanceType
      operator: equal_to
      value: 'StudyDefinitionDocumentVersion'
    - name: rel_type
      operator: equal_to
      value: 'definition'
    - any:
        - all:
            - name: code.standardCode.code
              operator: exists
            - name: id
              operator: is_not_unique_set
              value:
                - type.code
                - type.code.GeographicScope
                - code.standardCode.code
        - all:
            - name: code.standardCode.code
              operator: not_exists
            - name: id
              operator: is_not_unique_set
              value:
                - type.code
                - type.code.GeographicScope
Core:
  Id: 'CORE-001068'
  Status: Published
  Version: '1'
Description: 'Date values associated to a study definition document version must
  be unique regarding the combination of type and geographic scopes of the
  date.'
Executability: Fully Executable
Match Datasets:
  - Keys:
      - Left: id
        Right: parent_id
      - rel_type
    Name: GovernanceDate
  - Keys:
      - Left: id.GovernanceDate
        Right: parent_id
      - rel_type
    Name: GeographicScope
Outcome:
  Message: 'The study definition document version has more than one governance
    date with the same type and geographic scope.'
  Output Variables:
    - parent_entity
    - parent_id
    - parent_rel
    - id
    - version
    - id.GovernanceDate
    - name
    - type.code
    - type.decode
    - type.code.GeographicScope
    - type.decode.GeographicScope
    - code.standardCode.code
    - code.standardCode.decode
    - dateValue
Rule Type: Record Data
Scope:
  Entities:
    Include:
      - 'StudyDefinitionDocumentVersion'
Sensitivity: Record
