id: AD0178
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: A variable of form ANLzzFL (analysis record flag) must be Y or null.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: ANL01FL
      operator: empty
    - name: ANL01FL
      operator: in
      value:
        - 'Y'
outcome:
  message: ANLzzFL value is not Y or null
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0178
  pmda_category: Error
  ig_versions: []

