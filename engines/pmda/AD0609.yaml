id: AD0609
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: When analysis Phase (APHASE) variable is defined, the analysis Phase
  Start Datetime (PHSDTM) variable value must equal ADSL Phase w Start Datetime (PHwSDTM)
  for that phase defined by the value in Phase (N) (APHASEN) variable. APHASEN = w.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: APHASE
      operator: empty
    - name: PHSDTM
      operator: non_empty
outcome:
  message: APHASEN w has a PHSDTM != ADSL.PHwSDTM
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0609
  pmda_category: Error
  ig_versions: []

