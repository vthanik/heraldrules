id: HRL-TS-004
version: 1
status: Published
standard: Define-XML
category: Conformance
sensitivity: Record
executability: Fully Executable
description: Either Severity/Intensity (AESEV) or Standard Toxicity Grade (AETOXGR)
  variables values must be populated.
scope:
  classes: []
  domains: []
check:
  all:
    - name: AESEV
      operator: non_empty
    - name: AETOXGR
      operator: non_empty
outcome:
  message: Neither AESEV nor AETOXGR is populated
  severity: Error
provenance:
  source_doc: Herald-original (gap analysis vs P21 Community catalog)
  authority: Herald
  p21_reference: TS0053

tests:
  - name: "AESEV is populated providing at least one of the required severity fields"
    type: positive
    datasets:
      AE:
        variables: [STUDYID, USUBJID, AESEV, AETOXGR]
        records:
          - ["S1", "S1-001", "MILD", "1"]
    expected_findings: 0

  - name: "both AESEV and AETOXGR are empty"
    type: negative
    datasets:
      AE:
        variables: [STUDYID, USUBJID, AESEV, AETOXGR]
        records:
          - ["S1", "S1-001", "", ""]
    expected_findings: 1

