Authorities:
  - Organization: CDISC
    Standards:
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'Within a study version, there must be no more than one title of
                  each type.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00100'
              Version: '1'
            Version: '1.0'
        Version: '3.0'
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'Within a study version, there must be no more than one title of
                  each type.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00100'
              Version: '1'
            Version: '1.0'
        Version: '4.0'
Check:
  all:
    - name: instanceType
      operator: equal_to
      value: 'StudyTitle'
    - name: rel_type
      operator: equal_to
      value: 'definition'
    - any:
        - name: type.code
          operator: is_not_unique_set
          value:
            - parent_id
        - name: type.decode
          operator: is_not_unique_set
          value:
            - parent_id
Core:
  Id: 'CORE-000817'
  Status: Published
  Version: '1'
Description: 'Within a study version, there must be no more than one title of each type.'
Executability: Fully Executable
Outcome:
  Message: 'There is more than one title of the same type code or decode.'
  Output Variables:
    - parent_entity
    - parent_id
    - parent_rel
    - id
    - text
    - type.code
    - type.decode
Rule Type: Record Data
Scope:
  Entities:
    Include:
      - StudyTitle
Sensitivity: Record
