# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.13
id: DD0050
version: 1
status: Published
standard: Define-XML
category: Codelist Definition
sensitivity: Record
executability: Fully Executable
description: >
  Codelist Data Type must be 'text', 'integer', or 'float'.
scope:
  classes: []
  domains: []
check:
  all:
    - name: data_type
      operator: not_empty
    - name: data_type
      operator: not_in
      value:
        - text
        - integer
        - float
outcome:
  message: "Codelist Data Type is not valid. Must be 'text', 'integer', or 'float'."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.13"
  cited_guidance: >
    DataType -- Required. 'text', 'float', 'Integer'. The data type of the codes.
