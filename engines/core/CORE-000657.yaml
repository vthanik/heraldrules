# Variable: AEENDTC, AEOUT
# Condition: AEOUT = "NOT RECOVERED/NOT RESOLVED"
# Rule: AEENDTC = Null
Authorities:
  - Organization: 'FDA'
    Standards:
      - Name: 'SDTMIG'
        References:
          - Citations:
              - Cited Guidance: 'Study start and end date/time should include month, day, and
                  year.'
                Document: 'FDA'
                Section: 'FDAB034'
            Origin: 'FDA Business Rules'
            Rule Identifier:
              Id: 'FB3409'
              Version: '1'
            Version: '1.5'
        Version: '3.2'
      - Name: 'SDTMIG'
        References:
          - Citations:
              - Cited Guidance: 'Study start and end date/time should include month, day, and
                  year.'
                Document: 'FDA'
                Section: 'FDAB034'
            Origin: 'FDA Business Rules'
            Rule Identifier:
              Id: 'FB3409'
              Version: '1'
            Version: '1.5'
        Version: '3.3'
      - Name: 'SDTMIG'
        References:
          - Citations:
              - Cited Guidance: 'Study start and end date/time should include month, day, and
                  year.'
                Document: 'FDA'
                Section: 'FDAB034'
            Origin: 'FDA Business Rules'
            Rule Identifier:
              Id: 'FB3409'
              Version: '1'
            Version: '1.5'
        Version: '3.4'
Check:
  all:
    - name: AEOUT
      operator: equal_to
      value: 'NOT RECOVERED/NOT RESOLVED'
    - name: AEENDTC
      operator: non_empty
Core:
  Id: CORE-000657
  Status: Published
  Version: '1'
Description: When Adverse Event Outcome (AEOUT) is populated with 'NOT
  RECOVERED/NOT RESOLVED', then the End Date/Time of Adverse Event (AEENDTC)
  should not be populated
Executability: Fully Executable
Outcome:
  Message: AEENDTC is populated, when AEOUT = NOT RECOVERED/NOT RESOLVED.
  Output Variables:
    - AETERM
    - AEOUT
    - AEENDTC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - EVENTS
  Domains:
    Include:
      - AE
Sensitivity: Record
