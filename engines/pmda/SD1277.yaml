id: SD1277
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Reported Term variables (--TERM) should not be populated with values
  of 'MULTIPLE'.
scope:
  Classes:
    Include: EVENTS
  Domains:
    Include: ALL
  Use_Case: INDH
check:
  all:
    - name: --TERM
      operator: not_equal_to
      value: MULTIPLE
outcome:
  message: --TERM equals 'MULTIPLE'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1277
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000164

