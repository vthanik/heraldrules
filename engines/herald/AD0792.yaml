id: AD0792
version: 1
status: Published
standard: ADaM
category: Limit
sensitivity: Record
executability: Fully Executable
description: On a given record, a variable with a suffix of SDT has a value greater
  than a value of a variable with the same root and a suffix of EDT, and both variables
  are populated.
scope:
  classes: []
  domains: []
check:
  all:
    - name: __SDT__
      operator: less_than_or_equal_to
      value: __EDT__
outcome:
  message: '*SDT is greater than *EDT'
  severity: Error
provenance:
  source_doc: Herald-original (gap analysis vs P21 Community catalog)
  authority: Herald
  p21_reference: AD0792

