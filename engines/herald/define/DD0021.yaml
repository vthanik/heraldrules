# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.12
id: DD0021
version: 1
status: Published
standard: Define-XML
category: Variable Definition
sensitivity: Record
executability: Fully Executable
description: >
  Variable name is required in the Variables sheet.
scope:
  classes: []
  domains: []
check:
  all:
    - name: variable
      operator: empty
outcome:
  message: "Variable name is missing. Each row in the Variables sheet must have a variable name."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.12"
  cited_guidance: >
    Name -- Required. Dataset Variable name or Variable Value Name.
