Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If Percent Change from Baseline Category y (N) (PCHGCAyN) variable
                  is used in a dataset, PCHGCAy must also be present.
                Document: ADaM IG v1.1
                Section: "4.4"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-546
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: PCHGCA1N
      operator: empty
    - name: PCHGCA1
      operator: non_empty
Core:
  Id: ADaM-546
  Status: Published
  Version: "1"
Description: >-
  If Percent Change from Baseline Category y (N) (PCHGCAyN) variable is
  used in a dataset, PCHGCAy must also be present.
Executability: Partially Executable
Outcome:
  Message: "PCHGCAyN is present but PCHGCAy is not present"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: PCHGCA1N and PCHGCA1 both present (valid)
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, PCHGCA1N, PCHGCA1]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 1, "LOW INCREASE"]
    expected_findings: 0
  - name: PCHGCA1N present but PCHGCA1 missing (violation)
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, PCHGCA1N, PCHGCA1]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 1, ""]
    expected_findings: 1
