Check:
  all:
    - name: $poolid_exists
      operator: equal_to
      value: true
    - name: POOLDEF
      operator: not_exists
Core:
  Id: CORE-000677
  Status: Published
  Version: '1'
Description: Part A - Raise error when POOLID exists in the dataset but POOLDEF
  does not exist.
Executability: Fully Executable
Operations:
  - id: $poolid_exists
    name: POOLID
    operator: variable_exists
Outcome:
  Message: POOLID variable exists in the dataset but POOLDEF dataset does not exist.
Rule Type: Domain Presence Check
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
  Use Case: NONCLIN
Sensitivity: Dataset
