id: AD0250
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: In Time to Event studies, Event or Censoring Description (EVNTDESC) variable
  is the description of the event of interest or an event that warrants censoring.
  Therefore, Censor (CNSR) variable should be present. Censor Date Description (CNSDTDSC)
  variable describes the circumstance represented by the censoring date if different
  from the event date that warrants censoring. If present, CNSR must be present. Note
  that adding CNSDTDSC provides additional information when there is a difference
  between the event date that warrants censoring and the actual date of censoring.
  If the event that warrants censoring is the same as the onset date of the event
  that represents the censoring date, then the CNSDTDSC column is not needed in the
  analysis dataset.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: EVNTDESC
      operator: empty
    - name: CNSR
      operator: non_empty
outcome:
  message: EVNTDESC and/or CNSDTDSC is present, but CNSR is not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0250
  pmda_category: Error
  ig_versions: []

