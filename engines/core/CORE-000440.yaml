Check:
  all:
    - name: --STAT
      operator: equal_to
      value: NOT DONE
    - name: --REASND
      operator: empty
Core:
  Id: CORE-000440
  Status: Published
  Version: '1'
Description: Trigger error when --STAT="NOT DONE" and --REASND is not populated
Executability: Fully Executable
Outcome:
  Message: When --STAT is "NOT DONE", --REASND must be populated.
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - LB
      - MI
  Use Case: NONCLIN
Sensitivity: Record
