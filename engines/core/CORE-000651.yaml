# The implementation only checks 1:1 relationship between --TPT and --TPTNUM
Check:
  all:
    - name: --TPTNUM
      operator: exists
    - name: --TPT
      operator: exists
    - name: --TPTNUM
      operator: non_empty
    - name: --TPT
      operator: non_empty
    - name: --TPTNUM
      operator: is_not_unique_relationship
      value: --TPT
Core:
  Id: CORE-000651
  Status: Published
  Version: '1'
Description: --TPT and --TPTNUM should have a one-to-one relationship.
Executability: Fully Executable
Outcome:
  Message: --TPT and --TPTNUM do not have not a one-to-one relationship.
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
Sensitivity: Record
