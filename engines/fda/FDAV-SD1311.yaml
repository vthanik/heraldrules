  Status: Reference
  Version: '1'
Description: When the study type is interventional (TSPARMCD = 'STYPE' and TSVAL =
  'INTERVENTIONAL'), the Intervention Type parameter should be provided with Parameter
  Value populated (TSVAL should not be null when TSPARMCD = 'INTTYPE').
Check: []
Outcome:
  Message: TSVAL is missing for the INTTYPE Trial Summary Parameter, when STYPE parameter
    equals 'INTERVENTIONAL'
