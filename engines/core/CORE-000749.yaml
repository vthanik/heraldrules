Check:
  all:
    - name: TSVAL
      operator: is_not_unique_set
      value: TSPARMCD
Core:
  Id: CORE-000749
  Status: Published
  Version: '1'
Description: TSVAL must be unique within each distinct value of TSPARMCD
Executability: Fully Executable
Outcome:
  Message: The value of TSVAL is not unique within the value for TSPARMCD
  Output Variables:
    - TSPARMCD
    - TSVAL
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - TRIAL DESIGN
  Domains:
    Include:
      - TS
  Use Case: NONCLIN
Sensitivity: Record
