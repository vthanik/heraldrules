id: AD0007
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: If a Flag Numeric (*FN) variable is present, its corresponding Flag Character
  (*FL) variable must be present.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: SAFFN
      operator: empty
    - name: SAFFL
      operator: non_empty
outcome:
  message: Secondary variable *FN is present, but its primary variable *FL is not
    present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0007
  pmda_category: Error
  ig_versions: []

