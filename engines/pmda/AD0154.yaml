id: AD0154
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: For a set of [Subject (USUBJID), Parameter (PARAMCD), baseline type (BASETYPE)]
  only one record can be the actual baseline value, marked by ABLFL = Y.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
check:
  all:
    - name: ABLFL
      operator: equal_to
      value: 'Y'
    - name: BASETYPE
      operator: non_empty
outcome:
  message: Multiple baseline records exist for a unique USUBJID, PARAMCD, BASETYPE
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0154
  pmda_category: Error
  ig_versions: []

