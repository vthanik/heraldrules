Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  A variable with a suffix of RFL may only have a value that is Y or
                  null (R = record level flag variable). ABLFL (Analysis Baseline Flag)
                  is the most common record-level flag in BDS datasets.
                Document: ADaM IG v1.1
                Section: '3.3.5'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-33
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: ABLFL
      operator: non_empty
    - name: ABLFL
      operator: not_equal_to
      value: 'Y'
Core:
  Id: ADaM-033
  Status: Published
  Version: '1'
Description: >-
  A variable with a suffix of RFL (record-level flag) may only have a value of Y or
  null. Uses ABLFL (Analysis Baseline Flag) as a representative *RFL variable in BDS.
Executability: Partially Executable
Outcome:
  Message: '*RFL variable (e.g. ABLFL) has a value other than Y or null'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "ABLFL has valid value Y"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ABLFL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Y"]
          - ["CDISCPILOT01", "01-701-1023", "SODIUM", ""]
    expected_findings: 0
  - name: "ABLFL has invalid value N (not allowed for RFL)"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ABLFL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "N"]
    expected_findings: 1
