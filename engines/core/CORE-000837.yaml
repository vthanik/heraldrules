Authorities:
  - Organization: CDISC
    Standards:
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'An activity must only reference activities that are specified
                  within the same study design.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00028'
              Version: '1'
            Version: '1.0'
        Version: '3.0'
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'An activity must only reference activities that are specified
                  within the same study design.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00028'
              Version: '1'
            Version: '1.0'
        Version: '4.0'
Check:
  all:
    - name: instanceType
      operator: equal_to
      value: 'Activity'
    - name: rel_type
      operator: equal_to
      value: 'definition'
    - any:
        - all:
            - name: previousId
              operator: exists
            - name: previousId
              operator: non_empty
            - name: previousId
              operator: is_not_contained_by
              value: $activity_ids_for_study_design
        - all:
            - name: nextId
              operator: exists
            - name: nextId
              operator: non_empty
            - name: nextId
              operator: is_not_contained_by
              value: $activity_ids_for_study_design
Core:
  Id: 'CORE-000837'
  Status: Published
  Version: '1'
Description: 'An activity must only reference activities that are specified
  within the same study design.'
Executability: Fully Executable
Operations:
  - group:
      - parent_id
      - rel_type
    id: $activity_ids_for_study_design
    name: id
    operator: distinct
Outcome:
  Message: 'The activity references a previous or next activity that is not
    specified within the same study design.'
  Output Variables:
    - parent_entity
    - parent_id
    - parent_rel
    - id
    - name
    - previousId
    - nextId
    - $activity_ids_for_study_design
Rule Type: Record Data
Scope:
  Entities:
    Include:
      - 'Activity'
Sensitivity: Record
