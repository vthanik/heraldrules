Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If Criterion y (CRITy) variable is present, there must also be a corresponding Criterion y Flag (CRITyFL) variable present.
                Document: ADaM IG v1.1
                Section: '3.3.8'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-157
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: CRIT1
      operator: empty
    - name: CRIT1FL
      operator: non_empty
Core:
  Id: ADaM-157
  Status: Published
  Version: '1'
Description: >-
  CRITy requires corresponding CRITyFL variable.
Executability: Fully Executable
Outcome:
  Message: 'CRITy (CRIT1) is present but CRITyFL (CRIT1FL) is missing'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "CRIT1 and CRIT1FL both present"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, CRIT1, CRIT1FL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "AVAL >= 150", "Y"]
    expected_findings: 0
  - name: "CRIT1 present but CRIT1FL missing"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, CRIT1, CRIT1FL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "AVAL >= 150", ""]
    expected_findings: 1
