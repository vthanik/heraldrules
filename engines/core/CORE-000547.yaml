Check:
  any:
    - name: RFSTDTC
      operator: invalid_date
    - name: RFENDTC
      operator: invalid_date
    - name: BRTHDTC
      operator: invalid_date
    - name: --STDTC
      operator: invalid_date
    - name: --ENDTC
      operator: invalid_date
    - name: --DTC
      operator: invalid_date
    - name: --RFTDTC
      operator: invalid_date
Core:
  Id: CORE-000547
  Status: Published
  Version: '1'
Description: Values of variables RFSTDTC,  RFENDTC, BRTHDTC, --STDTC, --ENDTC,
  --DTC, --RFTDTC must be correct ISO-8601 dates / datetimes
Executability: Fully Executable
Outcome:
  Message: Variable value is not in correct ISO 8601 date or datetime format
  # Output Variables:
  #  - --DY
  #  - --STDY
  #  - --ENDY
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
  Use Case: NONCLIN
Sensitivity: Record
