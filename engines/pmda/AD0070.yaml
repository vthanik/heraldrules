id: AD0070
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: If Actual Pooled Treatment y for Period xx (TRxxAGyN) numeric variable
  is present, there must be a corresponding Actual Pooled Treatment y for Period xx
  (TRxxAGy) character variable.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
check:
  all:
    - name: TR01A1N
      operator: empty
    - name: TR01A1
      operator: non_empty
outcome:
  message: TRxxAGyN is present, but TRxxAGy is not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0070
  pmda_category: Error
  ig_versions: []

