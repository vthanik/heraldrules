id: SD1370
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Numeric Reference Result in Std Units (--STREFN) should be populated
  when Reference Result in Standard Format (--STREFC) is populated.
scope:
  Classes:
    Include: FINDINGS
  Domains:
    Include: ALL
  Use_Case: INDH, PROD
check:
  all:
    - name: --STREFC
      operator: empty
    - name: --STREFN
      operator: non_empty
outcome:
  message: --STREFN is null when --STREFC is populated
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1370
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000295

