Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If Multi-Response Criterion y Eval (N) (MCRITyMN) is present,
                  MCRITy must also be present.
                Document: ADaM IG v1.1
                Section: "4.4"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-451
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: MCRIT1MN
      operator: empty
    - name: MCRIT1
      operator: non_empty
Core:
  Id: ADaM-451
  Status: Published
  Version: "1"
Description: >-
  If Multi-Response Criterion y Eval (N) (MCRITyMN) is present, MCRITy
  must also be present.
Executability: Partially Executable
Outcome:
  Message: "MCRITyMN is present but MCRITy is not present"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: MCRIT1MN and MCRIT1 both present (valid)
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, MCRIT1MN, MCRIT1]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 1, ">135 mmol/L"]
    expected_findings: 0
  - name: MCRIT1MN present but MCRIT1 missing (violation)
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, MCRIT1MN, MCRIT1]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 1, ""]
    expected_findings: 1
