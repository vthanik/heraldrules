Check:
  all:
    - name: --STRESC
      operator: non_empty
    - name: --STRESC
      operator: matches_regex
      value: ^-?(0|[1-9]\d*)(\.\d+)?$
    - any:
        - name: --STRESN
          operator: empty
        - name: --STRESC
          operator: not_equal_to
          type_insensitive: true
          value: --STRESN
Core:
  Id: CORE-000542
  Status: Published
  Version: '1'
Description: Raise an error when --STRESC is populated with a numeric value, but
  --STRESN is not populated, or --STRESN is not equal to --STRESC.
Executability: Fully Executable
Outcome:
  Message: --STRESC is numeric but --STRESN is not populated or not equal to --STRESC.
  Output Variables:
    - --STRESC
    - --STRESN
    - --TESTCD
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - ALL
  Use Case: NONCLIN, INDH, PROD
Sensitivity: Record
