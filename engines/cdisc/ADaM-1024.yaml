Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  APERIOD changed from Permissible in v1.1 to Conditional in v1.2. When period or subperiod timing variables are used, APERIOD must be present to identify the period for each record.
                Document: ADaM IG v1.2
                Section: '3.3.3'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-1024
              Version: '1'
            Version: '1.0'
        Version: '1.2'
Check:
  all:
    - name: TRT01P
      operator: empty
    - name: APERIOD
      operator: non_empty
Core:
  Id: ADaM-1024
  Status: Published
  Version: '1'
Description: >-
  In ADaM-IG v1.2, APERIOD is conditional: it is required when period-specific timing variables (TRTxxP, APHASEw) or subperiod variables (ASPER) are present in the dataset.
Executability: Partially Executable
Outcome:
  Message: 'APERIOD is missing but period timing variable TRT01P is present'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.2"]
  source: Herald-originated (ADaM-IG v1.2 gap-fill)
  catalogs:
    - ADaMIG 1.2
  fetched: '2026-04-12'

tests:
  - name: "APERIOD present when TRT01P present"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, TRT01P, APERIOD]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Drug A", "1"]
          - ["CDISCPILOT01", "01-701-1023", "SODIUM", "", ""]
    expected_findings: 0
  - name: "APERIOD missing but TRT01P present"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, TRT01P, APERIOD]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Drug A", ""]
    expected_findings: 1
