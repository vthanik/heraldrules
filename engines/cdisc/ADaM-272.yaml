Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  1st Occurrence Flag (AOCC*FL) variable values must be Y or null.
                Document: ADaM IG v1.1
                Section: "6.2"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-272
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: AOCCIFL
      operator: empty
    - name: AOCCIFL
      operator: in
      value:
        - 'Y'
Core:
  Id: ADaM-272
  Status: Published
  Version: "1"
Description: >-
  1st Occurrence Flag (AOCC*FL) variable values must be Y or null.
  Uses AOCCIFL as a representative variable.
Executability: Partially Executable
Outcome:
  Message: "AOCC*FL value is not Y or null"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - OCCURRENCE DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: AOCCIFL is Y (valid)
    type: positive
    datasets:
      ADAE:
        variables: [STUDYID, USUBJID, AETERM, AOCCIFL]
        records:
          - [CDISCPILOT01, 01-701-1015, HEADACHE, Y]
    expected_findings: 0
  - name: AOCCIFL has invalid value (violation)
    type: negative
    datasets:
      ADAE:
        variables: [STUDYID, USUBJID, AETERM, AOCCIFL]
        records:
          - [CDISCPILOT01, 01-701-1015, HEADACHE, "N"]
    expected_findings: 1
