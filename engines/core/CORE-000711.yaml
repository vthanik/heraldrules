Check:
  all:
    - name: RFSTDTC
      operator: non_empty
    - name: RFENDTC
      operator: non_empty
    - name: RFSTDTC
      operator: date_greater_than
      value: RFENDTC
Core:
  Id: CORE-000711
  Status: Published
  Version: '1'
Description: Subject Reference Start Date/Time (RFSTDTC) should be prior or
  equal to the Subject Reference End Date/Time (RFENDTC).
Executability: Fully Executable
Outcome:
  Message: RFSTDTC falls after RFENDTC.
  Output Variables:
    - RFSTDTC
    - RFENDTC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
Sensitivity: Record
