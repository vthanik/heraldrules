Check:
  all:
    - name: --STAT
      operator: equal_to
      value: NOT DONE
      value_is_literal: true
    - any:
        - name: --ORRES
          operator: non_empty
        - name: --STRESC
          operator: non_empty
        - name: --STRESN
          operator: non_empty
Core:
  Id: CORE-000675
  Status: Published
  Version: '1'
Description: When a test is not done (--STAT = 'NOT DONE'), the result variables (--ORRES and --STRESC) should not be populated.
Executability: Fully Executable
Outcome:
  Message: '--STAT = NOT DONE, but  a result variable (--ORRES, --STRESC and/or --STRESN) is populated.'
  Output Variables:
    - --TESTCD
    - --ORRES
    - --STRESC
    - --STRESN
    - --STAT
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
      - FINDINGS ABOUT
  Domains:
    Include:
      - ALL
Sensitivity: Record
