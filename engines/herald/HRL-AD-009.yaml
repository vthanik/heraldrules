id: HRL-AD-009
version: 1
status: Published
standard: ADaM
category: Conformance
sensitivity: Record
executability: Fully Executable
description: If BASETYPE is populated for at least one record within a parameter,
  then it must be populated for all records within that parameter.
scope:
  classes: []
  domains: []
check:
  all:
    - name: BASETYPE
      operator: consistent_population
      value: PARAMCD
outcome:
  message: BASETYPE is populated for only some records within a PARAMCD
  severity: Warning
provenance:
  source_doc: Herald-original (gap analysis vs P21 Community catalog)
  authority: Herald
  p21_reference: AD0131-NI

tests:
  - name: "BASETYPE populated for all records within PARAMCD"
    type: positive
    skip: true
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BASETYPE]
        records:
          - ["S1", "S1-001", "AVAL", "LAST"]
          - ["S1", "S1-001", "AVAL", "LAST"]
    expected_findings: 0

  - name: "BASETYPE populated for only some records within PARAMCD"
    type: negative
    skip: true
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BASETYPE]
        records:
          - ["S1", "S1-001", "AVAL", "LAST"]
          - ["S1", "S1-001", "AVAL", ""]
    expected_findings: 1

