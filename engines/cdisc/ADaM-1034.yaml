Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  BTOXGRN is the numeric secondary variable of BTOXGR (Baseline Toxicity Grade). Added in v1.2 Table 3.3.7.1.
                Document: ADaM IG v1.2
                Section: '3.3.7'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-1034
              Version: '1'
            Version: '1.0'
        Version: '1.2'
Check:
  all:
    - name: BTOXGRN
      operator: empty
    - name: BTOXGR
      operator: non_empty
Core:
  Id: ADaM-1034
  Status: Published
  Version: '1'
Description: >-
  BTOXGRN (numeric version of BTOXGR) must require BTOXGR to also be present.
Executability: Partially Executable
Outcome:
  Message: 'BTOXGRN is present but primary variable BTOXGR is absent'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.2"]
  source: Herald-originated (ADaM-IG v1.2 gap-fill)
  catalogs:
    - ADaMIG 1.2
  fetched: '2026-04-12'

tests:
  - name: "BTOXGRN present with BTOXGR also present"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BTOXGR, BTOXGRN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "1", "1"]
          - ["CDISCPILOT01", "01-701-1023", "ALT", "", ""]
    expected_findings: 0
  - name: "BTOXGRN present but BTOXGR absent"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BTOXGR, BTOXGRN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "", "1"]
    expected_findings: 1
