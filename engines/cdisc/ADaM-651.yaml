Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If ONTRxxFL (On-Treatment Flag for Period xx) is included, then ONTRTFL must also be included as the overall on-treatment flag.
                Document: ADaM IG v1.1
                Section: '4.3'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-651
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: ONTR01FL
      operator: non_empty
    - name: ONTRTFL
      operator: empty
Core:
  Id: ADaM-651
  Status: Published
  Version: '1'
Description: >-
  When ONTR01FL (period-specific on-treatment flag) is present, ONTRTFL (overall on-treatment flag) must also be present.
Executability: Partially Executable
Outcome:
  Message: 'ONTR01FL is present but ONTRTFL is missing'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "ONTR01FL and ONTRTFL both present"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ONTR01FL, ONTRTFL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Y", "Y"]
    expected_findings: 0
  - name: "ONTR01FL present but ONTRTFL missing"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ONTR01FL, ONTRTFL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Y", ""]
    expected_findings: 1
