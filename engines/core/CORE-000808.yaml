Authorities:
  - Organization: CDISC
    Standards:
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'Only one version of any code system is expected to be used
                  within a study version.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00073'
              Version: '1'
            Version: '1.0'
        Version: '3.0'
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'Only one version of any code system is expected to be used
                  within a study version.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00073'
              Version: '1'
            Version: '1.0'
        Version: '4.0'
Check:
  all:
    - name: rel_type
      operator: equal_to
      value: 'definition'
    - name: $min_codeSystemVersion
      operator: not_equal_to
      value: $max_codeSystemVersion
    - name: id
      operator: equal_to
      value: $min_id_for_codeSystemVersion
Core:
  Id: 'CORE-000808'
  Status: Published
  Version: '1'
Description: 'Only one version of any code system is expected to be used within
  a study version.'
Executability: Partially Executable - Possible Overreporting
Operations:
  - group:
      - codeSystem
    id: $min_codeSystemVersion
    name: codeSystemVersion
    operator: min
  - group:
      - codeSystem
    id: $max_codeSystemVersion
    name: codeSystemVersion
    operator: max
  - group:
      - codeSystem
      - codeSystemVersion
    id: $min_id_for_codeSystemVersion
    name: id
    operator: min
  - group:
      - codeSystem
      - codeSystemVersion
    id: $record_count
    name: codeSystemVersion
    operator: record_count
Outcome:
  Message: 'More than one code system version is used for the code system.'
  Output Variables:
    - codeSystem
    - codeSystemVersion
    - $record_count
Rule Type: Record Data
Scope:
  Entities:
    Include:
      - 'Code'
Sensitivity: Record
