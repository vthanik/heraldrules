Core:
  Id: FDAV-SD1389
  Status: Reference
  Version: '1'
Description: End Day of Obs Relative to Exposure (--XENDY) variable value should not
  be imputed. It may only be populated, when both End Date/Time of Observation (--ENDTC)
  and Date/Time of First Study Treatment (RFXSTDTC) variables values are provided
  and both of them include complete date parts.
Check: []
Outcome:
  Message: --XENDY variable value is imputed
Rule Type: Record Data
Sensitivity: Record
