# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.3
id: DD0005
version: 1
status: Published
standard: Define-XML
category: Study Metadata
sensitivity: Study
executability: Fully Executable
description: >
  def:Context must be 'Submission' or 'Other' when specified.
scope:
  classes: []
  domains: []
check:
  all:
    - name: Context
      operator: not_empty
    - name: Context
      operator: not_in
      value:
        - Submission
        - Other
outcome:
  message: "def:Context has an invalid value. Must be 'Submission' or 'Other'."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.3"
  cited_guidance: >
    def:Context -- Required. Allowable Values: 'Submission', 'Other'.
