# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.16
id: DD0071
version: 1
status: Published
standard: Define-XML
category: Cross-Reference
sensitivity: Record
executability: Fully Executable
description: >
  Comment Document ID must exist in the Documents sheet when provided.
scope:
  classes: []
  domains: []
check:
  all:
    - name: document_id
      operator: not_empty
    - name: __document_exists_in_doc_spec
      operator: equal_to
      value: false
outcome:
  message: "Comment references a Document ID that does not exist in the Documents sheet."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.16"
  cited_guidance: >
    leafID -- Reference to the unique ID of the def:leaf element.
