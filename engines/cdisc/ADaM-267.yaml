Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If any of Analysis Duration Units (ADURU) or Analysis Duration (N)
                  (ADURN) is populated, then both must be populated together.
                Document: ADaM IG v1.1
                Section: "4.3"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-267
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: ADURU
      operator: empty
    - name: ADURN
      operator: non_empty
Core:
  Id: ADaM-267
  Status: Published
  Version: "1"
Description: >-
  If any of Analysis Duration Units (ADURU) or Analysis Duration (N) (ADURN)
  is populated, then both must be populated together.
Executability: Fully Executable
Outcome:
  Message: "ADURU is populated but ADURN is not populated"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
      - OCCURRENCE DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: ADURU and ADURN both populated (valid)
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ADURU, ADURN]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, DAYS, 14]
    expected_findings: 0
  - name: ADURU populated but ADURN missing (violation)
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ADURU, ADURN]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, DAYS, ""]
    expected_findings: 1
