id: AD0033
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: A variable with a suffix of RFL must have a value that is Y or null (R
  = record level flag variable).
scope:
  classes: []
  domains:
    - BDS
    - ADAMOTHER
check:
  all:
    - name: ABLFL
      operator: non_empty
    - name: ABLFL
      operator: not_equal_to
      value: 'Y'
outcome:
  message: '*RFL value is not Y or null'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0033
  pmda_category: Error
  ig_versions: []

