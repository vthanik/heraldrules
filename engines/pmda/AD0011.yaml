id: AD0011
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: When a Flag variable (FL) is N, its corresponding Flag numeric variable
  (FN) must be 0.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: SAFFL
      operator: equal_to
      value: 'N'
    - name: SAFFN
      operator: not_equal_to
      value: 0
outcome:
  message: '*FL = N and *FN != 0'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0011
  pmda_category: Error
  ig_versions: []

