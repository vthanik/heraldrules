Check:
  all:
    - name: --DY
      operator: exists
    - name: --DTC
      operator: not_exists
Core:
  Id: CORE-000700
  Status: Published
  Version: '1'
Description: When Study Day of Visit/Collection/Exam (--DY) is present in the
  dataset, then the Date/Time of Collection (--DTC) should also be present in
  the dataset
Executability: Fully Executable
Outcome:
  Message: Date/Time of Collection (--DTC) variable is missing when Study Day of
    Visit/Collection/Exam (--DY) is present.
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - INTERVENTIONS
      - EVENTS
      - FINDINGS
      - FINDINGS ABOUT
      - SPECIAL PURPOSE
  Domains:
    Include:
      - ALL
Sensitivity: Dataset
