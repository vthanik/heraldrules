Authorities:
  - Organization: CDISC
    Standards:
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'Every identifier must be unique within the scope of an
                  identified organization.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00138'
              Version: '1'
            Version: '1.0'
        Version: '3.0'
Check:
  all:
    - name: instanceType
      operator: equal_to
      value: 'StudyIdentifier'
    - name: rel_type
      operator: equal_to
      value: 'definition'
    - name: studyIdentifier
      operator: is_not_unique_set
      value:
        - studyIdentifierScope.identifierScheme
        - studyIdentifierScope.identifier
Core:
  Id: 'CORE-000696'
  Status: Published
  Version: '1'
Description: 'Every identifier must be unique within the scope of an identified
  organization.'
Executability: Fully Executable
Outcome:
  Message: 'The identifier is not unique within the scope of the identified
    organization.'
  Output Variables:
    - parent_entity
    - parent_id
    - parent_rel
    - id
    - studyIdentifier
    - studyIdentifierScope.name
    - studyIdentifierScope.identifierScheme
    - studyIdentifierScope.identifier
Rule Type: Record Data
Scope:
  Entities:
    Include:
      - 'StudyIdentifier'
Sensitivity: Record
