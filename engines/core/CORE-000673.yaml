# Variable: --VALTRG
# Condition: --VALTRG is a number
# Rule: --VALMIN <= --VALTRG <= --VALMAX
Authorities:
  - Organization: 'CDISC'
    Standards:
      - Name: 'TIG'
        References:
          - Citations:
              - Cited Guidance: No specific guidance; this is a simple mathematical definition
                Document: 'TIG 1.0'
                Item: 'Specification Table: IQVALTRG | IQVALMIN | IQVALMAX'
                Section: '2.8.8.6'
            Origin: TIG Conformance Rules
            Rule Identifier:
              Id: 'TIG0016a'
              Version: '1'
            Version: '1.0'
        Substandard: SDTM
        Version: '1.0'
Check:
  all:
    - name: --VALTRG
      operator: matches_regex
      value: ^-?([1-9]\d*|0)(\.\d+)?$
    - name: --VALMIN
      operator: matches_regex
      value: ^.+$
    - name: --VALTRG
      operator: less_than
      value: --VALMIN
Core:
  Status: Published
  Version: '1'
  Id: CORE-000673
Description: Part A - Raise an error when --VALTRG is a number and is less than
  the specified --VALMIN value.
Executability: Fully Executable
Outcome:
  Message: --VALTRG is not equal to or greater than the --VALMIN value.
  Output Variables:
    - IGDCMPID
    - SPTOBID
    - --VALTRG
    - --VALMIN
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - IQ
  Use Case: PROD
Sensitivity: Record
