id: SD2004
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Subject Death Flag (DTHFL) value must equal 'Y' when Date/Time of Death
  (DTHDTC) is provided.
scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: DM
  Use_Case: INDH
check:
  all:
    - name: DTHDTC
      operator: empty
    - name: DTHFL
      operator: equal_to
      value: 'Y'
outcome:
  message: Missing value for DTHFL when DTHDTC is populated
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD2004
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000007

