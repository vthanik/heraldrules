Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If a Date variable is indicated to be imputed by population of an
                  Imputation Flag Variable (*DTF), the corresponding date variable
                  must be populated.
                Document: ADaM IG v1.1
                Section: "3.2"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-263
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: ADTF
      operator: empty
    - name: ADT
      operator: non_empty
Core:
  Id: ADaM-263
  Status: Published
  Version: "1"
Description: >-
  If a Date variable is indicated to be imputed by population of an
  Imputation Flag Variable (*DTF), the corresponding date variable (*DT)
  must be populated.
Executability: Partially Executable
Outcome:
  Message: "*DTF is populated but *DT is not populated"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
      - OCCURRENCE DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: ADTF and ADT both populated (valid)
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ADTF, ADT]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, D, "2014-02-10"]
    expected_findings: 0
  - name: ADTF populated but ADT missing (violation)
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ADTF, ADT]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, D, ""]
    expected_findings: 1
