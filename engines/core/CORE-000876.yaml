Authorities:
  - Organization: CDISC
    Standards:
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'Within a document version, the specified section numbers for
                  narrative content must be unique.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00103'
              Version: '1'
            Version: '1.0'
        Version: '3.0'
Check:
  all:
    - name: instanceType
      operator: equal_to
      value: 'NarrativeContent'
    - name: rel_type
      operator: equal_to
      value: 'definition'
    - name: sectionNumber
      operator: non_empty
    - name: sectionNumber
      operator: is_not_unique_set
      value:
        - parent_entity
        - parent_id
Core:
  Id: 'CORE-000876'
  Status: Published
  Version: '1'
Description: 'Within a document version, the specified section numbers for
  narrative content must be unique.'
Executability: Fully Executable
Match Datasets:
  - Keys:
      - Left: parent_id
        Right: id
      - rel_type
    Name: StudyProtocolDocumentVersion
  - Keys:
      - Left: parent_id.StudyProtocolDocumentVersion
        Right: id
      - rel_type
    Name: StudyProtocolDocument
Outcome:
  Message: 'The section number is not unique within the document version.'
  Output Variables:
    - parent_entity
    - parent_id
    - parent_rel
    - id
    - name
    - sectionNumber
    - name.StudyProtocolDocument
    - protocolVersion
Rule Type: Record Data
Scope:
  Entities:
    Include:
      - 'NarrativeContent'
Sensitivity: Record
