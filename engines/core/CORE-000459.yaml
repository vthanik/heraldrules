Check:
  all:
    - name: TXPARMCD
      operator: equal_to
      value: ENVTEMPU
    # addition Jozef 2024-03-16
    # pre-condition is that TXVAL is not null
    - name: TXVAL
      operator: non_empty
    # end of addition
    - name: TXVAL
      operator: not_equal_to
      value: C
    - name: TXVAL
      operator: not_equal_to
      value: F
Core:
  Id: CORE-000459
  Status: Published
  Version: '1'
Description: The units associated with the environmental temperature; only "C"
  or "F" is acceptable.
Executability: Fully Executable
Outcome:
  Message: The value of TXVAL may only be "C" or "F" for TXPARMCD=ENTEMPU
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - TRIAL DESIGN
  Domains:
    Include:
      - TX
Sensitivity: Record
