# Variable: AEENDTC
# Condition: AE.AEOUT= "FATAL"
# Rule: AE.AEENDTC = DM.DTHDTC
Authorities:
  - Organization: FDA
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: All death information should be populated for subjects that died
                  during the study including any post treatment follow-up.
                Document: FDA
                Section: FDAB006
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB0612
              Version: '1'
            Version: '1.5'
        Version: '3.2'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: All death information should be populated for subjects that died
                  during the study including any post treatment follow-up.
                Document: FDA
                Section: FDAB006
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB0612
              Version: '1'
            Version: '1.5'
        Version: '3.3'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: All death information should be populated for subjects that died
                  during the study including any post treatment follow-up.
                Document: FDA
                Section: FDAB006
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB0612
              Version: '1'
            Version: '1.5'
        Version: '3.4'
Check:
  all:
    - name: AEOUT
      operator: equal_to
      value: 'FATAL'
    - name: AEENDTC
      operator: not_equal_to
      value: DTHDTC
Core:
  Id: CORE-000841
  Status: Published
  Version: '1'
Description: End Date/Time of Adverse Event (AEENDTC) in AE dataset of Adverse
  Event where AEOUT = 'FATAL' should be equal to the Date/Time of Death (DTHDTC)
  in the DM dataset for the corresponding subject.
Executability: Fully Executable
Match Datasets:
  - Keys:
      - USUBJID
    Name: DM
Outcome:
  Message: AEENDTC in AE dataset of AE where AEOUT = 'FATAL' is not equal to
    DTHDTC in the DM dataset.
  Output Variables:
    - AEOUT
    - AEENDTC
    - DTHDTC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - EVENTS
  Domains:
    Include:
      - AE
Sensitivity: Record
