Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If both actual treatment (TRTA) and planned pooled treatment y (TRTPGy) are populated, they must be consistent for the same subject.
                Document: ADaM IG v1.1
                Section: '3.3'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-239
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: TRTA
      operator: non_empty
    - name: TRTPG1
      operator: non_empty
    - name: TRTA
      operator: not_equal_to_variable
      value: TRTPG1
Core:
  Id: ADaM-239
  Status: Published
  Version: '1'
Description: >-
  When TRTA (Actual Treatment) and TRTPG1 (Planned Pooled Treatment 1) are both populated, they should be consistent unless dose escalation occurred.
Executability: Partially Executable
Outcome:
  Message: 'TRTA and TRTPG1 are both populated but inconsistent (possible treatment deviation)'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "TRTA and TRTPG1 are consistent"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, TRTA, TRTPG1]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Placebo", "Placebo"]
    expected_findings: 0
  - name: "TRTA differs from TRTPG1 (possible deviation)"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, TRTA, TRTPG1]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Placebo", "Active Drug"]
    expected_findings: 1
