id: AD0166
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: If Baseline Reference Range Indicator (BNRIND) variable is present, then
  Analysis Reference Range Indicator (ANRIND) and Baseline Record Flag (ABLFL) variables
  must be present.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: BNRIND
      operator: empty
    - name: ANRIND
      operator: non_empty
outcome:
  message: BNRIND is present, but ANRIND is not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0166
  pmda_category: Error
  ig_versions: []

