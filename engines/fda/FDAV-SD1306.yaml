  Status: Reference
  Version: '1'
Description: When the study population is healthy subjects (TSPARMCD = 'HLTSUBJI'
  and TSVAL = 'Y'), the Diagnosis Group parameter should be provided with a null Parameter
  Value (TSVAL should be null when TSPARMCD = 'TDIGRP').
Check: []
Outcome:
  Message: The TDIGRP Trial Summary Parameter is not provided with TSVAL equal to
    null, when HLTSUBJI parameter equals 'Y'
