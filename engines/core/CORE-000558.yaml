Check:
  any:
    #- name: --DY
    #  operator: equal_to
    #  value: 0
    - name: --DY
      operator: not_matches_regex
      value: ^-?[1-9]{1}\d*$
    - name: --STDY
      operator: not_matches_regex
      value: ^-?[1-9]{1}\d*$
    - name: --ENDY
      operator: not_matches_regex
      value: ^-?[1-9]{1}\d*$
    - name: VISITDY
      operator: not_matches_regex
      value: ^-?[1-9]{1}\d*$
Core:
  Id: CORE-000558
  Status: Published
  Version: '1'
Description: --DY must be a non-zero integer
Executability: Fully Executable
Outcome:
  Message: Study day variable (--DY/--STDY/--ENDY/VISITDY) is not a non-zero integer
  Output Variables:
    - --DY
    - --STDY
    - --ENDY
    - VISITDY
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
  Use Case: NONCLIN
Sensitivity: Record
