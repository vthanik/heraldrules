id: AD0198
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: At least one Analysis Value (numeric or character) variable must be present
  in BDS datasets.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: AVAL
      operator: non_empty
    - name: AVALC
      operator: non_empty
outcome:
  message: Neither AVAL nor AVALC are present in dataset
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0198
  pmda_category: Error
  ig_versions: []

