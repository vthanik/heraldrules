id: AD0036
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: A variable with a suffix of PFN must have a value that is 1 or null (P
  = parameter level flag variable).
scope:
  classes: []
  domains:
    - BDS
    - ADAMOTHER
check:
  all:
    - name: ANL01FN
      operator: empty
    - name: ANL01FN
      operator: equal_to
      value: 1
outcome:
  message: '*PFN value is not 1 or null'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0036
  pmda_category: Error
  ig_versions: []

