Description: All Demographics (DM) subjects (USUBJID) should have at least one record
  in the Disposition (DS) domain. The only possible exceptions for SDTMIG v3.2 (and
  earlier) are Screen Failures (ARMCD=SCRNFAIL) and Not Assigned Treatment (ARMCD=NOTASSGN)
  subjects, or subjects with ARMCD=null.  There are no exceptions for SEND.
