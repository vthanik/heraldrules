id: SD1252
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: DTHFL must equal 'Y' when there is a record in the Subject Status (SS)
  domain with SSSTRESC = 'DEAD'.
scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: DM
check:
  all:
    - name: SSSTRESC
      operator: not_equal_to
      value: DEAD
      value_is_literal: yes
    - name: DTHFL
      operator: equal_to
      value: 'Y'
      value_is_literal: yes
outcome:
  message: DTHFL does not equal 'Y' when SS.SSSTRESC = 'DEAD'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1252
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000008

