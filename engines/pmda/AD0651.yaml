id: AD0651
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: If ONTRxxFL is included, then ONTRTFL must be included and is defined
  as the overall on treatment flag.
scope:
  classes: []
  domains:
    - OCCDS
    - ADAE
    - MDOCCDS
check:
  all:
    - name: ONTR01FL
      operator: empty
    - name: ONTRTFL
      operator: non_empty
outcome:
  message: ONTRxxFL is present but ONTRTFL is not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0651
  pmda_category: Error
  ig_versions: []

