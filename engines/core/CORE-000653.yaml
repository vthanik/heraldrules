Check:
  all:
    - name: --ENDTC
      operator: non_empty
    - name: --DTC
      operator: non_empty
    - name: --DTC
      operator: date_greater_than
      value: --ENDTC
Core:
  Id: CORE-000653
  Status: Published
  Version: '1'
Description: Raise an error when --ENDTC before --DTC
Executability: Fully Executable
Outcome:
  Message: --ENDTC must be greater than or equal to --DTC
  Output Variables:
    - --ENDTC
    - --DTC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
  Use Case: NONCLIN
Sensitivity: Record
