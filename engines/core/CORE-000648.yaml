    # Commented out 2025-05-05: See Jora comment Nick de Donder https://jira.cdisc.org/browse/CORERULES-9331
    #- all:
    #    # Case 1: throw an error when both AGE and AGETXT are populated
    #    - name: AGE
    #      operator: non_empty
    #    - name: AGETXT
    #      operator: non_empty
    - all:
        # Case 2: throw an error when none of AGE and AGETXT is populated
        - name: AGE
          operator: empty
        - name: AGETXT
          operator: empty

