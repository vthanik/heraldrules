id: AD0026
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: 'For subject-level numeric population flag variables: 0 = no (not included),
  1 = yes (included). Null values are not allowed.'
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
check:
  all:
    - name: SAFFN
      operator: empty
    - name: SAFFN
      operator: in
      value:
        - 0
        - 1
outcome:
  message: Variable subject-population flag value is null
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0026
  pmda_category: Error
  ig_versions: []

