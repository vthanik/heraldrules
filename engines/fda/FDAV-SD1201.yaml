Core:
  Id: FDAV-SD1201
  Status: Reference
  Version: '1'
Description: The structure of Events class domains should be one records per Event
  per subject. No Events with the same Collected Term (--TERM), Decoded Term (--DECOD),
  Category (--CAT), Subcategory (--SCAT), Occurrence (--OCCUR), Location (--LOC),
  Laterality (--LAT), Directionality (--DIR), Severity (--SEV), Toxicity Grade (--TOXGR),
  Visit Number (VISITNUM), Visit Day (VISITDY), and Start Reference Time Point (--STTPT)
  values for the same Subject (USUBJID) and the same Start Date (--STDTC) are expected.
Check: []
Outcome:
  Message: Duplicate records in domain
Rule Type: Record Data
Sensitivity: Record
