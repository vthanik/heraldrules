Authorities:
  - Organization: 'CDISC'
    Standards:
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'USDM'
                Document: 'USDM v2.6'
            Origin: USDM Conformance Rules
            Rule Identifier:
              Id: 'DDF00020'
              Version: '1'
            Validator Rule Message: If the reason for a study amendment is 'Other' then this
              must be specified (attribute otherReason must be completed), and
              vice versa.
            Version: '1.0'
        Version: '4.0'
Check:
  any:
    - all:
        - name: code.code
          operator: equal_to
          value: 'C17649'
        - any:
            - name: otherReason
              operator: not_exists
            - name: otherReason
              operator: empty
    - all:
        - name: code.code
          operator: not_equal_to
          value: 'C17649'
        - name: otherReason
          operator: exists
        - name: otherReason
          operator: non_empty
Core:
  Id: 'CORE-000413'
  Status: Published
  Version: '1'
Description: If the reason for a study amendment is 'Other' then this must be
  specified (attribute otherReason must be completed), and vice versa.
Executability: Fully Executable
Outcome:
  Message: Population of otherReason is not consistent with code - code.code is
    C17649 ('Other') but otherReason is blank, or otherReason is present but
    code.code is not C17649 ('Other').
  Output Variables:
    - parent_entity
    - parent_id
    - parent_rel
    - id
    - code.code
    - code.decode
    - otherReason
Rule Type: Record Data
Scope:
  Entities:
    Include:
      - StudyAmendmentReason
Sensitivity: Record
