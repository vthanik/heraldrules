id: AD0566
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: If Percent Change to Baseline Category y (N) (PBCHGCyN) variable is used
  in a dataset, Percent Change to Baseline Category y (PBCHGCAy) variable must also
  be present in that dataset.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: PBCHGC1N
      operator: empty
    - name: PBCHGC1
      operator: non_empty
outcome:
  message: PBCHGCyN is present and PBCHGCAy is not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0566
  pmda_category: Error
  ig_versions: []

