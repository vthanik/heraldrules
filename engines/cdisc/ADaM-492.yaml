Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If Shift y (SHIFTy) variable is present, the variable pair it is
                  describing (baseline toxicity grade and analysis toxicity grade)
                  must also be present.
                Document: ADaM IG v1.1
                Section: "4.4"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-492
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: SHIFT1
      operator: empty
    - name: BTOXGR
      operator: non_empty
Core:
  Id: ADaM-492
  Status: Published
  Version: "1"
Description: >-
  If Shift y (SHIFTy) variable is present, the variable pair it is describing
  (baseline toxicity grade BTOXGR and analysis toxicity grade ATOXGR) must
  also be present.
Executability: Partially Executable
Outcome:
  Message: "SHIFT1 is present but BTOXGR is not present"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: SHIFT1 and BTOXGR both present (valid)
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, SHIFT1, BTOXGR]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, "1 to 2", 1]
    expected_findings: 0
  - name: SHIFT1 present but BTOXGR missing (violation)
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, SHIFT1, BTOXGR]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, "1 to 2", ""]
    expected_findings: 1
