id: AD0239A
version: 2
status: Reference
standard: ADaM
category: Conformance
sensitivity: Record
executability: Partially Executable
description: For a given period xx, If both Actual Treatment for Period xx (TRTxxA)
  and Planned Pooled Treatment y for Period xx (TRxxPGy) variables are present, then
  Actual Pooled Treatment y for Period xx (TRxxAGy) variable must be present.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
check:
  all:
    - name: TRT01A
      operator: non_empty
    - name: TR01P1
      operator: non_empty
    - name: TRT01A
      operator: not_equal_to_variable
      value: TR01P1
outcome:
  message: TRxxPGy and TRTxxA are present, but TRxxAGy is not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0239A
  pmda_category: Error
  ig_versions: []

