Check:
  all:
    - name: POOLID
      operator: non_empty
    - name: POOLID
      operator: is_not_contained_by
      value: $pooldef_poolid
Core:
  Id: CORE-000896
  Status: Published
  Version: '1'
Description: 'POOLID value in the dataset should match one of the POOLID values
  in the POOLDEF dataset'
Executability: Fully Executable
Operations:
  - domain: POOLDEF
    id: $pooldef_poolid
    name: POOLID
    operator: distinct
Outcome:
  Message: 'POOLID value does not match a POOLID value in the POOLDEF dataset.'
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - INTERVENTIONS
      - FINDINGS
      - RELATIONSHIP
  Domains:
    Include:
      - ALL
Sensitivity: Record
