Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  BTOXGRHN is the numeric secondary of BTOXGRH (Baseline Toxicity Grade High). Added in v1.2 Table 3.3.7.1.
                Document: ADaM IG v1.2
                Section: '3.3.7'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-1042
              Version: '1'
            Version: '1.0'
        Version: '1.2'
Check:
  all:
    - name: BTOXGRHN
      operator: empty
    - name: BTOXGRH
      operator: non_empty
Core:
  Id: ADaM-1042
  Status: Published
  Version: '1'
Description: >-
  BTOXGRHN (numeric version of BTOXGRH) requires BTOXGRH to also be present.
Executability: Partially Executable
Outcome:
  Message: 'BTOXGRHN is present but primary variable BTOXGRH is absent'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.2"]
  source: Herald-originated (ADaM-IG v1.2 gap-fill)
  catalogs:
    - ADaMIG 1.2
  fetched: '2026-04-12'

tests:
  - name: "BTOXGRHN present with BTOXGRH also present"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BTOXGRH, BTOXGRHN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Grade 2", "2"]
          - ["CDISCPILOT01", "01-701-1023", "SODIUM", "", ""]
    expected_findings: 0
  - name: "BTOXGRHN present but BTOXGRH absent"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BTOXGRH, BTOXGRHN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "", "2"]
    expected_findings: 1
