Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  The Analysis Period (APERIOD) values will be a number like 01.
                  There must be a corresponding Date of Last Exposure in Period xx
                  variable (like TR01EDT) in ADSL for every unique APERIOD value.
                Document: ADaM IG v1.1
                Section: "4.2"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-104
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: APERIOD
      operator: empty
    - name: TR01EDT
      operator: non_empty
Core:
  Id: ADaM-104
  Status: Published
  Version: "1"
Description: >-
  The Analysis Period (APERIOD) values will be a number like 01. There must be
  a corresponding Date of Last Exposure in Period (TRxxEDT) variable in ADSL
  for every unique APERIOD value.
Executability: Partially Executable
Outcome:
  Message: "There is no TRxxEDT variable in ADSL for every unique xx value of APERIOD"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
      - OCCURRENCE DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: APERIOD present with TR01EDT in ADSL
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, APERIOD, TR01EDT]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 1, "2014-06-30"]
    expected_findings: 0
  - name: APERIOD present but TR01EDT missing
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, APERIOD, TR01EDT]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 1, ""]
    expected_findings: 1
