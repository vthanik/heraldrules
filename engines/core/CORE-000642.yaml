Check:
  # REMARK: --TPTNUM and --ENINT both are usually "permissible"
  all:
    - name: '--TPTREF'
      operator: exists
    - name: '--ENINT'
      operator: exists
    - name: '--ENINT'
      operator: 'non_empty'
    - name: '--TPTREF'
      operator: 'empty'
Core:
  Id: CORE-000642
  Status: Published
  Version: '1'
Description: 'When Planned End of Assessment Interval (--ENINT) is populated,
  Time Point Reference (--TPTREF) should also be populated.'
Executability: Fully Executable
Outcome:
  Message: --ENINT is populated, but --TPTREF is missing.
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - INTERVENTIONS
      - EVENTS
      - FINDINGS
  Domains:
    Include:
      - ALL
Sensitivity: Record
