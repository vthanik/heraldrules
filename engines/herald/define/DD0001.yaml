# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.4.2
id: DD0001
version: 1
status: Published
standard: Define-XML
category: Study Metadata
sensitivity: Study
executability: Fully Executable
description: >
  StudyName is required and must be non-empty in the Define sheet.
scope:
  classes: []
  domains: []
check:
  all:
    - name: StudyName
      operator: empty
outcome:
  message: "StudyName is missing or empty in the Define sheet. This is required for all Define-XML documents."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.4.2"
  cited_guidance: >
    StudyName -- Required. Cardinality: Exactly one. A short name assigned to the study by the sponsor.
