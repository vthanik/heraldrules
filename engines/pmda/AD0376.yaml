id: AD0376
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: 'In a pair of corresponding character and numeric variables, the secondary
  variable must be populated if its primary variable is populated. Exceptions: *DTC,
  *FN, TRTPN, TRT01PN, PARAMN, AVALC, BASEC. Corresponding character and numeric values
  must also have a one-to-one mapping consistency when the primary variable is populated,
  which are addressed in other rules.'
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: TRT01P
      operator: empty
    - name: TRT01PN
      operator: non_empty
outcome:
  message: Primary variable * is populated, but its secondary variable is not populated
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0376
  pmda_category: Error
  ig_versions: []

