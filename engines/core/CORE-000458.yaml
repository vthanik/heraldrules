Check:
  any:
    - all:
        - name: USUBJID
          operator: non_empty
        - name: --SEQ
          operator: is_not_unique_set
          value: USUBJID
    - all:
        - name: POOLID
          operator: non_empty
        - name: --SEQ
          operator: is_not_unique_set
          value: POOLID
Core:
  Id: CORE-000458
  Status: Published
  Version: '1'
Description: Sequence number given to ensure uniqueness of subject records
  within a domain. May be any valid number.
Executability: Fully Executable
Outcome:
  Message: --SEQ is not unique within USUBJID or POOLID
  Output Variables:
    - USUBJID
    - POOLID
    - --SEQ
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - INTERVENTIONS
      - EVENTS
      - FINDINGS
  Domains:
    Include:
      - ALL
  Use Case: NONCLIN
Sensitivity: Record
