Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If the numeric flag (*FN) is used, the character version (*FL) is
                  required. A variable with a suffix of FN is present but a variable
                  with the same root and a suffix of FL is not present.
                Document: ADaM IG v1.1
                Section: '3.2'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-7
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: SAFFN
      operator: empty
    - name: SAFFL
      operator: non_empty
Core:
  Id: ADaM-007
  Status: Published
  Version: '1'
Description: >-
  If a numeric flag (*FN) variable is present, its corresponding character flag (*FL)
  variable must also be present. This rule uses SAFFN/SAFFL as a representative
  *FN/*FL pair. Full coverage requires checking all paired *FN/*FL columns.
Executability: Partially Executable
Outcome:
  Message: 'Numeric flag variable *FN is present but corresponding *FL variable is missing or null'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "SAFFN=1 and SAFFL=Y (both present)"
    type: positive
    datasets:
      ADSL:
        variables: [STUDYID, USUBJID, SAFFL, SAFFN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "Y", 1]
          - ["CDISCPILOT01", "01-701-1023", "N", 0]
    expected_findings: 0
  - name: "SAFFN=1 but SAFFL is null"
    type: negative
    datasets:
      ADSL:
        variables: [STUDYID, USUBJID, SAFFL, SAFFN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "", 1]
    expected_findings: 1
