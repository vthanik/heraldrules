id: SD1289
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Dictionary-Derived Term (--DECOD) should be populated when Preferred
  Term Code (--PTCD) is populated.
scope:
  Classes:
    Include: EVENTS
  Domains:
    Include: ALL
  Use_Case: INDH
check:
  all:
    - name: --PTCD
      operator: empty
    - name: --DECOD
      operator: non_empty
outcome:
  message: Missing value for --DECOD when --PTCD is populated
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1289
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000267

