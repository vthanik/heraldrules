Authorities:
  - Organization: CDISC
    Standards:
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'A piece of narrative content must only reference narrative
                  content items that have been defined within the study.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00168'
              Version: '1'
            Version: '1.0'
        Version: '4.0'
Check: |-
  ($.**.study)@$s.$s.documentedBy@$sd.
    $sd.versions@$sv.
    $sv.contents@$nc.
    $nc.
      [
        ($ChkX:=function()
          {
            contentItemId and $not(contentItemId in $s.versions.narrativeContentItems.id)
          };
          {
            "instanceType": $nc.instanceType,
            "id": $nc.id,
            "path": $nc._path,
            "StudyDefinitionDocument.id": $sd.id,
            "StudyDefinitionDocument.name": $sd.name,
            "StudyDefinitionDocumentVersion.id": $sv.id,
            "StudyDefinitionDocumentVersion.version": $sv.version,
            "name": $nc.name,
            "contentItemId": $nc.contentItemId,
            "sectionNumber": $nc.sectionNumber,
            "check": $ChkX()
          }
        )
      ]
      [check=true]
Core:
  Id: 'CORE-000944'
  Status: Published
  Version: '1'
Description: 'A piece of narrative content must only reference narrative content
  items that have been defined within the study.'
Executability: Fully Executable
Outcome:
  Message: 'The reference to the narrative content item is not targetting a
    narrative content item that has been defined within the study.'
  Output Variables:
    - StudyDefinitionDocument.id
    - StudyDefinitionDocument.name
    - StudyDefinitionDocumentVersion.id
    - StudyDefinitionDocumentVersion.version
    - name
    - contentItemId
    - sectionNumber
Rule Type: JSONata
Scope:
  Entities:
    Include:
      - 'NarrativeContent'
Sensitivity: Record
