id: AD0045
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: When both date and datetime variables are collected on the same record
  for the same observation, the Date portion of the datetime variable should be equal
  to the Date variable itself.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: ASTDT
      operator: empty
    - name: ASTDTM
      operator: non_empty
outcome:
  message: '*DT and its corresponding *DTM variable have different date values'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0045
  pmda_category: Error
  ig_versions: []

