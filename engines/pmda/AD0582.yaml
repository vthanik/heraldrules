id: AD0582
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: When all 3 variables are populated, Change to Baseline (BCHG) must equal
  Baseline Value (BASE) minus Analysis Value (AVAL).
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: BCHG
      operator: empty
    - name: AVAL
      operator: empty
    - name: BASE
      operator: empty
    - name: BCHG
      operator: within_tolerance_of_formula
      value: AVAL - BASE
      tolerance: 0.001
outcome:
  message: 'Calculation issue: BCHG != BASE - AVAL'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0582
  pmda_category: Error
  ig_versions: []

