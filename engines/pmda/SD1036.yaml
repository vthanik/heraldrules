id: SD1036
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Toxicity Grade (--TOXGR) should be provided when Toxicity (--TOX) is
  populated.
scope:
  Classes:
    Include:
      - EVENTS
      - FINDINGS
  Domains:
    Include:
      - AE
      - MH
      - CE
      - EG
      - LB
      - PC
      - PP
  Use_Case: INDH
check:
  all:
    - name: --TOX
      operator: empty
    - name: --TOXGR
      operator: non_empty
outcome:
  message: Missing value for --TOXGR when --TOX is populated
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1036
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000102

