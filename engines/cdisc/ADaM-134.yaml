Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  When AVAL, A1HI, and R2A1HI are all populated and A1HI does not equal 0, R2AyHI must equal AVAL divided by AyHI.
                Document: ADaM IG v1.1
                Section: '3.3.6'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-134
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: R2A1HI
      operator: empty
    - name: A1HI
      operator: empty
    - name: AVAL
      operator: empty
    - name: A1HI
      operator: equal_to
      value: 0
    - name: R2A1HI
      operator: within_tolerance_of_formula
      value: AVAL / A1HI
      tolerance: 0.001
Core:
  Id: ADaM-134
  Status: Published
  Version: '1'
Description: >-
  R2A1HI must equal AVAL/A1HI when A1HI != 0.
Executability: Fully Executable
Outcome:
  Message: 'R2A1HI does not equal AVAL / A1HI (ratio to upper limit calculation error)'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "R2A1HI = AVAL/A1HI (correct)"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, A1HI, R2A1HI]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 145.0, 150.0, 0.9667]
    expected_findings: 0
  - name: "R2A1HI does not equal AVAL/A1HI"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, A1HI, R2A1HI]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 145.0, 150.0, 2.0]
    expected_findings: 1
