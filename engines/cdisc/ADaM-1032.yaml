Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  PBCHGCyN is the numeric secondary of PBCHGCAy. When PBCHGCAy is present, PBCHGCyN must also be present. Added in v1.2.
                Document: ADaM IG v1.2
                Section: '3.3.4'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-1032
              Version: '1'
            Version: '1.0'
        Version: '1.2'
Check:
  all:
    - name: PBCHGCA1
      operator: non_empty
    - name: PBCHGC1N
      operator: empty
Core:
  Id: ADaM-1032
  Status: Published
  Version: '1'
Description: >-
  PBCHGCyN (numeric secondary of PBCHGCAy) must be present when PBCHGCAy is present.
Executability: Partially Executable
Outcome:
  Message: 'PBCHGCAy is present but its numeric secondary PBCHGCyN is absent'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.2"]
  source: Herald-originated (ADaM-IG v1.2 gap-fill)
  catalogs:
    - ADaMIG 1.2
  fetched: '2026-04-12'

tests:
  - name: "PBCHGC1N present when PBCHGCA1 present"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, PBCHGCA1, PBCHGC1N]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "HIGH", "3"]
          - ["CDISCPILOT01", "01-701-1023", "SODIUM", "", ""]
    expected_findings: 0
  - name: "PBCHGCA1 present but PBCHGC1N absent"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, PBCHGCA1, PBCHGC1N]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "HIGH", ""]
    expected_findings: 1
