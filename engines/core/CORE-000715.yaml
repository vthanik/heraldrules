Check:
  all:
    - name: --ORRES
      operator: empty
    - name: --STAT
      operator: empty
Core:
  Id: CORE-000715
  Status: Published
  Version: '1'
Description: Trigger error when --ORRES is not populated and --STAT is not populated
Executability: Fully Executable
Outcome:
  Message: If --ORRES is not populated, --STAT must be populated
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Exclude:
      - SC
  Use Case: NONCLIN
Sensitivity: Record
