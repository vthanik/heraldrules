Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  In a pair of corresponding character and numeric variables (* and *N
                  or *C), the primary variable must be populated if its secondary variable
                  is populated. Exceptions: *DTC, *FN, TRTPN, TRT01PN, PARAMN, AVALC,
                  BASEC, *LOC, *HIC. Uses TRT01P/TRT01PN as representative pair in ADSL.
                Document: ADaM IG v1.1
                Section: '3.2'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-1011
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: TRT01PN
      operator: empty
    - name: TRT01P
      operator: non_empty
Core:
  Id: ADaM-1011
  Status: Published
  Version: '1'
Description: >-
  When a numeric secondary variable is populated in ADSL, its corresponding primary
  character variable must also be populated. Uses TRT01PN/TRT01P as representative.
  Exceptions apply to TRTPN, TRT01PN, PARAMN, AVALC, BASEC, *LOC, *HIC.
Executability: Partially Executable
Outcome:
  Message: 'TRT01PN is populated but primary variable TRT01P is missing'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ADSL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "TRT01P and TRT01PN both populated"
    type: positive
    datasets:
      ADSL:
        variables: [STUDYID, USUBJID, TRT01P, TRT01PN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "Placebo", 0]
    expected_findings: 0
  - name: "TRT01PN populated but TRT01P is null"
    type: negative
    datasets:
      ADSL:
        variables: [STUDYID, USUBJID, TRT01P, TRT01PN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "", 54]
    expected_findings: 1
