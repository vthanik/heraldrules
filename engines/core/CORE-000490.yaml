Authorities:
  - Organization: CDISC
    Standards:
      - Name: SENDIG
        References:
          - Citations:
              - Cited Guidance: Values of --TESTCD and QNAM values must be limited to 8
                  characters, and cannot start with a number, nor can they
                  contain characters other than letters, numbers, or
                  underscores.
                Document: IG v3.0
                Section: 4.2.1
            Origin: SEND Conformance Rules
            Rule Identifier:
              Id: 'SEND23'
              Version: '1'
            Version: '5.0'
        Version: '3.0'
