# Variable: RFICDTC, RFSTDTC
# Condition: DM.RFICTDTC ^= Null and DM.RFSTDTC ^= Null
# Rule: DM.RFICDTC <= DM.RFSTDTC
Authorities:
  - Organization: FDA
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: Study start and end date/time should include month, day, and
                  year.
                Document: FDA
                Section: FDAB034
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB3411
              Version: '1'
            Version: '1.5'
        Version: '3.3'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: Study start and end date/time should include month, day, and
                  year.
                Document: FDA
                Section: FDAB034
            Origin: FDA Business Rules
            Rule Identifier:
              Id: FB3411
              Version: '1'
            Version: '1.5'
        Version: '3.4'
Check:
  all:
    - name: RFICDTC
      operator: non_empty
    - name: RFSTDTC
      operator: non_empty
    - name: RFICDTC
      operator: date_greater_than
      value: RFSTDTC
Core:
  Id: CORE-000713
  Status: Published
  Version: '1'
Description: Date/Time of Informed Consent (RFICDTC) should be prior or equal to
  the Subject Reference Start Date/Time (RFSTDTC).
Executability: Fully Executable
Outcome:
  Message: RFICDTC falls after RFSTDTC.
  Output Variables:
    - RFICDTC
    - RFSTDTC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
Sensitivity: Record
