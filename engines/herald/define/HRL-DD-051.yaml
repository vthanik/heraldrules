# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 4.3.1
id: HRL-DD-051
version: 1
status: Published
standard: Define-XML
category: Variable Definition
sensitivity: Record
executability: Fully Executable
description: >
  Length must not exceed 200 for text variables (SAS v5 Transport limit).
scope:
  classes: []
  domains: []
check:
  all:
    - name: data_type
      operator: not_equal_to
      value: text
    - name: length
      operator: less_than_or_equal_to
      value: 200
outcome:
  message: "Text variable length exceeds 200 characters. SAS v5 Transport files restrict variable lengths to 200 characters."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "4.3.1"
  cited_guidance: >
    text -- Char -- Maximum allowable length. SAS v.5 Transport files restrict variable lengths to 200 characters.

tests:
  - name: "HRL-DD-051 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-051 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

