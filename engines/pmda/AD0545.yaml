id: AD0545
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: If Change from Baseline Category y (N) (CHGCATyN) variable is used in
  a dataset, Change from Baseline Category y (CHGCATy) variable must also be present
  in that dataset.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: CHGCAT1N
      operator: empty
    - name: CHGCAT1
      operator: non_empty
outcome:
  message: CHGCATyN is present and CHGCATy is not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0545
  pmda_category: Error
  ig_versions: []

