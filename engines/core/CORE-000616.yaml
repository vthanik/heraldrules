Check:
  # REMARK: --TPTNUM and --STINT both are usually "permissible"
  all:
    - name: '--TPTREF'
      operator: exists
    - name: '--STINT'
      operator: exists
    - name: '--STINT'
      operator: 'non_empty'
    - name: '--TPTREF'
      operator: 'empty'
Core:
  Id: CORE-000616
  Status: Published
  Version: '1'
Description: 'When Planned Start of Assessment Interval (--STINT) is populated,
  Time Point Reference (--TPTREF) should also be populated.'
Executability: Fully Executable
Outcome:
  Message: --STINT is populated, but --TPTREF is missing.
Rule Type: Record Data
Scope:
  Classes:
    # TODO? Should we limit to "Findings" here?
    Include:
      - ALL
  Domains:
    Include:
      - ALL
Sensitivity: Record
