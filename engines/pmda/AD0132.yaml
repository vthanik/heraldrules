id: AD0132
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: When all 3 variables are populated and BASE does not equal 0, Ratio to
  Base (R2BASE) must equal Analysis Value (AVAL) / Baseline Value (BASE). AD0132A
  will raise errors when BASE equals 0. AD0132B also complements this check.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: R2BASE
      operator: empty
    - name: BASE
      operator: empty
    - name: AVAL
      operator: empty
    - name: BASE
      operator: equal_to
      value: 0
    - name: R2BASE
      operator: within_tolerance_of_formula
      value: AVAL / BASE
      tolerance: 0.001
outcome:
  message: 'Calculation issue: R2BASE != AVAL / BASE'
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0132
  pmda_category: Warning
  ig_versions: []

