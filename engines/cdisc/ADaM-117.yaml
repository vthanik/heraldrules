Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  Within a study, all ATPT values must be the same for each unique
                  value of ATPTN when the numeric variable ATPTN is populated.
                Document: ADaM IG v1.1
                Section: "4.3"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-117
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: ATPTN
      operator: non_empty
    - name: ATPT
      operator: non_empty
    - name: ATPT
      operator: not_consistent_with_variable
      value: ATPTN
Core:
  Id: ADaM-117
  Status: Published
  Version: "1"
Description: >-
  Within a study, all ATPT values must be the same for each unique value of
  ATPTN when the numeric variable ATPTN is populated.
Executability: Fully Executable
Outcome:
  Message: "Inconsistent value for ATPT across ATPTN values"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: ATPT consistent for ATPTN value
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ATPTN, ATPT]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 1, "Pre-dose"]
          - [CDISCPILOT01, 01-701-1028, SODIUM, 1, "Pre-dose"]
    expected_findings: 0
  - name: ATPT inconsistent for same ATPTN value
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ATPTN, ATPT]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 1, "Pre-dose"]
          - [CDISCPILOT01, 01-701-1028, SODIUM, 1, "Predose"]
    expected_findings: 1
