id: AD0064
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: If Actual Treatment (TRTxxAN) numeric variable is present, there must
  be a corresponding Actual Treatment (TRTxxA) character variable.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
check:
  all:
    - name: TRT01AN
      operator: empty
    - name: TRT01A
      operator: non_empty
outcome:
  message: TRTxxAN is present, but TRTxxA is not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0064
  pmda_category: Error
  ig_versions: []

