id: SD1046
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: I/E Criterion Original Result (IEORRES) must equal 'N' when Inclusion/Exclusion
  Category (IECAT) is 'INCLUSION'.
scope:
  Classes:
    Include: FINDINGS
  Domains:
    Include: IE
  Use_Case: INDH
check:
  all:
    - name: IECAT
      operator: not_equal_to
      value: INCLUSION
      value_is_literal: yes
    - name: IEORRES
      operator: equal_to
      value: 'N'
      value_is_literal: yes
outcome:
  message: IESTRESC is not 'N' when IECAT ='INCLUSION'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1046
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000001

