id: HRL-SD-005
version: 1
status: Published
standard: SDTM
category: Format
sensitivity: Record
executability: Fully Executable
description: Reference record defined by Related Domain Abbreviation (RDOMAIN), Associated
  Person Identifier (APID), Identifying Variable (IDVAR) and Identifying Variable
  Value (IDVARVAL) must exist in the target domain defined by Related Domain Abbreviation
  (RDOMAIN).
scope:
  classes: []
  domains: []
check:
  all:
    - name: __reference__
      operator: valid_reference
outcome:
  message: Invalid referenced record
  severity: Error
provenance:
  source_doc: Herald-original (gap analysis vs P21 Community catalog)
  authority: Herald
  p21_reference: SD1482

tests:
  - name: "referenced record exists in target domain"
    type: positive
    skip: true
    datasets:
      RELREC:
        variables: [STUDYID, RDOMAIN, IDVAR, IDVARVAL]
        records:
          - ["S1", "AE", "AESEQ", "1"]
    expected_findings: 0

  - name: "referenced record does not exist in target domain"
    type: negative
    skip: true
    datasets:
      RELREC:
        variables: [STUDYID, RDOMAIN, IDVAR, IDVARVAL]
        records:
          - ["S1", "AE", "AESEQ", "999"]
    expected_findings: 1

