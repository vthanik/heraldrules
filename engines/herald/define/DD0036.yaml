# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.9.2; 5.3.12.3
id: DD0036
version: 1
status: Published
standard: Define-XML
category: Origin Metadata
sensitivity: Record
executability: Fully Executable
description: >
  Method is required when Origin is 'Derived'.
scope:
  classes: []
  domains: []
check:
  all:
    - name: origin
      operator: equal_to
      value: Derived
    - name: method_id
      operator: empty
outcome:
  message: "Method is missing but required when Origin is 'Derived'. A MethodDef must be provided for derived variables."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.9.2; 5.3.12.3"
  cited_guidance: >
    MethodOID -- Conditional. Required when the Type attribute for the def:Origin is 'Derived'. If the variable is derived, a MethodDef must be provided.
