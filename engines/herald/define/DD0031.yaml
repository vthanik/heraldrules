# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 4.3.2; 5.3.12.3
id: DD0031
version: 1
status: Published
standard: Define-XML
category: Origin Metadata
sensitivity: Record
executability: Fully Executable
description: >
  Origin Type must be a valid value.
scope:
  classes: []
  domains: []
check:
  all:
    - name: origin
      operator: not_empty
    - name: origin
      operator: not_in
      value:
        - Collected
        - Derived
        - Assigned
        - Protocol
        - Predecessor
        - Not Available
outcome:
  message: "Origin type is not valid. Must be one of: Collected, Derived, Assigned, Protocol, Predecessor, Not Available."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "4.3.2; 5.3.12.3"
  cited_guidance: >
    Type -- Required. Origin type. The list of allowable values is not extensible.
