Check:
  all:
    - name: --ORRES
      operator: not_matches_regex
      value: ^(?:[+-]?(\d+(\.\d+)?|\.\d+)|[a-zA-Z]+|[^\d\s\w]+)$
    - name: --STRESN
      operator: non_empty
Core:
  Id: CORE-000756
  Status: Published
  Version: '1'
Description: When --ORRES is representing numeric data with special characters
  like '<' and '>', , --STRESN may not be populated.
Executability: Partially Executable # See JIRA
Outcome:
  Message: --STRESN may not be populated as --ORRES does not represent a pure
    numeric value.
  Output Variables:
    - --ORRES
    - --STRESN
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - ALL
  Use Case: NONCLIN
Sensitivity: Record
