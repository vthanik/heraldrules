Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If Analysis Value Category y (N) (AVALCAyN) variable is used in a dataset, then the corresponding Analysis Value Category y (AVALCAy) must also be used.
                Document: ADaM IG v1.1
                Section: '3.3.3'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-543
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: AVALCA1N
      operator: empty
    - name: AVALCA1
      operator: non_empty
Core:
  Id: ADaM-543
  Status: Published
  Version: '1'
Description: >-
  When AVALCA1N is present, AVALCA1 must also be present.
Executability: Partially Executable
Outcome:
  Message: 'AVALCA1N is populated but AVALCA1 is missing'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "AVALCA1N and AVALCA1 both present"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVALCA1, AVALCA1N]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "NORMAL", 1]
    expected_findings: 0
  - name: "AVALCA1N present but AVALCA1 missing"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVALCA1, AVALCA1N]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "", 1]
    expected_findings: 1
