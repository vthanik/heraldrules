id: AD0132A
version: 2
status: Reference
standard: ADaM
category: Conformance
sensitivity: Record
executability: Fully Executable
description: When baseline (BASE) equals 0, the Ratio to Baseline (R2BASE) should
  not be populated since you cannot divide by 0. AD0132 checks the RSBASE calculation
  is correct when BASE does not equal 0.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: BASE
      operator: not_equal_to
      value: 0
    - name: R2BASE
      operator: empty
outcome:
  message: 'Calculation issue: BASE = 0, but R2BASE is populated'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0132A
  pmda_category: Error
  ig_versions: []

