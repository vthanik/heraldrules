Check:
  all:
    - name: AESDTH
      operator: equal_to
      value: Y
      value_is_literal: true
    - name: DTHFL
      operator: not_equal_to
      value: Y
      value_is_literal: true
Core:
  Id: CORE-000253
  Status: Published
  Version: '1'
Description: When a record is present in the AE dataset where AESDTH = 'Y' then
  death flag (DTHFL) should be populated as 'Y' in the DM dataset for the
  corresponding subject.
Executability: Fully Executable
Match Datasets:
  - Keys:
      - USUBJID
    Name: AE
Outcome:
  Message: AESDTH is 'Y' in AE dataset, but DTHFL in DM dataset is not "Y".
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
  Use Case: INDH
Sensitivity: Record
