id: SD1013
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Planned Order of Elements within Arm (TAETORD) should be null when subject's
  experience for a particular period of time is represented as an unplanned Element
  (ETCD = 'UNPLAN').
scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: SE
  Use_Case: INDH
check:
  all:
    - name: ETCD
      operator: not_equal_to
      value: UNPLAN
    - name: TAETORD
      operator: empty
outcome:
  message: TAETORD is populated, ETCD = 'UNPLAN'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1013
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000020

