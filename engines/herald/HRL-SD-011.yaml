id: HRL-SD-011
version: 1
status: Published
standard: SDTM
category: Cross-Domain
sensitivity: Record
executability: Fully Executable
description: >
  DM.RFSTDTC (reference start date) should equal the earliest EX.EXSTDTC
  (first exposure start date) for the same subject. Mismatches indicate
  inconsistent study anchoring.
scope:
  classes: []
  domains:
    - DM
    - EX
check:
  all:
    - name: RFSTDTC
      operator: equal_to
      value:
        name: EXSTDTC
        aggregate: min
        by: USUBJID
        dataset: EX
outcome:
  message: RFSTDTC does not match earliest EXSTDTC for subject
  severity: Warning
provenance:
  source_doc: StudySAS Blog — Cross-domain SDTM QC Checks (2026-04)
  authority: Herald
  reference_url: https://studysas.blogspot.com/2026/04/html-sdtm-programming-sas-submission-qc.html

tests:
  - name: "RFSTDTC matches earliest EXSTDTC"
    type: positive
    datasets:
      DM:
        variables: [STUDYID, USUBJID, RFSTDTC]
        records:
          - ["CDISCPILOT01", "01-701-1015", "2014-01-02"]
      EX:
        variables: [STUDYID, USUBJID, EXSTDTC]
        records:
          - ["CDISCPILOT01", "01-701-1015", "2014-01-02"]
          - ["CDISCPILOT01", "01-701-1015", "2014-01-09"]
    expected_findings: 0
  - name: "RFSTDTC does not match earliest EXSTDTC"
    type: negative
    datasets:
      DM:
        variables: [STUDYID, USUBJID, RFSTDTC]
        records:
          - ["CDISCPILOT01", "01-701-1015", "2014-01-05"]
      EX:
        variables: [STUDYID, USUBJID, EXSTDTC]
        records:
          - ["CDISCPILOT01", "01-701-1015", "2014-01-02"]
    expected_findings: 1
