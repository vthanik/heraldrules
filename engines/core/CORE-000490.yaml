              Version: '1'
            Version: '1.0'
        Substandard: SEND
        Version: '1.0'
      - Name: TIG
        References:
          - Citations:
              - Cited Guidance: When extending a controlled terminology list, the
                  case-sensitivity convention of that list should be followed.
                Document: TIG v1.0
                Item: QNAM CDISC Notes
                Section: 2.8.9.27 SEND Supplemental Qualifiers (--SUPP)
            Origin: TIG Conformance Rules
            Rule Identifier:
              Id: TIG0157
              Version: '1'
            Version: '1.0'
        Substandard: SEND
        Version: '1.0'
Check:
  all:
    - name: QNAM
      operator: not_matches_regex
      value: ^[A-Z0-9_]*$
Core:
  Id: CORE-000490
  Status: Published
  Version: '1'
Description: Raise an error when QNAM has lowercase characters
Executability: Partially Executable - Possible Overreporting
Outcome:
  Message: --QNAM value must be uppercase
  Output Variables:
    - IDVAR
    - IDVARVAL
    - QNAM
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - RELATIONSHIP
  Domains:
    Include:
      - SUPP--
  Use Case: NONCLIN
Sensitivity: Record
