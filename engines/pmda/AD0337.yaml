id: AD0337
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: If Multi-Response Criterion y Evaluation (MCRITyML) flag variable is
  present, there must also be a corresponding Analysis Multi-Response Criterion y
  (MCRITy) variable.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: MCRIT1ML
      operator: empty
    - name: MCRIT1ML
      operator: in
      value:
        - 'Y'
outcome:
  message: MCRITy variable is not present when MCRITyML is present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0337
  pmda_category: Error
  ig_versions: []

