Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  Analysis Range y Indicator (AyIND) variable values must be L (low),
                  N (normal), H (high), or null.
                Document: ADaM IG v1.1
                Section: "4.4"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-352
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: A1IND
      operator: empty
    - name: A1IND
      operator: in
      value:
        - L
        - N
        - H
Core:
  Id: ADaM-352
  Status: Published
  Version: "1"
Description: >-
  Analysis Range y Indicator (AyIND) variable values must be L (low), N
  (normal), H (high), or null. Uses A1IND as a representative variable.
Executability: Partially Executable
Outcome:
  Message: "AyIND value is not L, N, H, or null"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: A1IND is N (valid)
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, A1IND]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, N]
    expected_findings: 0
  - name: A1IND has invalid value (violation)
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, A1IND]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, "NORMAL"]
    expected_findings: 1
