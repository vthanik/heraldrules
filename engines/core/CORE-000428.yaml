Authorities:
  - Organization: CDISC
    Standards:
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'If timing type is "Fixed Reference" then the corresponding
                  attribute relativeToFrom must be filled with "Start to
                  Start".'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00036'
              Version: '1'
            Version: '1.0'
        Version: '3.0'
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'If timing type is "Fixed Reference" then the corresponding
                  attribute relativeToFrom must be filled with "Start to
                  Start".'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00036'
              Version: '1'
            Version: '1.0'
        Version: '4.0'
Check:
  all:
    - name: rel_type
      operator: equal_to
      value: 'definition'
    - name: type.code
      operator: equal_to
      value: 'C201358'
    - any:
        - name: relativeToFrom.code
          operator: empty
        - name: relativeToFrom.code
          operator: not_equal_to
          value: 'C201355'
Core:
  Id: CORE-000428
  Status: Published
  Version: '1'
Description: 'If timing type is "Fixed Reference" then the corresponding
  attribute relativeToFrom must be filled with "Start to Start".'
Executability: Fully Executable
Outcome:
  Message: 'Type is "Fixed Reference" (type.code=C201358) for the timing but
    relativeToFrom is not "Start to Start" (relativeToFrom.code is not
    C201355).'
  Output Variables:
    - parent_entity
    - parent_id
    - parent_rel
    - id
    - name
    - type.code
    - type.decode
    - relativeToFrom.code
    - relativeToFrom.decode
Rule Type: Record Data
Scope:
  Entities:
    Include:
      - 'Timing'
Sensitivity: Record
