id: SD1256
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: DTHFL must equal 'Y' when there is a record in the Disposition (DS) domain
  with DSDECOD = 'DEATH'.
scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: DM
  Use_Case: INDH
check:
  all:
    - name: DSDECOD
      operator: not_equal_to
      value: DEATH
      value_is_literal: yes
    - name: DTHFL
      operator: equal_to
      value: 'Y'
      value_is_literal: yes
outcome:
  message: DTHFL does not equal 'Y' when DS.DSDECOD = 'DEATH'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1256
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000252

