id: HRL-TS-002
version: 1
status: Published
standard: Define-XML
category: Presence
sensitivity: Record
executability: Fully Executable
description: At least one of Start Date/Time (--STDTC) or Start Day of Event or Exposure
  (--STDY) variables values must be populated for Analysis.
scope:
  classes: []
  domains: []
check:
  all:
    - name: __STDTC__
      operator: non_empty
    - name: __STDY__
      operator: non_empty
outcome:
  message: Both --STDTC and --STDY values are missing
  severity: Error
provenance:
  source_doc: Herald-original (gap analysis vs P21 Community catalog)
  authority: Herald
  p21_reference: TS0019

tests:
  - name: "at least one of STDTC or STDY is populated"
    type: positive
    skip: true
    datasets:
      AE:
        variables: [STUDYID, USUBJID, AESTDTC]
        records:
          - ["S1", "S1-001", "2024-01-01"]
    expected_findings: 0

  - name: "both STDTC and STDY are missing"
    type: negative
    skip: true
    datasets:
      AE:
        variables: [STUDYID, USUBJID, AESTDTC, AESTDY]
        records:
          - ["S1", "S1-001", "", ""]
    expected_findings: 1

