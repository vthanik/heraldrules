id: SD1254
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: DTHFL must equal 'Y' when there is a record in the Adverse Events (AE)
  domain with AEOUT = 'FATAL'.
scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: DM
  Use_Case: INDH
check:
  all:
    - name: AEOUT
      operator: not_equal_to
      value: FATAL
      value_is_literal: yes
    - name: DTHFL
      operator: equal_to
      value: 'Y'
      value_is_literal: yes
outcome:
  message: DTHFL does not equal 'Y' when AE.AEOUT = 'FATAL'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1254
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000254

