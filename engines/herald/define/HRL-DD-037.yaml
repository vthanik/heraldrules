# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 4.1.1; 1.5.1
id: HRL-DD-037
version: 1
status: Published
standard: Define-XML
category: Standards Reference
sensitivity: Dataset
executability: Fully Executable
description: >
  SDTMIG version must be one of the allowable versions: 3.1.2, 3.2, 3.3, 3.4.
scope:
  classes: []
  domains: []
check:
  all:
    - name: standard_name
      operator: not_equal_to
      value: SDTMIG
    - name: standard_version
      operator: in
      value:
        - "3.1.2"
        - "3.2"
        - "3.3"
        - "3.4"
outcome:
  message: "SDTMIG version is not allowable. Must be one of: 3.1.2, 3.2, 3.3, 3.4."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "4.1.1; 1.5.1"
  cited_guidance: >
    Name: SDTMIG. Allowable Versions: 3.1.2, 3.2, 3.3. Define-XML v2.1 supports SDTMIG v3.1.2 and higher.

tests:
  - name: "HRL-DD-037 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-037 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

