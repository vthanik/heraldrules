# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.11
id: DD0018
version: 1
status: Published
standard: Define-XML
category: Dataset Definition
sensitivity: Dataset
executability: Fully Executable
description: >
  Repeating must be 'Yes' or 'No'.
scope:
  classes: []
  domains: []
check:
  all:
    - name: repeating
      operator: not_empty
    - name: repeating
      operator: not_in
      value:
        - "Yes"
        - "No" 
outcome:
  message: "Repeating has an invalid value. Must be 'Yes' or 'No'."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.11"
  cited_guidance: >
    Repeating -- Required. 'Yes', 'No'.
