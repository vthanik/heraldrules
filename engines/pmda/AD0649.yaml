id: AD0649
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: If ONTRxxFL is included, ONTRTFL is defined as the overall on-treatment
  flag. If any On Treatment Period xx Flag (ONTRxxFL) variables are flagged Y, then
  the overall On Treatment Record Flag (ONTRTFL) variable should also be Y.
scope:
  classes: []
  domains:
    - OCCDS
    - ADAE
    - MDOCCDS
check:
  all:
    - name: ONTR01FL
      operator: equal_to
      value: 'Y'
    - name: ONTRTFL
      operator: not_equal_to
      value: 'Y'
outcome:
  message: ONTRxxFL = Y and ONTRTFL != Y
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0649
  pmda_category: Error
  ig_versions: []

