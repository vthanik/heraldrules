  any:
    - all:
        - name: USUBJID
          operator: non_empty
        - name: IDVARVAL
          operator: non_empty
        - name: RELTYPE
          operator: non_empty
    - all:
        - name: POOLID
          operator: non_empty
        - name: IDVARVAL
          operator: non_empty
        - name: RELTYPE
          operator: non_empty
Core:
  Id: CORE-000388
  Status: Published
  Version: '1'
Description: When USUBJID or POOLID are populated, and IDVARVAL is populated,
  then RELTYPE must be null.
Executability: Fully Executable
Outcome:
  Message: RELTYPE may not be populated when USUBJID or POOLID is populated, and
    IDVARVAL is populated
  Output Variables:
    - RDOMAIN
    - USUBJID
    - POOLID
    - IDVAR
    - IDVARVAL
    - RELTYPE
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - RELATIONSHIP
  Domains:
    Include:
      - RELREC
  Use Case: NONCLIN
Sensitivity: Record
