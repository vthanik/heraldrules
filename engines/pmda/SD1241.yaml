id: SD1241
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Body System or Organ Class (--BODSYS) must be populated when Body System
  or Organ Class Code (--BDSYCD) is populated.
scope:
  Classes:
    Include: EVENTS
  Domains:
    Include: ALL
  Use_Case: INDH
check:
  all:
    - name: --BODSYS
      operator: empty
    - name: --BDSYCD
      operator: non_empty
outcome:
  message: --BODSYS is not populated when --BDSYCD is populated
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1241
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000024

