Check:
  all:
    - name: "RFSTDTC"
      operator: "date_not_equal_to"
      value: "$ex_exstdtc"
Core:
  Id: CORE-001044
  Status: Published
  Version: '1'
Description: Subject Reference Start Date/Time (RFSTDTC) should be equal to the
  first Start Date/Time of Treatment (EXSDTC).
Executability: Fully Executable
Operations:
  - domain: "EX"
    group:
      - USUBJID
    id: "$ex_exstdtc"
    name: "EXSTDTC"
    operator: "min_date"
Outcome:
  Message: RFSTDTC is not equal to the first EXSTDTC.
  Output Variables:
    - RFSTDTC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - INTERVENTIONS
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
Sensitivity: Record
