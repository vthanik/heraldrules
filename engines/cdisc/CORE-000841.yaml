      operator: equal_to
      value: DTHDTC
Core:
  Id: CORE-000841
  Status: Published
  Version: '1'
Description: End Date/Time of Adverse Event (AEENDTC) in AE dataset of Adverse Event
  where AEOUT = 'FATAL' should be equal to the Date/Time of Death (DTHDTC) in the
  DM dataset for the corresponding subject.
Executability: Fully Executable
Match_Datasets:
  - Keys:
      - USUBJID
    Name: DM
Outcome:
  Message: AEENDTC in AE dataset of AE where AEOUT = 'FATAL' is not equal to DTHDTC
    in the DM dataset.
  Output_Variables:
    - AEOUT
    - AEENDTC
    - DTHDTC
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - EVENTS
  Domains:
    Include:
      - AE
Sensitivity: Record
