id: AD0660
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: METABFL (Metabolite Flag) must be Y or null.
scope:
  classes: []
  domains: ADNCA
check:
  all:
    - name: METABFL
      operator: empty
    - name: METABFL
      operator: equal_to
      value: 'Y'
outcome:
  message: METABFL value is not Y or null
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0660
  pmda_category: Error
  ig_versions: []

