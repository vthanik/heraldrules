id: AD0012
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: When a numeric Flag variable (*FN) is populated, its corresponding character
  Flag variable (*FL) must be populated.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: ONTRTFL
      operator: empty
    - name: ONTRTFN
      operator: non_empty
outcome:
  message: Secondary variable *FN is populated, but its primary variable *FL is not
    populated
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0012
  pmda_category: Error
  ig_versions: []

