Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If Multi-Response Criterion y Evaluation (MCRITyML) flag variable
                  is present, values must be Y or null.
                Document: ADaM IG v1.1
                Section: "4.4"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-337
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: MCRIT1ML
      operator: empty
    - name: MCRIT1ML
      operator: in
      value:
        - 'Y'
Core:
  Id: ADaM-337
  Status: Published
  Version: "1"
Description: >-
  If Multi-Response Criterion y Evaluation (MCRITyML) flag variable is
  present, values must be Y or null.
Executability: Partially Executable
Outcome:
  Message: "MCRITyML value is not Y or null"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: MCRIT1ML is Y (valid)
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, MCRIT1ML]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, Y]
    expected_findings: 0
  - name: MCRIT1ML has invalid value (violation)
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, MCRIT1ML]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, "N"]
    expected_findings: 1
