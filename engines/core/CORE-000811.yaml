Authorities:
  - Organization: CDISC
    Standards:
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'The same Biomedical Concept Category must not be referenced
                  more than once from the same activity.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00090'
              Version: '1'
            Version: '1.0'
        Version: '3.0'
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'The same Biomedical Concept Category must not be referenced
                  more than once from the same activity.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00090'
              Version: '1'
            Version: '1.0'
        Version: '4.0'
Check:
  all:
    - name: instanceType
      operator: equal_to
      value: 'BiomedicalConceptCategory'
    - name: rel_type
      operator: equal_to
      value: 'reference'
    - name: rel_type.Activity
      operator: equal_to
      value: 'definition'
    - name: parent_entity
      operator: equal_to
      value: 'Activity'
    - name: parent_rel
      operator: equal_to
      value: 'bcCategoryIds'
      value_is_literal: true
    - name: id
      operator: is_not_unique_set
      value:
        - parent_entity
        - parent_id
        - parent_rel
        - rel_type.Activity
Core:
  Id: 'CORE-000811'
  Status: Published
  Version: '1'
Description: 'The same Biomedical Concept Category must not be referenced more
  than once from the same activity.'
Executability: Fully Executable
Match Datasets:
  - Keys:
      - Left: parent_id
        Right: id
      - Left: parent_entity
        Right: instanceType
    Name: Activity
Outcome:
  Message: 'The biomedical concept category is referenced more than once from the
    same activity.'
  Output Variables:
    - parent_entity
    - parent_id
    - parent_rel
    - id
    - name
    - name.Activity
Rule Type: Record Data
Scope:
  Entities:
    Include:
      - 'BiomedicalConceptCategory'
Sensitivity: Record
