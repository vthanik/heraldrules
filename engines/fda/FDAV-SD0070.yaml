Description: All Demographics (DM) subjects (USUBJID) participating in a study that
  includes investigational product should have at least one record in the Exposure
  (EX) domain, except for subjects who failed screening (ARMCD = 'SCRNFAIL'), were
  not fully assigned to an Arm (ARMCD = 'NOTASSGN'), or did not receive study treatment
  (ACTARMCD = 'NOTTRT').
