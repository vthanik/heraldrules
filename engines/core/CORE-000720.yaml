Check:
  all:
    - name: --DTC
      operator: non_empty
    - name: RFPENDTC
      operator: non_empty
    - name: --DTC
      operator: date_greater_than
      value: RFPENDTC
Core:
  Id: CORE-000720
  Status: Published
  Version: '1'
Description: Date/Time of Collection (--DTC) variable value should be prior or
  equal to Date/Time of End of Participation (RFPENDTC).
Executability: Fully Executable
Match Datasets:
  - Keys:
      - USUBJID
    Name: DM
Outcome:
  Message: --DTC falls after RFPENDTC.
  Output Variables:
    - --DTC
    - RFPENDTC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - INTERVENTIONS
      - EVENTS
      - FINDINGS
      - SPECIAL PURPOSE
  Domains:
    Include:
      - ALL
Sensitivity: Record
