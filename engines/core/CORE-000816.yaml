Authorities:
  - Organization: CDISC
    Standards:
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'All epochs are expected to be referred to from a scheduled
                  Activity Instance.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00099'
              Version: '1'
            Version: '1.0'
        Version: '3.0'
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'All epochs are expected to be referred to from a scheduled
                  Activity Instance.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00099'
              Version: '1'
            Version: '1.0'
        Version: '4.0'
Check:
  all:
    - name: instanceType
      operator: equal_to
      value: 'StudyEpoch'
    - name: rel_type
      operator: equal_to
      value: 'definition'
    - any:
        - name: epochId
          operator: not_exists
        - name: epochId
          operator: empty
Core:
  Id: 'CORE-000816'
  Status: Published
  Version: '1'
Description: 'All epochs are expected to be referred to from a scheduled Activity Instance.'
Executability: Partially Executable - Possible Overreporting
Match Datasets:
  - Join Type: left
    Keys:
      - Left: id
        Right: epochId
      - rel_type
    Name: ScheduledActivityInstance
Outcome:
  Message: 'The epoch is not referenced by any scheduled activity instances.'
  Output Variables:
    - parent_entity
    - parent_id
    - parent_rel
    - id
    - name
Rule Type: Record Data
Scope:
  Entities:
    Include:
      - 'StudyEpoch'
Sensitivity: Record
