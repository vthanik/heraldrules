Authorities:
  - Organization: CDISC
    Standards:
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'Within an encounter, if more environmental settings are
                  defined, they must be distinct.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00156'
              Version: '1'
            Version: '1.0'
        Version: '4.0'
Check:
  all:
    - name: instanceType
      operator: equal_to
      value: 'Code'
    - name: parent_entity
      operator: equal_to
      value: 'Encounter'
    - name: parent_rel
      operator: equal_to
      value: 'environmentalSettings'
      value_is_literal: true
    - name: code
      operator: is_not_unique_set
      value:
        - parent_entity
        - parent_rel
        - parent_id
        - codeSystem
        - codeSystemVersion
Core:
  Id: 'CORE-000900'
  Status: Published
  Version: '1'
Description: 'Within an encounter, if more environmental settings are defined,
  they must be distinct.'
Executability: Fully Executable
Match Datasets:
  - Keys:
      - Left: parent_id
        Right: id
      - rel_type
    Name: Encounter
Outcome:
  Message: 'The environmental settings of the encounter are not unique - the same
    code is used more than once with the same codeSystem and codeSystemVersion.'
  Output Variables:
    - name
    - parent_entity
    - parent_id
    - parent_rel
    - id
    - code
    - codeSystem
    - codeSystemVersion
    - decode
Rule Type: Record Data
Scope:
  Entities:
    Include:
      - Code
Sensitivity: Record
