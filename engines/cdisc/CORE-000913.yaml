Core:
  Id: CORE-000913
  Status: Published
  Version: '1'
Description: Disposition date time (DSSTDTC) for DEATH record in the DS dataset should
  be equal to the Date of Death (DTHDTC) in the DM dataset for the corresponding subject.
Executability: Fully Executable
Match_Datasets:
  - Keys:
      - USUBJID
    Name: DM
Outcome:
  Message: DSSTDTC for DEATH record in DS dataset is not equal to DTHDTC in the DM
    dataset.
  Output_Variables:
