Core:
  Id: FDAV-SD0031
  Status: Reference
  Version: '1'
Description: Start Date/Time of Observation (--STDTC), Start Relative to Reference
  Period (--STRF) or Start Relative to Reference Time Point (--STRTPT) should not
  be NULL, when End Date/Time of Observation (--ENDTC), End Relative to Reference
  Period (--ENRF) or End Relative to Reference Time Period (--ENRTPT) is not NULL.
Check: []
Outcome:
  Message: Missing values for --STDTC, --STRF and --STRTPT, when --ENDTC, --ENRF or
    --ENRTPT is provided
Rule Type: Record Data
Sensitivity: Record
