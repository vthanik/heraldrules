id: AD0667
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: If DOSPCTDF (Percent Diff. Nominal vs. Actual Dose) is populated, then
  TRTA (Actual Treatment) must be populated.
scope:
  classes: []
  domains: ADNCA
check:
  all:
    - name: DOSPCTDF
      operator: non_empty
    - name: NOMLDOS
      operator: empty
outcome:
  message: DOSPCTDF is populated and TRTA is not populated
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0667
  pmda_category: Error
  ig_versions: []

