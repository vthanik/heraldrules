Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  BTOXGRLN is the numeric secondary of BTOXGRL (Baseline Toxicity Grade Low). Added in v1.2 Table 3.3.7.1.
                Document: ADaM IG v1.2
                Section: '3.3.7'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-1040
              Version: '1'
            Version: '1.0'
        Version: '1.2'
Check:
  all:
    - name: BTOXGRLN
      operator: non_empty
    - name: BTOXGRL
      operator: empty
Core:
  Id: ADaM-1040
  Status: Published
  Version: '1'
Description: >-
  BTOXGRLN (numeric version of BTOXGRL) requires BTOXGRL to also be present.
Executability: Partially Executable
Outcome:
  Message: 'BTOXGRLN is present but primary variable BTOXGRL is absent'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.2"]
  source: Herald-originated (ADaM-IG v1.2 gap-fill)
  catalogs:
    - ADaMIG 1.2
  fetched: '2026-04-12'

tests:
  - name: "BTOXGRLN present with BTOXGRL also present"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BTOXGRL, BTOXGRLN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Grade 1", "1"]
          - ["CDISCPILOT01", "01-701-1023", "SODIUM", "", ""]
    expected_findings: 0
  - name: "BTOXGRLN present but BTOXGRL absent"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BTOXGRL, BTOXGRLN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "", "1"]
    expected_findings: 1
