Check:
  all:
    - name: MAORRES
      operator: non_empty
    - name: MASPEC
      operator: non_empty
    - name: MAORRES
      operator: is_not_unique_set
      value:
        - USUBJID
        - MATESTCD
        - MASPEC
Core:
  Id: CORE-000495
  Status: Published
  Version: '1'
Description: Raise an error when there is more than one record present for any
  particular Macroscopic Finding test and result in the MA Domain, within a
  subject.
Executability: Fully Executable
Outcome:
  Message: The Macroscopic Finding test result is not unique for this subject and test.
  Output Variables:
    - USUBJID
    - MATESTCD
    - MAORRES
    - MASPEC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - MA
  Use Case: NONCLIN
Sensitivity: Record
