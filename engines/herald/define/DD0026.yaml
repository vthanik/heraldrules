# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.12
id: DD0026
version: 1
status: Published
standard: Define-XML
category: Variable Definition
sensitivity: Record
executability: Fully Executable
description: >
  Significant Digits is required when Data Type is float.
scope:
  classes: []
  domains: []
check:
  all:
    - name: data_type
      operator: equal_to
      value: float
    - name: sig_digits
      operator: empty
outcome:
  message: "Significant Digits is missing but required when Data Type is float."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.12"
  cited_guidance: >
    SignificantDigits -- Conditional. Required if DataType is 'Float'. When DataType is float, both Length and SignificantDigits must be provided.
