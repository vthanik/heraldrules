id: AD0482
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: In a pair of corresponding character and numeric variables, the primary
  or most commonly used variable must be populated if its secondary variable describing
  it is populated. Corresponding character and numeric values must also have a one-to-one
  mapping consistency when the primary variable is populated, which are addressed
  in other rules.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: AVISITN
      operator: empty
    - name: AVISIT
      operator: non_empty
outcome:
  message: Primary variable BCHGCATy is populated, but its secondary variable BCHGCAyN
    is not populated
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0482
  pmda_category: Error
  ig_versions: []

