Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If Planned Treatment numeric (TRTPN) is present in a single dataset, its character counterpart (TRTP) must also be present (single-dataset variant).
                Document: ADaM IG v1.1
                Section: '3.3'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-91-SD
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: TRTPN
      operator: non_empty
    - name: TRTP
      operator: empty
Core:
  Id: ADaM-091-SD
  Status: Published
  Version: '1'
Description: >-
  Single-dataset variant of ADaM-091. When TRTPN is present, TRTP must also be present within the same dataset.
Executability: Partially Executable
Outcome:
  Message: 'TRTPN is populated but TRTP is missing (single-dataset check)'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "TRTP and TRTPN both populated (single dataset)"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, TRTP, TRTPN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Placebo", 0]
    expected_findings: 0
  - name: "TRTPN populated but TRTP null (single dataset)"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, TRTP, TRTPN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "", 54]
    expected_findings: 1
