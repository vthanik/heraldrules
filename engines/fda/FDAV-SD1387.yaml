Core:
  Id: FDAV-SD1387
  Status: Reference
  Version: '1'
Description: Day of Obs relative to Exposure (--XDY) variable value should not be
  imputed. It may only be populated, when both Date/Time of Collection (--DTC) and
  Date/Time of First Study Treatment (RFXSTDTC) variables values are provided and
  both of them include complete date parts.
