Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  A variable with a suffix of FL must have a value that is Y, N, or
                  null. This single-dataset variant checks one dataset at a time.
                Document: ADaM IG v1.1
                Section: '3.2'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-5-SD
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: ONTRTFL
      operator: empty
    - name: ONTRTFL
      operator: in
      value:
        - 'Y'
        - 'N'
Core:
  Id: ADaM-005-SD
  Status: Published
  Version: '1'
Description: >-
  A variable with a suffix of FL must have a value of Y, N, or null (single-dataset
  variant). Uses ONTRTFL as a representative *FL variable within a single dataset.
Executability: Partially Executable
Outcome:
  Message: '*FL variable has a value other than Y, N, or null (single-dataset check)'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "ONTRTFL has valid value Y in single dataset"
    type: positive
    datasets:
      ADAE:
        variables: [STUDYID, USUBJID, ONTRTFL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "Y"]
          - ["CDISCPILOT01", "01-701-1023", ""]
    expected_findings: 0
  - name: "ONTRTFL has invalid value ABC in single dataset"
    type: negative
    datasets:
      ADAE:
        variables: [STUDYID, USUBJID, ONTRTFL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ABC"]
    expected_findings: 1
