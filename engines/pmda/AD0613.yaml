id: AD0613
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: When analysis Phase (APHASE) variable is defined, the Phase End Time
  (PHETM) variable value must equal ADSL Phase w End Time (PHwETM) variable value
  for that phase defined by the value in Phase (N) (APHASEN) variable. APHASEN = w.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: APHASE
      operator: empty
    - name: PHETM
      operator: non_empty
outcome:
  message: APHASEN w has a PHETM != ADSL.PHwETM
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0613
  pmda_category: Error
  ig_versions: []

