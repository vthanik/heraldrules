executability: Hardcoded
description: A variable references a codelist whose data type does not match the
  variable's Data Type (e.g. a character variable pointing at an integer codelist
  or vice versa). Prevents HRL-CL-001 from firing with a misleading "value not in
  terms" message when the underlying problem is that the codelist reference itself
  is wrong.
