Check:
  all:
    - name: PPCAT
      operator: non_empty
    - name: RELREC.PCRFTDTC
      operator: non_empty
    - name: PPRFTDTC
      operator: equal_to
      value: RELREC.PCRFTDTC
    - name: PPCAT
      operator: not_equal_to
      value: RELREC.PCTEST
Core:
  Status: Published
  Version: '1'
  Id: CORE-000901
Description: 'The values of PPCAT and PCTEST do not match at the same reference timepoint'
Executability: Partially Executable
Match Datasets:
  - Name: RELREC
    Wildcard: PC
Outcome:
  Message: 'The values of PPCAT and PCTEST do not match at the same reference timepoint'
  Output Variables:
    - PPCAT
    - PPRFTDTC
    - PPCAT
    - RELREC.PCRFTDTC
    - RELREC.PCTEST
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - PP
Sensitivity: Record
