id: SD1042
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Value of Start Relative to Reference Period (--STRF) or End Relative
  to Reference Period (--ENRF) should not be populated when an event or intervention
  is marked as not occurred (--OCCUR='N').
scope:
  Classes:
    Include:
      - INTERVENTIONS
      - EVENTS
  Domains:
    Include: ALL
  Use_Case: INDH, PROD
check:
  all:
    - name: --OCCUR
      operator: not_equal_to
      value: 'N'
    - name: --STRF
      operator: empty
outcome:
  message: Time point for non-occurred event or intervention is provided
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1042
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000240

