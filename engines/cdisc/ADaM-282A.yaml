Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  For Analysis Severity/Intensity (N) (ASEVN) variables, values must
                  be 1 (MILD), 2 (MODERATE), 3 (SEVERE), or null.
                Document: ADaM IG v1.1
                Section: "6.2"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-282A
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: ASEVN
      operator: empty
    - name: ASEVN
      operator: in
      value:
        - 1
        - 2
        - 3
Core:
  Id: ADaM-282A
  Status: Published
  Version: "1"
Description: >-
  For Analysis Severity/Intensity (N) (ASEVN) variables, values must be
  1 (MILD), 2 (MODERATE), 3 (SEVERE), or null.
Executability: Fully Executable
Outcome:
  Message: "ASEVN value is not 1, 2, 3, or null"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - OCCURRENCE DATA STRUCTURE
  Domains:
    Include:
      - ADAE
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: ASEVN is 1 (valid)
    type: positive
    datasets:
      ADAE:
        variables: [STUDYID, USUBJID, AETERM, ASEVN]
        records:
          - [CDISCPILOT01, 01-701-1015, HEADACHE, 1]
    expected_findings: 0
  - name: ASEVN has invalid value (violation)
    type: negative
    datasets:
      ADAE:
        variables: [STUDYID, USUBJID, AETERM, ASEVN]
        records:
          - [CDISCPILOT01, 01-701-1015, HEADACHE, 4]
    expected_findings: 1
