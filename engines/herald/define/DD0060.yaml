# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.15
id: DD0060
version: 1
status: Published
standard: Define-XML
category: Comment Definition
sensitivity: Record
executability: Fully Executable
description: >
  Comment ID is required and must be unique.
scope:
  classes: []
  domains: []
check:
  all:
    - name: comment_id
      operator: empty
outcome:
  message: "Comment ID is missing. Each comment must have a unique ID."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.15"
  cited_guidance: >
    OID -- Required. Unique ID for the CommentDef.
