Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  A variable with a suffix of RFN may only have a value that is 1 or
                  null (R = record level flag variable, numeric form).
                Document: ADaM IG v1.1
                Section: '3.3.5'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-35
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: ABLFN
      operator: empty
    - name: ABLFN
      operator: equal_to
      value: 1
Core:
  Id: ADaM-035
  Status: Published
  Version: '1'
Description: >-
  A variable with a suffix of RFN (record-level flag numeric) may only have a value
  of 1 or null. Uses ABLFN (Analysis Baseline Flag Numeric) as a representative *RFN
  variable in BDS datasets.
Executability: Partially Executable
Outcome:
  Message: '*RFN variable (e.g. ABLFN) has a value other than 1 or null'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "ABLFN has valid value 1"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ABLFN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 1]
          - ["CDISCPILOT01", "01-701-1023", "SODIUM", ""]
    expected_findings: 0
  - name: "ABLFN has invalid value 0 (not allowed for RFN)"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ABLFN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 0]
    expected_findings: 1
