# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.14
id: HRL-DD-091
version: 1
status: Published
standard: Define-XML
category: Cross-Reference
sensitivity: Record
executability: Fully Executable
description: >
  ValueLevel Method ID must exist in the Methods sheet when provided.
scope:
  classes: []
  domains: []
check:
  all:
    - name: method_id
      operator: empty
    - name: __method_exists_in_mt_spec
      operator: equal_to
      value: true
outcome:
  message: "ValueLevel references a Method ID that does not exist in the Methods sheet."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.14"
  cited_guidance: >
    MethodOID -- Reference to the unique ID of a MethodDef element.

tests:
  - name: "HRL-DD-091 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-091 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

