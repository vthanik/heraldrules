id: SD1291
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: End Relative to Reference Time Point (--ENRTPT) must be populated when
  End Reference Time Point (--ENTPT) is populated.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH, PROD
check:
  all:
    - name: --ENTPT
      operator: empty
    - name: --ENRTPT
      operator: non_empty
outcome:
  message: Missing value for --ENRTPT when --ENTPT is populated
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1291
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000106

