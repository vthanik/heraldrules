id: AD0044
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: When both time and datetime variables are collected on the same record
  for the same observation, the Time portion of the datetime variable should be equal
  to the Time variable itself.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: ASTTM
      operator: empty
    - name: ASTDTM
      operator: non_empty
outcome:
  message: '*TM and its corresponding *DTM variable have different time values'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0044
  pmda_category: Error
  ig_versions: []

