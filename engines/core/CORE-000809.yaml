Authorities:
  - Organization: CDISC
    Standards:
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'A study cell must only reference elements that are defined
                  within the same study design as the study cell.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00047'
              Version: '1'
            Version: '1.0'
        Version: '3.0'
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'A study cell must only reference elements that are defined
                  within the same study design as the study cell.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00047'
              Version: '1'
            Version: '1.0'
        Version: '4.0'
Check:
  all:
    - name: instanceType
      operator: equal_to
      value: 'StudyElement'
    - name: rel_type
      operator: equal_to
      value: 'reference'
    - name: parent_rel
      operator: equal_to
      value: 'elementIds'
      value_is_literal: true
    - name: rel_type.StudyCell
      operator: equal_to
      value: 'definition'
    - name: parent_id.StudyCell
      operator: is_not_contained_by
      value: $parent_of_study_element
Core:
  Id: 'CORE-000809'
  Status: Published
  Version: '1'
Description: 'A study cell must only reference elements that are defined within
  the same study design as the study cell.'
Executability: Fully Executable
Match Datasets:
  - Keys:
      - Left: parent_id
        Right: id
    Name: StudyCell
Operations:
  - group:
      - id
      - rel_type
    group_aliases:
      - id
      - rel_type.StudyCell
    id: $parent_of_study_element
    name: parent_id
    operator: distinct
Outcome:
  Message: 'The study element is referenced by a study cell but was not defined
    within the same study design as the study cell: the parent_id of the study
    element ($parent_of_study_element) is not the same as parent_id of the study
    cell (parent_id.StudyCell).'
  Output Variables:
    - parent_entity
    - parent_id
    - parent_rel
    - id
    - name
    - parent_id.StudyCell
    - $parent_of_study_element
Rule Type: Record Data
Scope:
  Entities:
    Include:
      - StudyElement
Sensitivity: Record
