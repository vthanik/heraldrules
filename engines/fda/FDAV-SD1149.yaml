Core:
  Id: FDAV-SD1149
  Status: Reference
  Version: '1'
Description: Expected variables may contain some null values, but in most cases will
  not contain null values for every record. When no data has been collected for an
  Expected variable, however, a null column must still be included in the dataset,
  and a comment must be included in the define.xml to state that data was not collected.
Check: []
Outcome:
  Message: Expected variable with missing value for all records
Rule Type: Record Data
Sensitivity: Record
