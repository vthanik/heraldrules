id: HRL-SD-009
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable
description: Study Start Date must be populated in TS dataset. TSPARMCD="SSTDTC",
  TSVAL != null.
scope:
  classes: []
  domains: []
check:
  all:
    - name: TSVAL
      operator: non_empty_when
      value: TSPARMCD == SSTDTC
outcome:
  message: Missing TSVAL when TSPARMCD=SSTDTC
  severity: Error
provenance:
  source_doc: Herald-original (gap analysis vs P21 Community catalog)
  authority: Herald
  p21_reference: SD2247B

tests:
  - name: "TSVAL populated when TSPARMCD equals SSTDTC"
    type: positive
    datasets:
      TS:
        variables: [STUDYID, TSPARMCD, TSVAL]
        records:
          - ["S1", "SSTDTC", "2024-01-01"]
    expected_findings: 0

  - name: "TSVAL empty when TSPARMCD equals SSTDTC"
    type: negative
    datasets:
      TS:
        variables: [STUDYID, TSPARMCD, TSVAL]
        records:
          - ["S1", "SSTDTC", ""]
    expected_findings: 1

