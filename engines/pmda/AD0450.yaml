id: AD0450
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: On a given record, if Multi-Response Criterion y Evaluation (MCRITyML)
  variable value is populated, then Multi-Response Criterion y Eval (N) (MCRITyMN)
  variable value must also be populated.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: MCRIT1ML
      operator: empty
    - name: MCRIT1
      operator: non_empty
outcome:
  message: MCRITyML is populated, but MCRITyMN is not populated
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0450
  pmda_category: Error
  ig_versions: []

