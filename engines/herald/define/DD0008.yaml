# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.11.2
id: DD0008
version: 1
status: Published
standard: Define-XML
category: Dataset Definition
sensitivity: Dataset
executability: Fully Executable
description: >
  Class is required for datasets following SDTM, SEND, or ADaM standards.
scope:
  classes: []
  domains: []
check:
  all:
    - name: standard
      operator: not_empty
    - name: class
      operator: empty
outcome:
  message: "Class is missing for a dataset that references a standard. def:Class is required when dataset follows SDTM, SEND, or ADaM."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.11.2"
  cited_guidance: >
    def:Class -- Conditional. Required when the ItemGroupDef describes a dataset that follows SDTM, SEND, or ADaM.
