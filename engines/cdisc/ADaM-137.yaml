Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  When CRITyFL (Analysis Criterion Flag) is populated, its corresponding CRITy (Analysis Criterion) variable must also be populated.
                Document: ADaM IG v1.1
                Section: '3.3.8'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-137
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: CRIT1FL
      operator: empty
    - name: CRIT1
      operator: non_empty
Core:
  Id: ADaM-137
  Status: Published
  Version: '1'
Description: >-
  When CRIT1FL (Criterion 1 Flag) is populated, CRIT1 (Criterion 1 definition) must also be present to document the criterion text.
Executability: Fully Executable
Outcome:
  Message: 'CRIT1FL is populated but CRIT1 (criterion definition) is missing'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "CRIT1FL and CRIT1 both populated"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, CRIT1, CRIT1FL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "AVAL >= 150", "Y"]
    expected_findings: 0
  - name: "CRIT1FL populated but CRIT1 missing"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, CRIT1, CRIT1FL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "", "Y"]
    expected_findings: 1
