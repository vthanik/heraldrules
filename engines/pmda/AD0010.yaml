id: AD0010
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: When a Flag variable (FL) is Y, its corresponding Flag numeric variable
  (FN) must be 1.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: SAFFL
      operator: equal_to
      value: 'Y'
    - name: SAFFN
      operator: not_equal_to
      value: 1
outcome:
  message: '*FL = Y and *FN != 1'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0010
  pmda_category: Error
  ig_versions: []

