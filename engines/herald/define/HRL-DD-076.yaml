# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 4.9; 5.3.11.1
id: HRL-DD-076
version: 1
status: Published
standard: Define-XML
category: Codelist Definition
sensitivity: Record
executability: Fully Executable
description: >
  NCI Term Code is required for each term in a CDISC CT codelist.
scope:
  classes: []
  domains: []
check:
  all:
    - name: terminology
      operator: empty
    - name: nci_term_code
      operator: non_empty
outcome:
  message: "NCI Term Code is missing for a term in a CDISC CT codelist. Alias with C-Code is required for each term in CDISC CT."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "4.9; 5.3.11.1"
  cited_guidance: >
    Each EnumeratedItem or CodeListItem element that represents a defined term in CDISC Controlled Terminology also requires an Alias element.

tests:
  - name: "HRL-DD-076 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-076 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

