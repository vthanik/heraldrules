Check:
  all:
    - name: SETCD
      operator: non_empty
    - name: SETCD
      operator: is_not_contained_by
      value: $tx_setcd
Core:
  Id: CORE-000620
  Status: Published
  Version: '1'
Description: SETCD value in the DM dataset should match one of the SETCD values
  in the TX dataset.
Executability: Fully Executable
Operations:
  - domain: TX
    id: $tx_setcd
    name: SETCD
    operator: distinct
Outcome:
  Message: SETCD value does not match a SETCD value in the TX dataset.
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
Sensitivity: Record
