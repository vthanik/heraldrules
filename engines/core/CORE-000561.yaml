Check:
  # REMARK 2024-03-20: This may be "overreporting"
  # (after having discussed with Christy Kubin, on occasion of Tatiana's remark),
  # so we will try to extend for also having TFANTREG in the expression
  # TFANTREG is however "permissible" and not always used.
  # We will first develop some test files.
  any:
    - all:
        - name: TFANTREG
          operator: exists
        - name: TFORRES
          operator: is_not_unique_set
          value:
            - USUBJID
            - TFSPEC
            - TFANTREG
    # case that TFANTREG is not present
    - all:
        - name: TFANTREG
          operator: not_exists
        - name: TFORRES
          operator: is_not_unique_set
          value:
            - USUBJID
            - TFSPEC

Core:
  Id: CORE-000561
  Status: Published
  Version: "1"
Description: Raise an error when there is more than one record present for any
  particular tumor test result for a subject and specimen.
Executability: Fully Executable
Outcome:
  Message: The Tumor Findings test result is not unique for this subject and specimen.
  Output Variables:
    - USUBJID
    - TFTESTCD
    - TFORRES
    - TFSPEC
    - TFANTREG
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - TF
Sensitivity: Record
