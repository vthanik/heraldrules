Check:
  all:
    - name: ACTARM
      operator: is_not_contained_by
      value:
        - Screen Failure
        - Not Assigned
        - Not Treated
        - Unplanned Treatment
        - SCREEN FAILURE
        - NOT ASSIGNED
        - NOT TREATED
        - UNPLANNED TREATMENT
    - name: ACTARM
      operator: is_not_contained_by
      value: $ARMS_IN_TA
Core:
  Id: CORE-000367
  Status: Published
  Version: '1'
Description: Raise an error when no TA.ARM exists for ACTARM in DM and ACTARM does
  not equal Screen Failure, Not Assigned, Not Treated, or Unplanned Treatment in DM
Executability: Fully Executable
Operations:
  - domain: TA
    id: $ARMS_IN_TA
    name: ARM
    operator: distinct
Outcome:
  Message: ACTARM is not in TA.ARM, but ACTARM in DM does not equal Screen Failure,
    Not Assigned, Not Treated, or Unplanned Treatment.
  Output_Variables:
    - ACTARM
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
Sensitivity: Record
