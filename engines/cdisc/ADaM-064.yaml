Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If Actual Treatment numeric variable (TRTxxAN) is present, its corresponding character variable (TRTxxA) must also be present. Uses TRT01AN/TRT01A as representative pair.
                Document: ADaM IG v1.1
                Section: '3.2'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-64
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: TRT01AN
      operator: non_empty
    - name: TRT01A
      operator: empty
Core:
  Id: ADaM-064
  Status: Published
  Version: '1'
Description: >-
  When TRT01AN (Actual Treatment for Period 01 Numeric) is present, TRT01A (Actual Treatment for Period 01) must also be present.
Executability: Partially Executable
Outcome:
  Message: 'TRT01AN is populated but corresponding TRT01A is missing'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ADSL
Sensitivity: Record
herald:
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "TRT01A and TRT01AN both populated"
    type: positive
    datasets:
      ADSL:
        variables: [STUDYID, USUBJID, TRT01A, TRT01AN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "Placebo", 0]
    expected_findings: 0
  - name: "TRT01AN populated but TRT01A is null"
    type: negative
    datasets:
      ADSL:
        variables: [STUDYID, USUBJID, TRT01A, TRT01AN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "", 54]
    expected_findings: 1
