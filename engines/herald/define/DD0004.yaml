# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.5
id: DD0004
version: 1
status: Published
standard: Define-XML
category: Study Metadata
sensitivity: Study
executability: Fully Executable
description: >
  DefineVersion must start with '2.1' to conform to Define-XML v2.1.
scope:
  classes: []
  domains: []
check:
  all:
    - name: DefineVersion
      operator: not_matches_regex
      value: "^2\\.1"  
outcome:
  message: "DefineVersion does not match '2.1.x'. Define-XML v2.1 requires def:DefineVersion starting with '2.1'."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.5"
  cited_guidance: >
    def:DefineVersion -- Required. '2.1.n'. Version of Define-XML to which the file conforms.
