# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.12
id: DD0027
version: 1
status: Published
standard: Define-XML
category: Variable Definition
sensitivity: Record
executability: Fully Executable
description: >
  Length must be a positive integer when provided.
scope:
  classes: []
  domains: []
check:
  all:
    - name: length
      operator: not_empty
    - name: length
      operator: less_than_or_equal_to
      value: 0
outcome:
  message: "Length must be a positive integer."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.12"
  cited_guidance: >
    Length -- Integer. The variable length in characters.
