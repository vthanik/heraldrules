id: AD0370
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: If a Time variable is indicated to be imputated by population of an Imputation
  Flag (*TMF), that Time variable (*TM) or Datetime variable (*DTM) must have a value.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: ATMF
      operator: empty
    - name: ATM
      operator: non_empty
outcome:
  message: '*TMF is populated, but *TM or *DTM is not populated'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0370
  pmda_category: Error
  ig_versions: []

