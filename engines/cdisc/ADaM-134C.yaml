Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  When Analysis Range High (AyHI) equals 0, R2AyHI should be null.
                Document: ADaM IG v1.1
                Section: '3.3.6'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-134C
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: A1HI
      operator: not_equal_to
      value: 0
    - name: R2A1HI
      operator: empty
Core:
  Id: ADaM-134C
  Status: Published
  Version: '1'
Description: >-
  When A1HI = 0, R2A1HI should be null.
Executability: Fully Executable
Outcome:
  Message: 'R2A1HI is populated when A1HI = 0 (division by zero not valid)'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "A1HI = 0 and R2A1HI is null"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, A1HI, R2A1HI]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 0, ""]
    expected_findings: 0
  - name: "A1HI = 0 but R2A1HI populated"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, A1HI, R2A1HI]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 0, 1.0]
    expected_findings: 1
