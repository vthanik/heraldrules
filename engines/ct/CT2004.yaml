id: CT2004
version: 1
status: Published
standard: SDTM
category: Controlled Terminology
sensitivity: Record
executability: Fully Executable

description: >
  Variable must be populated with terms from its CDISC controlled terminology
  codelist when its value-level condition is met. New terms cannot be added
  into non-extensible codelists. This is the conditional variant of CT2001.

scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
  domains: []

check:
  all:
    - name: __ct_variable__
      operator: in_codelist
      value: __non_extensible__
      condition: __value_level__

outcome:
  message: "Variable value not found in non-extensible codelist {CODELIST} when value-level condition occurs"
  severity: Error

authorities:
  - organization: FDA
    rule_ids: [CT2004]
  - organization: PMDA
    rule_ids: [CT2004]
  - organization: CDISC
    rule_ids: [CG0021, CG0040, CG0049]

provenance:
  source_doc: "FDA Validator Rules v1.6; PMDA Validation Rules v6.0"
  ct_source: "NCI EVS CDISC SDTM CT (sdtm-ct.json, extensible=false, conditional)"
