Check:
  all:
    - name: RACE
      operator: non_empty
    - name: RACE
      operator: not_equal_to
      value: 'BLACK OR AFRICAN AMERICAN'
    - name: QNAM
      operator: equal_to
      value: CRACE
    - name: QVAL
      operator: equal_to
      value: 'HATIAN or NEGRO'
Core:
  Id: CORE-000747
  Status: Published
  Version: '1'
Description: When Race Term 'Haitian' or 'Negro' (SUPPDM.CRACE) is collected, it
  should be mapped to Race (RACE) 'BLACK OR AFRICAN AMERICAN' in the DM dataset.
Executability: Fully Executable
Match Datasets:
  - Keys:
      - USUBJID
    Name: SUPPDM
Outcome:
  Message: Race Term 'Haitian' or 'Negro' is collected (SUPPDM.CRACE) but is not
    mapped to RACE = BLACK OR AFRICAN AMERICAN in DM dataset.
  Output Variables:
    - RACE
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
      - RELATIONSHIP
  Domains:
    Include:
      - DM
Sensitivity: Record
