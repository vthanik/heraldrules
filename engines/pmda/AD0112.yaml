id: AD0112
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: If ARELTMU (Analysis Relative Time unit) or ARELTM (Analysis Relative
  Time) is populated, then both must be populated together.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: ARELTMU
      operator: empty
    - name: ARELTM
      operator: non_empty
outcome:
  message: 'Only one of these variables is populated: ARELTM, ARELTMU'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0112
  pmda_category: Error
  ig_versions: []

