id: AD1019
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: For ADSL Trial Dates xx variables of form TRxx... and APxx..., 'xx' must
  be the treatment period (01 to 99). This rule covers 20 distinct variable forms
  listed in ADSL. It's anticipated that the CDISC ADaM Validation team will release
  20 new rules to cover this scenario.
scope:
  classes: []
  domains: ADSL
check:
  all:
    - name: TRT01P
      operator: empty
    - name: TRT02P
      operator: empty
outcome:
  message: 'Illegal variable name: xx is not in [01-99] for an ADSL trial date'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD1019
  pmda_category: Error
  ig_versions: []

