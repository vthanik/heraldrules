# Variable: TXPARMCD
# Condition: TXPARMCD = STRAIN
# Rule: One Trail Set cannot contain more than one strain
Authorities:
  - Organization: 'CDISC'
    Standards:
      - Name: 'SENDIG'
        References:
          - Citations:
              - Cited Guidance: 'Trial Sets (TX) can have multiple species and/or strains if
                  they are different by set.'
                Document: 'IG v3.1'
                Section: '5.1.1.1'
            Origin: 'SEND Conformance Rules'
            Rule Identifier:
              Id: 'SEND308'
              Version: '1'
            Version: '5.0'
        Version: '3.1'
      - Name: 'SENDIG'
        References:
          - Citations:
              - Cited Guidance: 'Trial Sets (TX) can have multiple species and/or strains if
                  they are different by set.'
                Document: 'IG v3.1.1'
                Section: '5.1.1.1'
            Origin: 'SEND Conformance Rules'
            Rule Identifier:
              Id: 'SEND308'
              Version: '1'
            Version: '5.0'
        Version: '3.1.1'
      - Name: SENDIG-GENETOX
        References:
          - Citations:
              - Cited Guidance: 'Trial Sets (TX) can have multiple species and/or strains if
                  they are different by set.'
                Document: 'IG v3.1.1'
                Section: '5.1.1.1'
            Origin: 'SEND Conformance Rules'
            Rule Identifier:
              Id: 'SEND308'
              Version: '1'
            Version: '5.0'
        Version: '1.0'
      - Name: SENDIG-DART
        References:
          - Citations:
              - Cited Guidance: 'Trial Sets (TX) can have multiple species and/or strains if
                  they are different by set.'
                Document: 'IG v3.1'
                Section: '5.1.1.1'
            Origin: 'SEND Conformance Rules'
            Rule Identifier:
              Id: 'SEND308'
              Version: '1'
            Version: '5.0'
        Version: '1.1'
      - Name: SENDIG-DART
        References:
          - Citations:
              - Cited Guidance: 'Trial Sets (TX) can have multiple species and/or strains if
                  they are different by set.'
                Document: 'IG v3.1.1'
                Section: '5.1.1.1'
            Origin: 'SEND Conformance Rules'
            Rule Identifier:
              Id: 'SEND308'
              Version: '1'
            Version: '5.0'
        Version: '1.2'
Check:
  all:
    - name: $strain_count
      operator: greater_than
      value: 1
Core:
  Status: Published
  Version: '1'
  Id: CORE-000782
Description: 'Trial Sets (TX) can have multiple species and/or strains if they
  are different by set.'
Executability: Fully Executable
Operations:
  - domain: TX
    # only keep the records with TXPARMCD=STRAIN
    filter:
      TXPARMCD: STRAIN
    # group the records by value of TXSETCD
    group:
      - SETCD
    # within the filtered and grouped records, count the number of records
    id: $strain_count
    operator: record_count
Outcome:
  Message: 'One Trial Set cannot contain more than one strain.'
  Output Variables:
    - SETCD
    - $strain_count
    - TXPARMCD
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - TRIAL DESIGN
  Domains:
    Include:
      - TX
Sensitivity: Record
