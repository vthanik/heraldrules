id: AD0156
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: If Criterion y Flag (CRITyFL) variable is present, there must also be
  a corresponding Criterion y (CRITy) variable.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: CRIT1FL
      operator: empty
    - name: CRIT1
      operator: non_empty
outcome:
  message: CRITyFL is present, but CRITy is not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0156
  pmda_category: Error
  ig_versions: []

