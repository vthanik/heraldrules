id: SD1328
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: The Related Subject or Pool Identifier (RSUBJID) value should not be
  equal to USUBJID.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: RELSUB
check:
  all:
    - name: RSUBJID
      operator: empty
    - name: RSUBJID
      operator: not_equal_to
      value: USUBJID
outcome:
  message: RSUBJID is equal to USUBJID
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1328
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000231

