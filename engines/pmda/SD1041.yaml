id: SD1041
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Values of Category (--CAT) and Subcategory (--SCAT) variables should
  not be identical.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH, PROD
check:
  all:
    - name: --SCAT
      operator: empty
    - name: --SCAT
      operator: not_equal_to
      value: --CAT
outcome:
  message: Values for --CAT and --SCAT are identical
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1041
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000237

