Check:
  all:
    - name: QORIG
      operator: exists
    - name: QORIG
      operator: non_empty
    - name: QORIG
      operator: not_equal_to
      value: COLLECTED
    - name: QORIG
      operator: not_equal_to
      value: DERIVED
    - name: QORIG
      operator: not_equal_to
      value: OTHER
    - name: QORIG
      operator: not_equal_to
      value: NOT AVAILABLE
