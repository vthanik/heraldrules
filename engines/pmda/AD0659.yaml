id: AD0659
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: 'PKSUMXFN (PK Summary Exclusion Flag (N)) must be 1 or null.  It is a
  numeric flag for exclusion of a record from a PK summary: 1 = exclusion, null =
  inclusion.'
scope:
  classes: []
  domains: ADNCA
check:
  all:
    - name: PKSUMXFN
      operator: empty
    - name: PKSUMXFN
      operator: in
      value:
        - 1
outcome:
  message: PKSUMXFN value is not 1 or null
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0659
  pmda_category: Error
  ig_versions: []

