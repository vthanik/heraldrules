Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  When AVAL, BASE, and CHG are all populated, CHG must equal AVAL minus BASE (CHG = AVAL - BASE). This is the standard change from baseline calculation.
                Document: ADaM IG v1.1
                Section: '3.3.5'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-131
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: CHG
      operator: empty
    - name: BASE
      operator: empty
    - name: AVAL
      operator: empty
    - name: CHG
      operator: within_tolerance_of_formula
      value: AVAL - BASE
      tolerance: 0.001
Core:
  Id: ADaM-131
  Status: Published
  Version: '1'
Description: >-
  When all three are populated, CHG must equal AVAL - BASE within rounding tolerance.
Executability: Fully Executable
Outcome:
  Message: 'CHG does not equal AVAL - BASE (change from baseline calculation error)'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "CHG = AVAL - BASE (correct calculation)"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, BASE, CHG]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 145.0, 140.0, 5.0]
          - ["CDISCPILOT01", "01-701-1023", "SODIUM", 138.0, 140.0, -2.0]
    expected_findings: 0
  - name: "CHG does not equal AVAL - BASE"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, BASE, CHG]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 145.0, 140.0, 10.0]
    expected_findings: 1
