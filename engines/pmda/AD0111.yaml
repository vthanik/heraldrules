id: AD0111
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: When ARELTM is present, the Anchor Time variable and ARELTMU (Analysis
  Relative Time unit) must also be included in the dataset, and the anchor time variable
  must be identified in the metadata for ARELTM.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: ARELTM
      operator: non_empty
    - name: ARELTMU
      operator: empty
outcome:
  message: ARELTM is present, but ARELTMU is not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0111
  pmda_category: Error
  ig_versions: []

