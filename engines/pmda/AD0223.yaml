id: AD0223
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: When all 3 variables are populated, Change from Baseline (CHG) must equal
  Analysis Value (AVAL) minus Baseline Value (BASE).
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: CHG
      operator: empty
    - name: AVAL
      operator: empty
    - name: BASE
      operator: empty
    - name: CHG
      operator: within_tolerance_of_formula
      value: AVAL - BASE
      tolerance: 0.001
outcome:
  message: 'Calculation issue: CHG != AVAL - BASE'
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0223
  pmda_category: Warning
  ig_versions: []

