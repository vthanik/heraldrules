id: HRL-TS-001
version: 1
status: Published
standard: Define-XML
category: Conformance
sensitivity: Record
executability: Fully Executable
description: These variables assist regulatory review and analysis and must be included
  in the dataset.
scope:
  classes: []
  domains: []
check:
  all:
    - name: __required_variable__
      operator: exists
outcome:
  message: Analysis Required variable not found
  severity: Error
provenance:
  source_doc: Herald-original (gap analysis vs P21 Community catalog)
  authority: Herald
  p21_reference: TS0012

tests:
  - name: "required variable is present in the dataset"
    type: positive
    skip: true
    datasets:
      AE:
        variables: [STUDYID, USUBJID, AESEQ]
        records:
          - ["S1", "S1-001", 1]
    expected_findings: 0

  - name: "required variable is absent from the dataset"
    type: negative
    skip: true
    datasets:
      AE:
        variables: [STUDYID, USUBJID]
        records:
          - ["S1", "S1-001"]
    expected_findings: 1

