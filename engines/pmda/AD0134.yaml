id: AD0134
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: When all 3 variables are populated and AyHI does not equal 0, Ratio to
  AyHI (R2AyHI) must equal Analysis Value (AVAL) / Analysis Range y HI Value (AyHI).
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: R2A1HI
      operator: empty
    - name: A1HI
      operator: empty
    - name: AVAL
      operator: empty
    - name: A1HI
      operator: equal_to
      value: 0
    - name: R2A1HI
      operator: within_tolerance_of_formula
      value: AVAL / A1HI
      tolerance: 0.001
outcome:
  message: 'Calculation issue: R2AyHI != AVAL / AyHI'
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0134
  pmda_category: Warning
  ig_versions: []

