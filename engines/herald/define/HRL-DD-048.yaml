# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.12
id: HRL-DD-048
version: 1
status: Published
standard: Define-XML
category: Variable Definition
sensitivity: Record
executability: Fully Executable
description: >
  Length must be empty when Data Type is not text, integer, or float.
scope:
  classes: []
  domains: []
check:
  all:
    - name: data_type
      operator: in
      value:
        - text
        - integer
        - float
    - name: data_type
      operator: empty
    - name: length
      operator: empty
outcome:
  message: "Length should not be provided when Data Type is a date/time type. Length is only valid for text, integer, and float."
  severity: Warning
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.12"
  cited_guidance: >
    Length should be present only when DataType is 'Text', 'Integer', or 'Float'.

tests:
  - name: "HRL-DD-048 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-048 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

