Check:
  all:
    - name: --DTC
      operator: exists
    - name: --ENDTC
      operator: exists
    - name: --DTC
      operator: non_empty
    - name: --ENDTC
      operator: non_empty
    - name: --DTC
      operator: date_greater_than
      value: --ENDTC
Core:
  Id: CORE-000866
  Status: Published
  Version: '1'
Description: Date/Time of Collection (--DTC) should be prior or equal to the End
  Date/Time of Observation (--ENDTC)
Executability: Fully Executable
Outcome:
  Message: --DTC falls after --ENDTC.
  Output Variables:
    - --DTC
    - --ENDTC
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - ALL
Sensitivity: Record
