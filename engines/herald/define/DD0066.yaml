# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.15
id: DD0066
version: 1
status: Published
standard: Define-XML
category: Cross-Reference
sensitivity: Record
executability: Fully Executable
description: >
  Variable Comment ID must exist in the Comments sheet when provided.
scope:
  classes: []
  domains: []
check:
  all:
    - name: comment_id
      operator: not_empty
    - name: __comment_exists_in_cm_spec
      operator: equal_to
      value: false
outcome:
  message: "Variable references a Comment ID that does not exist in the Comments sheet."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.15"
  cited_guidance: >
    def:CommentOID -- Must match the OID of a def:CommentDef element.
