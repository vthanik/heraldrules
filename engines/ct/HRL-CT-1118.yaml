        - PREVENTATIVE
        - SUPPORTIVE CARE
        - UNKNOWN
outcome:
  message: Value not found in extensible codelist Treatment Intent (C124307)
  severity: Warning
provenance:
  source_doc: NCI EVS CDISC Controlled Terminology (2025-09-26)
  authority: CDISC
  codelist_code: C124307
  codelist_name: Treatment Intent
  codelist_submission_value: TRTINTNT
  extensible: yes
  parent_rule: CT2002
  term_count: 5

