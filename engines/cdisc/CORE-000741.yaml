Check:
  any:
    - name: TSPARMCD
      operator: not_contains_all
      value:
        - INTMODEL
        - INTTYPE
        - PCLASS
    - any:
        - all:
            - name: TSPARMCD
              operator: equal_to
              value: INTMODEL
            - name: TSVAL
              operator: empty
        - all:
            - name: TSPARMCD
              operator: equal_to
              value: INTTYPE
            - name: TSVAL
              operator: empty
        - all:
            - name: TSPARMCD
              operator: equal_to
              value: PCLASS
            - name: TSVAL
              operator: empty
    - name: $STYPE_INTERVENTIONAL
      operator: not_equal_to
      value: 1
Core:
  Id: CORE-000741
  Status: Published
  Version: '1'
Description: The set  ('INTMODEL', 'INTTYPE','PCLASS') is not in the list of TSPARAMCD
  with TSVAL populated.
Executability: Fully Executable
Operations:
  - filter:
      TSPARMCD: STYPE
      TSVAL: INTERVENTIONAL
    id: $STYPE_INTERVENTIONAL
    operator: record_count
Outcome:
