id: SD1098
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Value for Category (--CAT) variable should be populated when value for
  Subcategory (--SCAT) variable is populated.
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TI
  Use_Case: INDH
check:
  all:
    - name: IESCAT
      operator: empty
    - name: IECAT
      operator: non_empty
outcome:
  message: Missing --CAT value when --SCAT value is populated
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1098
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000785

