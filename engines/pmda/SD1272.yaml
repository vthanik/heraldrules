id: SD1272
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Test Code variables (--TESTCD) should not be populated with values of
  'OTHER'.
scope:
  Classes:
    Include: FINDINGS
  Domains:
    Include: ALL
  Use_Case: INDH, PROD
check:
  all:
    - name: --TESTCD
      operator: not_equal_to
      value: OTHER
outcome:
  message: --TESTCD equals 'OTHER'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1272
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000159

