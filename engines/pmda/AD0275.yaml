id: AD0275
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: If Cumulative Study Drug Dose Unit (DOSECUMU) or Cumulative Study Drug
  Dose (DOSECUM) variable is populated, then both variables must be populated together.
scope:
  classes: []
  domains:
    - ADAE
    - ADAMOTHER
check:
  all:
    - name: DOSECUMU
      operator: empty
    - name: DOSECUM
      operator: non_empty
outcome:
  message: Only one of DOSECUMU, DOSECUM is populated
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0275
  pmda_category: Error
  ig_versions: []

