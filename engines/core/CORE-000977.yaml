Authorities:
  - Organization: CDISC
    Standards:
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: "A medical device sourcing must be specified using the
                  extensible medical device sourcing (C215482) DDF codelist
                  (e.g. an entry with a code or decode used from the codelist
                  should be consistent with the full entry in the codelist)."
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00209'
              Version: '1'
            Version: '1.0'
        Version: '4.0'
Check:
  all:
    - name: rel_type
      operator: equal_to
      value: 'definition'
    - name: sourcing
      operator: exists
    - name: sourcing
      operator: equal_to
      value: true
    - not:
        all:
          - name: sourcing.codeSystem
            operator: equal_to
            value: 'http://www.cdisc.org'
          - name: sourcing.codeSystemVersion
            operator: is_contained_by
            value: $valid_versions
          - name: $codelist_extensible
            operator: equal_to
            value: true
          - any:
              - all:
                  - name: $code_for_decode_pref_term
                    operator: empty
                  - name: $code_for_decode_value
                    operator: empty
                  - name: $pref_term_for_code
                    operator: empty
                  - name: $value_for_code
                    operator: empty
              - all:
                  - name: $pref_term_for_code
                    operator: non_empty
                  - name: $value_for_code
                    operator: non_empty
                  - any:
                      - name: $code_for_decode_pref_term
                        operator: non_empty
                      - name: $code_for_decode_value
                        operator: non_empty
                  - any:
                      - name: sourcing.code
                        operator: equal_to
                        value: $code_for_decode_pref_term
                      - name: sourcing.code
                        operator: equal_to
                        value: $code_for_decode_value
                  - any:
                      - name: sourcing.decode
                        operator: equal_to
                        value: $pref_term_for_code
                      - name: sourcing.decode
                        operator: equal_to
                        value: $value_for_code
Core:
  Id: 'CORE-000977'
  Status: Published
  Version: '1'
Description: "A medical device sourcing must be specified using the extensible
  medical device sourcing (C215482) DDF codelist (e.g. an entry with a code or
  decode used from the codelist should be consistent with the full entry in the
  codelist)."
Executability: Fully Executable
Operations:
  - id: $codelist_code
    map:
      - output: C215482
    operator: map
  - ct_package_types:
      - DDF
    id: $valid_versions
    operator: valid_codelist_dates
  - codelist_code: $codelist_code
    ct_package_type: DDF
    id: $codelist_extensible
    operator: codelist_extensible
    version: sourcing.codeSystemVersion
  - codelist_code: $codelist_code
    ct_package_type: DDF
    id: $value_for_code
    operator: codelist_terms
    returntype: value
    term_code: sourcing.code
    version: sourcing.codeSystemVersion
  - codelist_code: $codelist_code
    ct_package_type: DDF
    id: $pref_term_for_code
    operator: codelist_terms
    returntype: pref_term
    term_code: sourcing.code
    version: sourcing.codeSystemVersion
  - codelist_code: $codelist_code
    ct_package_type: DDF
    id: $code_for_decode_pref_term
    operator: codelist_terms
    returntype: code
    term_pref_term: sourcing.decode
    version: sourcing.codeSystemVersion
  - codelist_code: $codelist_code
    ct_package_type: DDF
    id: $code_for_decode_value
    operator: codelist_terms
    returntype: code
    term_value: sourcing.decode
    version: sourcing.codeSystemVersion
Outcome:
  Message: 'The medical device sourcing is not specified according to the
    extensible medical device sourcing (C215482) DDF codelist - codeSystem is
    not "http://www.cdisc.org", codeSystemVersion is not a valid terminology
    package date, and/or the code or decode (either as preferred term or as
    submission value) is found in the codelist (case insensitive) but the
    corresponding decode or code does not match the codelist value (case
    sensitive).'
  Output Variables:
    - parent_entity
    - parent_id
    - parent_rel
    - id
    - name
    - $codelist_code
    - $codelist_extensible
    - sourcing.code
    - $code_for_decode_value
    - $code_for_decode_pref_term
    - sourcing.codeSystem
    - sourcing.codeSystemVersion
    - sourcing.decode
    - $value_for_code
    - $pref_term_for_code
Rule Type: Record Data
Scope:
  Entities:
    Include:
      - 'MedicalDevice'
Sensitivity: Record
