Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  ANLzzFN (Analyzed Record Flag zz Numeric) must be 1 or null.
                  It is a numeric flag that must only have value 1 when the record
                  is selected for analysis.
                Document: ADaM IG v1.1
                Section: "4.4"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-212
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: ANL01FN
      operator: empty
    - name: ANL01FN
      operator: in
      value:
        - 1
Core:
  Id: ADaM-212
  Status: Published
  Version: "1"
Description: >-
  ANLzzFN (Analyzed Record Flag zz Numeric) must be 1 or null.
  Uses ANL01FN as a representative variable.
Executability: Partially Executable
Outcome:
  Message: "ANLzzFN value is not 1 or null"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: ANL01FN is 1 (valid)
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ANL01FN]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 1]
    expected_findings: 0
  - name: ANL01FN is invalid value (violation)
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ANL01FN]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 0]
    expected_findings: 1
