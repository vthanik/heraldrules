Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  Numeric population flag variables (e.g. SAFFN, ITTFN) must
                  have a value of 1 or 0; null values are not allowed.
                Document: ADaM IG v1.1
                Section: '3.2'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-29
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: PPROTFN
      operator: empty
    - name: PPROTFN
      operator: in
      value:
        - 0
        - 1
Core:
  Id: ADaM-029
  Status: Published
  Version: '1'
Description: "PPROTFN may only have a value of 1 or 0. Null is not allowed for ADSL numeric population flag variables."
Executability: Fully Executable
Outcome:
  Message: "PPROTFN has a value other than 1 or 0"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ADSL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "PPROTFN has valid value 1"
    type: positive
    datasets:
      ADSL:
        variables: [STUDYID, USUBJID, PPROTFN]
        records:
          - ["CDISCPILOT01", "01-701-1015", 1]
          - ["CDISCPILOT01", "01-701-1023", 0]
    expected_findings: 0
  - name: "PPROTFN has invalid value 2"
    type: negative
    datasets:
      ADSL:
        variables: [STUDYID, USUBJID, PPROTFN]
        records:
          - ["CDISCPILOT01", "01-701-1015", 2]
    expected_findings: 1
  - name: "PPROTFN is null (not allowed for numeric population flags)"
    type: negative
    datasets:
      ADSL:
        variables: [STUDYID, USUBJID, PPROTFN]
        records:
          - ["CDISCPILOT01", "01-701-1015", ""]
    expected_findings: 1
