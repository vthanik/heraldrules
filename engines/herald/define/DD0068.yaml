# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.14
id: DD0068
version: 1
status: Published
standard: Define-XML
category: Cross-Reference
sensitivity: Record
executability: Fully Executable
description: >
  ValueLevel Method ID must exist in the Methods sheet when provided.
scope:
  classes: []
  domains: []
check:
  all:
    - name: method_id
      operator: not_empty
    - name: __method_exists_in_mt_spec
      operator: equal_to
      value: false
outcome:
  message: "ValueLevel references a Method ID that does not exist in the Methods sheet."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.14"
  cited_guidance: >
    MethodOID -- Reference to the unique ID of a MethodDef element.
