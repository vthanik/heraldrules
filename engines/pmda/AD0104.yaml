id: AD0104
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: The Analysis Period (APERIOD) values will be a number like 01. There
  must be a corresponding Date of Last Exposure in Period xx variable for this period
  (like TR01EDT) in ADSL dataset.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: APERIOD
      operator: empty
    - name: TR01EDT
      operator: non_empty
outcome:
  message: There is no TRxxEDT variable in ADSL for every unique xx value of APERIOD
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0104
  pmda_category: Warning
  ig_versions: []

