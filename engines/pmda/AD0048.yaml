id: AD0048
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: ADSL must have at least one variable that ends in FL because you need
  at least one population flag.
scope:
  classes: []
  domains: ADSL
check:
  all:
    - name: SAFFL
      operator: empty
    - name: ITTFL
      operator: empty
    - name: COMPLFL
      operator: empty
    - name: ENRLFL
      operator: empty
outcome:
  message: '*FL subject-population flag variable is not present'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0048
  pmda_category: Error
  ig_versions: []

