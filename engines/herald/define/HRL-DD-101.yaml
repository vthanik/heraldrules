# P21 Sheet validation against Define-XML v2.1 Specification
# Section: ARM 1.0
id: HRL-DD-101
version: 1
status: Published
standard: Define-XML
category: ARM Metadata
sensitivity: Record
executability: Fully Executable
description: >
  ARM AnalysisVariable must be unique within an AnalysisResult.
scope:
  classes: []
  domains: []
check:
  all:
    - name: variables
      operator: empty
    - name: __arm_variables_unique
      operator: equal_to
      value: true
outcome:
  message: "AnalysisVariable is not unique within the AnalysisResult. Each variable should appear only once per result."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "ARM 1.0"
  cited_guidance: >
    P21 DD0091: The armAnalysisVariable in the Analysis Results Metadata must be unique within an ARM.

tests:
  - name: "HRL-DD-101 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-101 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

