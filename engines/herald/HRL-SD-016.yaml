id: HRL-SD-016
version: 1
status: Published
standard: SDTM
category: Value
sensitivity: Record
executability: Fully Executable
description: >
  When LBSTRESC contains a qualitative result (POSITIVE, NEGATIVE, NORMAL,
  ABNORMAL, TRACE), LBSTRESN must be null. Qualitative results cannot have
  a meaningful numeric representation.
scope:
  classes: []
  domains:
    - LB
check:
  all:
    - name: LBSTRESC
      operator: not_in
      value:
        - POSITIVE
        - NEGATIVE
        - NORMAL
        - ABNORMAL
        - TRACE
    - name: LBSTRESN
      operator: empty
outcome:
  message: LBSTRESN populated when LBSTRESC is qualitative (should be null)
  severity: Error
provenance:
  source_doc: StudySAS Blog — 7 Mistakes in LB Unit Conversion (2026-04)
  authority: Herald
  reference_url: https://studysas.blogspot.com/2026/04/7-mistakes-in-lb-unit-conversion-that.html

tests:
  - name: "Qualitative LBSTRESC with null LBSTRESN"
    type: positive
    datasets:
      LB:
        variables: [STUDYID, USUBJID, LBTESTCD, LBSTRESC, LBSTRESN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "UROBIL", "NEGATIVE", ""]
          - ["CDISCPILOT01", "01-701-1023", "UROBIL", "TRACE", ""]
    expected_findings: 0
  - name: "Qualitative LBSTRESC with populated LBSTRESN"
    type: negative
    datasets:
      LB:
        variables: [STUDYID, USUBJID, LBTESTCD, LBSTRESC, LBSTRESN]
        records:
          - ["CDISCPILOT01", "01-701-1015", "UROBIL", "POSITIVE", "1"]
    expected_findings: 1
