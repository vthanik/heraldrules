Authorities:
  - Organization: CDISC
    Standards:
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'All scheduled activity instances in the main timeline are
                  expected to refer to an epoch.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00080'
              Version: '1'
            Version: '1.0'
        Version: '3.0'
      - Name: USDM
        References:
          - Citations:
              - Cited Guidance: 'All scheduled activity instances in the main timeline are
                  expected to refer to an epoch.'
                Document: 'USDM_CORE_Rules.xlsx'
            Origin: 'USDM Conformance Rules'
            Rule Identifier:
              Id: 'DDF00080'
              Version: '1'
            Version: '1.0'
        Version: '4.0'
Check:
  all:
    - name: rel_type
      operator: equal_to
      value: 'definition'
    - name: mainTimeline
      operator: equal_to
      value: true
    - any:
        - name: epochId
          operator: not_exists
        - name: epochId
          operator: empty
Core:
  Id: 'CORE-000870'
  Status: Published
  Version: '1'
Description: 'All scheduled activity instances in the main timeline are expected
  to refer to an epoch.'
Executability: Partially Executable - Possible Overreporting
Match Datasets:
  - Keys:
      - Left: parent_entity
        Right: instanceType
      - Left: parent_id
        Right: id
      - rel_type
    Name: ScheduleTimeline
Outcome:
  Message: 'The scheduled activity instance is in the main timeline but does not
    refer to an epoch.'
  Output Variables:
    - parent_entity
    - parent_id
    - parent_rel
    - mainTimeline
    - id
    - name
    - epochId
Rule Type: Record Data
Scope:
  Entities:
    Include:
      - 'ScheduledActivityInstance'
Sensitivity: Record
