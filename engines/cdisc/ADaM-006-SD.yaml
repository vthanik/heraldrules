Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  A variable with a suffix of FN must have a value that is 0, 1, or
                  null (single-dataset variant).
                Document: ADaM IG v1.1
                Section: '3.2'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-6-SD
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: ONTRTFN
      operator: empty
    - name: ONTRTFN
      operator: in
      value:
        - 0
        - 1
Core:
  Id: ADaM-006-SD
  Status: Published
  Version: '1'
Description: >-
  A variable with a suffix of FN must have a value of 0, 1, or null (single-dataset
  variant). Uses ONTRTFN as a representative *FN variable.
Executability: Partially Executable
Outcome:
  Message: '*FN variable has a value other than 0, 1, or null (single-dataset check)'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "ONTRTFN has valid value 1 in single dataset"
    type: positive
    datasets:
      ADAE:
        variables: [STUDYID, USUBJID, ONTRTFN]
        records:
          - ["CDISCPILOT01", "01-701-1015", 1]
          - ["CDISCPILOT01", "01-701-1023", ""]
    expected_findings: 0
  - name: "ONTRTFN has invalid value 99 in single dataset"
    type: negative
    datasets:
      ADAE:
        variables: [STUDYID, USUBJID, ONTRTFN]
        records:
          - ["CDISCPILOT01", "01-701-1015", 99]
    expected_findings: 1
