id: SD1105
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Epoch (EPOCH) variable value should not be populated when Category for
  Disposition Event (DSCAT) variable value equals 'PROTOCOL MILESTONE'.
scope:
  Classes:
    Include: EVENTS
  Domains:
    Include: DS
check:
  all:
    - name: DSCAT
      operator: not_equal_to
      value: PROTOCOL MILESTONE
    - name: EPOCH
      operator: empty
outcome:
  message: EPOCH variable is populated when DSCAT equals 'PROTOCOL MILESTONE'
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1105
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000364

