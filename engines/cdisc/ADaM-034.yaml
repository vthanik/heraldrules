Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  A variable with a suffix of PFL may only have a value that is Y or
                  null (P = parameter level flag variable). Parameter-level flags apply
                  to an entire parameter (e.g., all records for a given PARAMCD).
                Document: ADaM IG v1.1
                Section: '3.3.5'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-34
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: ANL01FL
      operator: empty
    - name: ANL01FL
      operator: equal_to
      value: 'Y'
Core:
  Id: ADaM-034
  Status: Published
  Version: '1'
Description: >-
  A variable with a suffix of PFL (parameter-level flag) may only have a value of Y
  or null. Uses ANL01FL (Analysis 01 Flag) as a representative *FL parameter-level
  flag in BDS datasets.
Executability: Partially Executable
Outcome:
  Message: '*PFL variable has a value other than Y or null'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "ANL01FL has valid value Y"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ANL01FL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Y"]
          - ["CDISCPILOT01", "01-701-1023", "SODIUM", ""]
    expected_findings: 0
  - name: "ANL01FL has invalid value N (not allowed for PFL)"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ANL01FL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "N"]
    expected_findings: 1
