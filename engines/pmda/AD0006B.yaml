id: AD0006B
version: 2
status: Reference
standard: ADaM
category: Conformance
sensitivity: Record
executability: Partially Executable
description: 'A variable with a suffix of FN has a value that is not 0, 1, or null
  (Exception: ABLFN, ANLzzFN, and numeric population flags COMPLFN, FASFN, ITTFN,
  PPROTFN, SAFFN, RANDFN, ENRLFN cannot be null and at least 1 must be included in
  ADSL).'
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: ONTRTFN
      operator: non_empty
    - name: ONTRTFN
      operator: not_in
      value:
        - 0
        - 1
outcome:
  message: '*FN value is not 0, 1 or null'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0006B
  pmda_category: Error
  ig_versions: []

