Check:
  all:
    - name: variable_data_type
      operator: equal_to
      value: Char
    - name: variable_value
      operator: non_empty
    - name: variable_value
      operator: equal_to
      value: '.'
      value_is_literal: true
Core:
  Id: CORE-000890
  Status: Published
  Version: '1'
Description: Text variable in submitted dataset should not contain  '.' as an entire value.
Executability: Fully Executable
Outcome:
  Message: Text variable contains '.' as an entire value.
  Output Variables:
    - variable_value
    - variable_name
Rule Type: Value Check with Variable Metadata
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
Sensitivity: Record
